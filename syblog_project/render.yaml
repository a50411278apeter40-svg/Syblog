services:
  - type: web
    name: syblog
    env: python
    rootDir: syblog_project
    buildCommand: "pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py setup_google_oauth"
    startCommand: "python keepalive.py & gunicorn do_it_django_prj.wsgi:application --workers 2 --worker-class sync --timeout 600 --keep-alive 5 --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: "a50411278apeter40-svg/Syblog"
