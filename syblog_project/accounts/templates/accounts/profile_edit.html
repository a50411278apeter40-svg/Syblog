{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block head_title %}프로필 수정 - SyBlog{% endblock %}
{% block main_area %}
<div class="card">
  <div class="card-header"><i class="fas fa-user-edit"></i> 프로필 수정</div>
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <h6 class="text-muted mb-3">기본 정보</h6>
      {{ user_form|crispy }}
      <hr>
      <h6 class="text-muted mb-3">프로필 정보</h6>
      {{ profile_form|crispy }}
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 저장</button>
      <a href="/user/profile/" class="btn btn-secondary">취소</a>
    </form>
  </div>
</div>
{% endblock %}
