{% extends 'challenges/game_base.html' %}
{% block game_area %}
<canvas id="gameCanvas" style="border-radius:12px;max-width:100%;touch-action:none;display:block;margin:0 auto;"></canvas>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=380,H=580;
canvas.width=W; canvas.height=H;
canvas.style.width='min(380px,95vw)'; canvas.style.height='auto';

const GRAVITY=0.22, FLAP=-6.5, GAP=155, PW=58, BIRD_X=85, SPD=2.2;
let bird,pipes,score,running=false,af,frame=0,clouds=[];
for(let i=0;i<4;i++) clouds.push({x:Math.random()*W,y:25+Math.random()*100,w:55+Math.random()*50,spd:0.25+Math.random()*0.25});

function drawBG(){
  let sky=ctx.createLinearGradient(0,0,0,H*0.78);
  sky.addColorStop(0,'#3EC7F4'); sky.addColorStop(1,'#87EEFF');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  clouds.forEach(c=>{
    ctx.save(); ctx.globalAlpha=0.88; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,c.w/3.2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.27,c.y-c.w*0.11,c.w*0.3,c.w*0.21,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*0.23,c.y-c.w*0.09,c.w*0.26,c.w*0.17,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if(running) c.x-=c.spd; if(c.x+c.w<0) c.x=W+c.w;
  });
  // 지면
  let gnd=ctx.createLinearGradient(0,H-75,0,H);
  gnd.addColorStop(0,'#90C94A'); gnd.addColorStop(0.3,'#6a9c2a');
  gnd.addColorStop(0.3,'#d4a574'); gnd.addColorStop(1,'#b8895a');
  ctx.fillStyle=gnd; ctx.fillRect(0,H-75,W,75);
  // 잔디 요철
  ctx.fillStyle='#A0D050';
  for(let i=0;i<W;i+=15){
    ctx.beginPath(); ctx.moveTo(i,H-75); ctx.lineTo(i+7,H-85); ctx.lineTo(i+14,H-75); ctx.fill();
  }
}

function drawPipe(x,top){
  let g=ctx.createLinearGradient(x,0,x+PW,0);
  g.addColorStop(0,'#2E8B2E'); g.addColorStop(0.35,'#5CC85C'); g.addColorStop(0.65,'#3aaa3a'); g.addColorStop(1,'#1a6a1a');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.roundRect(x+3,0,PW-6,top,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+3,top+GAP,PW-6,H-top-GAP-75,3); ctx.fill();
  // 캡
  let cap=ctx.createLinearGradient(x-4,0,x+PW+4,0);
  cap.addColorStop(0,'#1a6a1a'); cap.addColorStop(0.4,'#70dd70'); cap.addColorStop(1,'#1a6a1a');
  ctx.fillStyle=cap;
  ctx.beginPath(); ctx.roundRect(x-4,top-26,PW+8,26,5); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x-4,top+GAP,PW+8,26,5); ctx.fill();
  // 광택
  ctx.fillStyle='rgba(255,255,255,0.13)';
  ctx.fillRect(x+7,0,7,top-26);
  ctx.fillRect(x+7,top+GAP+26,7,H-top-GAP-75-26);
}

function drawBird(y,vy){
  ctx.save(); ctx.translate(BIRD_X,y);
  let tilt=Math.max(-0.5,Math.min(0.45,vy*0.045));
  ctx.rotate(tilt);
  // 날개
  let wa=Math.sin(frame*0.32)*0.55+(vy<0?-0.3:0.2);
  ctx.save(); ctx.rotate(wa);
  let wg=ctx.createLinearGradient(-12,-4,10,6);
  wg.addColorStop(0,'#FFE066'); wg.addColorStop(1,'#FF9500');
  ctx.fillStyle=wg; ctx.beginPath(); ctx.ellipse(-7,-2,17,8,Math.PI*0.18,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // 몸통
  let bg=ctx.createRadialGradient(-3,-3,2,0,0,18);
  bg.addColorStop(0,'#FFF066'); bg.addColorStop(0.6,'#FFC107'); bg.addColorStop(1,'#FF8F00');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,18,15,0,0,Math.PI*2); ctx.fill();
  // 배
  ctx.fillStyle='rgba(255,255,200,0.45)'; ctx.beginPath(); ctx.ellipse(3,4,9,7,0.2,0,Math.PI*2); ctx.fill();
  // 눈
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(9,-5,6,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(10,-5,3.5,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(11,-6.5,1.3,1.3,0,0,Math.PI*2); ctx.fill();
  // 부리
  ctx.fillStyle='#FF6D00';
  ctx.beginPath(); ctx.moveTo(15,-2); ctx.lineTo(24,1); ctx.lineTo(15,4); ctx.closePath(); ctx.fill();
  // 뺨
  ctx.fillStyle='rgba(255,90,90,0.4)'; ctx.beginPath(); ctx.ellipse(5,3,5,3,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  bird={y:H/2,vy:0}; pipes=[]; score=0; frame=0; running=true;
  cancelAnimationFrame(af); loop();
}
function addPipe(){
  const minTop=70,maxTop=H-75-GAP-70;
  pipes.push({x:W+10,top:minTop+Math.random()*(maxTop-minTop),passed:false});
}
function loop(){
  if(!running) return;
  frame++;
  if(frame%115===0) addPipe();
  drawBG();
  bird.vy+=GRAVITY; bird.y+=bird.vy;
  for(let i=pipes.length-1;i>=0;i--){
    let p=pipes[i]; p.x-=SPD;
    drawPipe(p.x,p.top);
    if(!p.passed&&p.x+PW<BIRD_X){
      p.passed=true; score++;
      document.getElementById('score-display').textContent=score;
    }
    if(p.x+PW<0){pipes.splice(i,1);continue;}
    if(BIRD_X+15>p.x&&BIRD_X-15<p.x+PW&&(bird.y-15<p.top||bird.y+15>p.top+GAP)){
      running=false; cancelAnimationFrame(af); submitScore(score); return;
    }
  }
  drawBird(bird.y,bird.vy);
  if(bird.y+15>H-75||bird.y-15<0){running=false;cancelAnimationFrame(af);submitScore(score);return;}
  // HUD
  ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.beginPath(); ctx.roundRect(6,6,110,32,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 18px Arial';
  ctx.fillText('🏅 '+score,14,27);
  af=requestAnimationFrame(loop);
}
function flap(){ if(running) bird.vy=FLAP; }
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
canvas.addEventListener('click',flap);
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});

// 초기 화면
drawBG();
ctx.fillStyle='rgba(0,0,0,0.42)'; ctx.beginPath(); ctx.roundRect(55,185,270,115,18); ctx.fill();
ctx.fillStyle='#fff'; ctx.font='bold 22px Arial'; ctx.textAlign='center';
ctx.fillText('🐦 플래피 버드',W/2,225);
ctx.font='14px Arial'; ctx.fillText('스페이스 / 클릭 / 탭으로 점프',W/2,255);
ctx.fillText('시작 버튼을 눌러주세요',W/2,282); ctx.textAlign='left';
</script>
{% endblock %}
