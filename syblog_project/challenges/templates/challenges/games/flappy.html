{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:500px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:12px;width:100%;background:#87CEEB;touch-action:none;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.5);"></canvas>
  <div id="hud" style="position:absolute;top:10px;left:15px;right:15px;display:flex;justify-content:space-between;color:white;font-family:sans-serif;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.8);pointer-events:none;">
    <div style="font-size:20px;">점수: <span id="s-score" style="color:#f1c40f;">0</span></div>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=400,H=600;
canvas.width=W; canvas.height=H;

let af, running=false, score=0, frame=0;
let b={x:100,y:300,vy:0,a:0}, pipes=[], particles=[], bgs=[];

function spawnPipe(){
  let gap=150; let h=Math.random()*(H-gap-150)+50;
  pipes.push({x:W, w:60, hTop:h, hBot:H-h-gap, passed:false});
}

function spawnParticle(x,y,color){
  for(let i=0;i<10;i++) particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:20,c:color,r:Math.random()*4+1});
}

function loop(){
  if(!running) return;
  frame++;
  
  // BG Gradient
  let bgGradient=ctx.createLinearGradient(0,0,0,H); bgGradient.addColorStop(0,'#4db8ff'); bgGradient.addColorStop(1,'#b5e8ff');
  ctx.fillStyle=bgGradient; ctx.fillRect(0,0,W,H);

  // Parallax Buildings
  if(frame%80===0) bgs.push({x:W,w:50+Math.random()*50,h:100+Math.random()*200,c:`hsl(${Math.random()*360},30%,60%)`});
  bgs.forEach((bg,i)=>{
    bg.x-=1; ctx.fillStyle=bg.c; ctx.fillRect(bg.x, H-bg.h, bg.w, bg.h);
    if(bg.x<-bg.w) bgs.splice(i,1);
  });

  // Bird physics
  b.vy+=0.5; b.y+=b.vy;
  b.a = Math.min(Math.PI/4, Math.max(-Math.PI/4, (b.vy * 0.1)));

  // Pipes
  if(frame%90===0) spawnPipe();
  let pipeGrad=ctx.createLinearGradient(0,0,W,0); pipeGrad.addColorStop(0,'#73bf2e'); pipeGrad.addColorStop(1,'#558b2f');
  
  for(let i=pipes.length-1;i>=0;i--){
    let p=pipes[i]; p.x-=3;
    
    // Draw Top Pipe
    ctx.fillStyle=pipeGrad; ctx.fillRect(p.x, 0, p.w, p.hTop);
    ctx.fillStyle='#33691e'; ctx.fillRect(p.x-5, p.hTop-20, p.w+10, 20); // Cap
    
    // Draw Bottom Pipe
    ctx.fillStyle=pipeGrad; ctx.fillRect(p.x, H-p.hBot, p.w, p.hBot);
    ctx.fillStyle='#33691e'; ctx.fillRect(p.x-5, H-p.hBot, p.w+10, 20); // Cap
    
    // Score
    if(p.x+p.w<b.x && !p.passed){ p.passed=true; score+=10; spawnParticle(b.x,b.y,'#ffeb3b'); }
    
    // Collision
    if(b.x+15>p.x && b.x-15<p.x+p.w){
      if(b.y-15<p.hTop || b.y+15>H-p.hBot) gameOver();
    }
    
    if(p.x<-p.w) pipes.splice(i,1);
  }

  // Draw Bird
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.a);
  ctx.font='36px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐥',0,0);
  ctx.restore();

  // Ground collision
  if(b.y>H-15 || b.y<-15) gameOver();

  // Particles
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.life--; ctx.globalAlpha=Math.max(0,p.life/20);
    ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; particles=particles.filter(p=>p.life>0);

  document.getElementById('s-score').textContent=score;
  document.getElementById('score-display').textContent=score;

  af=requestAnimationFrame(loop);
}

function gameOver(){
  running=false; cancelAnimationFrame(af);
  spawnParticle(b.x,b.y,'#f00'); spawnParticle(b.x,b.y,'#ff0');
  setTimeout(()=>{submitScore(score);},1000);
}

function jump(){ if(running) b.vy=-8; }

document.addEventListener('keydown',e=>{if(e.code==='Space') jump();});
canvas.addEventListener('mousedown',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  b={x:100,y:300,vy:0,a:0}; pipes=[]; particles=[]; bgs=[]; score=0; frame=0;
  running=true; cancelAnimationFrame(af); loop();
}

// Preview
ctx.fillStyle='#4db8ff'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#ffea00'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center'; ctx.shadowBlur=15; ctx.shadowColor='#ffea00';
ctx.fillText('플래피 버드',W/2,H/2-20); ctx.shadowBlur=0;
ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
ctx.fillText('화면을 탭하여 파이프를 통과하세요',W/2,H/2+20);
</script>
{% endblock %}
