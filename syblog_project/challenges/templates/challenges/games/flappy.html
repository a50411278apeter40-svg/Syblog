{% extends 'challenges/game_base.html' %}
{% block game_area %}
<canvas id="gameCanvas" style="border-radius:12px;max-width:100%;touch-action:none;"></canvas>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=400,H=600;
canvas.width=W; canvas.height=H;

// 모바일 대응
canvas.style.width='min(400px,100vw)';
canvas.style.height='auto';

let bird,pipes,score,running=false,af,frame=0,clouds=[],bgX=0;
const GRAVITY=0.28, FLAP=-7, GAP=165, PW=65, BIRD_X=90, SPD=2.5;

// 클라우드 초기화
for(let i=0;i<4;i++) clouds.push({x:Math.random()*400,y:30+Math.random()*120,w:60+Math.random()*60,spd:0.3+Math.random()*0.3});

function drawBG(){
  // 하늘 그라디언트
  let sky=ctx.createLinearGradient(0,0,0,H*0.75);
  sky.addColorStop(0,'#56CCF2'); sky.addColorStop(1,'#87EAFF');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  // 구름
  clouds.forEach(c=>{
    ctx.save(); ctx.globalAlpha=0.85;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,c.w/2,c.w/3.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x+c.w*0.28,c.y-c.w*0.12,c.w*0.32,c.w*0.22,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x-c.w*0.25,c.y-c.w*0.08,c.w*0.28,c.w*0.18,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    c.x-=c.spd; if(c.x+c.w<0) c.x=W+c.w;
  });
  // 지면
  let ground=ctx.createLinearGradient(0,H-80,0,H);
  ground.addColorStop(0,'#8BC34A'); ground.addColorStop(0.35,'#6a9c2a');
  ground.addColorStop(0.35,'#d4a574'); ground.addColorStop(1,'#b8895a');
  ctx.fillStyle=ground; ctx.fillRect(0,H-80,W,80);
  // 잔디 선
  ctx.fillStyle='#9CCC46';
  for(let i=0;i<W;i+=18){
    ctx.beginPath();
    ctx.moveTo((i+bgX)%W,H-80);
    ctx.lineTo((i+8+bgX)%W,H-92);
    ctx.lineTo((i+16+bgX)%W,H-80);
    ctx.fill();
  }
}

function drawBird(y,vy){
  ctx.save(); ctx.translate(BIRD_X,y);
  // 날개 애니메이션
  let wingAngle=(vy<0?-0.6:0.3)+Math.sin(frame*0.3)*0.2;
  ctx.save(); ctx.rotate(wingAngle);
  let wing=ctx.createLinearGradient(-10,-5,10,5);
  wing.addColorStop(0,'#FFD54F'); wing.addColorStop(1,'#FF8F00');
  ctx.fillStyle=wing;
  ctx.beginPath(); ctx.ellipse(-8,-2,18,9,Math.PI*0.2,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // 몸통
  let body=ctx.createRadialGradient(-3,-3,2,0,0,20);
  body.addColorStop(0,'#FFEB3B'); body.addColorStop(0.7,'#FFC107'); body.addColorStop(1,'#FF8F00');
  ctx.fillStyle=body;
  ctx.beginPath(); ctx.ellipse(0,0,20,17,Math.PI*0.05,0,Math.PI*2); ctx.fill();
  // 눈
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(9,-5,7,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.ellipse(11,-5,4,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(12,-6.5,1.5,1.5,0,0,Math.PI*2); ctx.fill();
  // 부리
  ctx.fillStyle='#FF6D00';
  ctx.beginPath(); ctx.moveTo(16,-2); ctx.lineTo(26,0); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
  // 뺨
  ctx.fillStyle='rgba(255,100,100,0.45)';
  ctx.beginPath(); ctx.ellipse(5,3,5,3.5,0,0,Math.PI*2); ctx.fill();
  // 기울기 (낙하 시)
  ctx.restore();
}

function drawPipe(x,top){
  // 하단 파이프
  let gh=H-80-top-GAP;
  let pg=ctx.createLinearGradient(x,0,x+PW,0);
  pg.addColorStop(0,'#388E3C'); pg.addColorStop(0.4,'#66BB6A'); pg.addColorStop(0.7,'#388E3C'); pg.addColorStop(1,'#1B5E20');
  ctx.fillStyle=pg;
  // 상단 파이프 본체
  ctx.fillRect(x+4,0,PW-8,top);
  ctx.fillRect(x+4,top+GAP,PW-8,gh);
  // 캡 (상단)
  let capG=ctx.createLinearGradient(x,0,x+PW,0);
  capG.addColorStop(0,'#2E7D32'); capG.addColorStop(0.4,'#81C784'); capG.addColorStop(1,'#1B5E20');
  ctx.fillStyle=capG;
  ctx.beginPath(); ctx.roundRect(x-3,top-28,PW+6,28,4); ctx.fill();
  // 캡 (하단)
  ctx.beginPath(); ctx.roundRect(x-3,top+GAP,PW+6,28,4); ctx.fill();
  // 광택
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(x+8,0,8,top);
  ctx.fillRect(x+8,top+GAP+28,8,gh);
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  bird={y:H/2,vy:0}; pipes=[]; score=0; frame=0; running=true;
  cancelAnimationFrame(af); loop();
}

function addPipe(){
  const minTop=80, maxTop=H-80-GAP-80;
  pipes.push({x:W,top:minTop+Math.random()*(maxTop-minTop),passed:false});
}

function loop(){
  if(!running)return;
  frame++;
  bgX=(bgX+SPD)%18;
  // 파이프 생성
  if(frame%110===0) addPipe();
  drawBG();
  // 새 물리
  bird.vy+=GRAVITY; bird.y+=bird.vy;
  // 파이프
  for(let i=pipes.length-1;i>=0;i--){
    let p=pipes[i]; p.x-=SPD;
    drawPipe(p.x,p.top);
    if(!p.passed && p.x+PW<BIRD_X){
      p.passed=true; score++;
      document.getElementById('score-display').textContent=score;
    }
    if(p.x+PW<0){ pipes.splice(i,1); continue; }
    // 충돌
    if(BIRD_X+17>p.x&&BIRD_X-17<p.x+PW&&(bird.y-17<p.top||bird.y+17>p.top+GAP)){
      gameOver(); return;
    }
  }
  drawBird(bird.y,bird.vy);
  // 바닥/천장
  if(bird.y+17>H-80||bird.y-17<0){ gameOver(); return; }
  // 점수 HUD
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.roundRect(8,8,130,36,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 18px Arial';
  ctx.fillText('🏆 '+score,18,30);
  af=requestAnimationFrame(loop);
}

function gameOver(){ running=false; submitScore(score); }
function flap(){ if(running){ bird.vy=FLAP; } }

document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();flap();} });
canvas.addEventListener('click',flap);
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});

// 초기 화면
drawBG();
ctx.fillStyle='rgba(0,0,0,0.45)';
ctx.beginPath(); ctx.roundRect(60,190,280,120,18); ctx.fill();
ctx.fillStyle='#fff'; ctx.font='bold 22px Arial'; ctx.textAlign='center';
ctx.fillText('🐦 플래피 버드',W/2,230);
ctx.font='15px Arial'; ctx.fillText('스페이스 / 클릭 / 탭으로 점프!',W/2,260);
ctx.fillText('시작 버튼을 눌러주세요',W/2,290); ctx.textAlign='left';
</script>
{% endblock %}
