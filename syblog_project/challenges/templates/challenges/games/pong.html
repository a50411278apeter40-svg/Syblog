{% extends 'challenges/game_base.html' %}
{% block game_area %}
<canvas id="gameCanvas" width="600" height="400" style="background:#0d1b2a;border-radius:8px;"></canvas>
<small class="d-block text-center text-muted mt-1">마우스로 오른쪽 패들 조작</small>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');
let ball,p1,p2,score,aiScore,running=false,animFrame;
function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  ball={x:300,y:200,dx:5,dy:3,r:8};
  p1={x:10,y:160,w:12,h:80,score:0};
  p2={x:578,y:160,w:12,h:80,score:0};
  score=0; running=true;
  cancelAnimationFrame(animFrame); loop();
}
function loop(){
  if(!running)return;
  ctx.fillStyle='#0d1b2a';ctx.fillRect(0,0,600,400);
  // center line
  ctx.setLineDash([10,10]);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.moveTo(300,0);ctx.lineTo(300,400);ctx.stroke();ctx.setLineDash([]);
  ball.x+=ball.dx; ball.y+=ball.dy;
  if(ball.y-ball.r<0||ball.y+ball.r>400) ball.dy*=-1;
  // AI (p1)
  if(ball.x<300){ if(p1.y+p1.h/2<ball.y) p1.y+=4; else p1.y-=4; }
  p1.y=Math.max(0,Math.min(320,p1.y)); p2.y=Math.max(0,Math.min(320,p2.y));
  // collision
  if(ball.x-ball.r<p1.x+p1.w&&ball.y>p1.y&&ball.y<p1.y+p1.h) ball.dx=Math.abs(ball.dx);
  if(ball.x+ball.r>p2.x&&ball.y>p2.y&&ball.y<p2.y+p2.h){ ball.dx=-Math.abs(ball.dx); score++; document.getElementById('score-display').textContent=score; }
  if(ball.x<0){ running=false; submitScore(score); return; }
  if(ball.x>600){ ball.x=300; ball.y=200; ball.dx=-5; }
  ctx.fillStyle='#6c63ff';ctx.fillRect(p1.x,p1.y,p1.w,p1.h);
  ctx.fillStyle='#48cfad';ctx.fillRect(p2.x,p2.y,p2.w,p2.h);
  ctx.fillStyle='#ffd200';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.font='bold 30px sans-serif';ctx.textAlign='center';
  ctx.fillText(score,450,40);ctx.textAlign='left';
  animFrame=requestAnimationFrame(loop);
}
document.addEventListener('mousemove',e=>{
  if(!running||!p2)return;
  const r=canvas.getBoundingClientRect();
  p2.y=e.clientY-r.top-p2.h/2;
});
ctx.fillStyle='#0d1b2a';ctx.fillRect(0,0,600,400);
ctx.fillStyle='#6c63ff';ctx.font='16px sans-serif';ctx.textAlign='center';
ctx.fillText('마우스로 오른쪽 패들 조작! 시작 버튼을 눌러주세요.',300,200);ctx.textAlign='left';
</script>
{% endblock %}
