{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:400px;margin:0 auto;background:#141020;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.8);">
  <canvas id="gameCanvas" style="width:100%;touch-action:none;"></canvas>
  <div id="hud" style="position:absolute;top:10px;left:15px;right:15px;display:flex;justify-content:space-between;color:white;font-family:sans-serif;font-weight:bold;pointer-events:none;">
    <div style="font-size:16px;">SCORE: <span id="s-score" style="color:#00e5ff;">0</span></div>
    <div style="font-size:16px;">COMBO: <span id="s-combo" style="color:#ff00ff;">0</span></div>
  </div>
</div>
<div style="display:flex;gap:8px;margin-top:12px;justify-content:center;max-width:400px;margin-left:auto;margin-right:auto;">
  <button class="rkey" data-key="0" style="flex:1;height:70px;border-radius:12px;border:3px solid #ff0055;background:rgba(255,0,85,0.1);color:#ff0055;font-size:24px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:inset 0 0 10px rgba(255,0,85,0.5);">D</button>
  <button class="rkey" data-key="1" style="flex:1;height:70px;border-radius:12px;border:3px solid #00e5ff;background:rgba(0,229,255,0.1);color:#00e5ff;font-size:24px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:inset 0 0 10px rgba(0,229,255,0.5);">F</button>
  <button class="rkey" data-key="2" style="flex:1;height:70px;border-radius:12px;border:3px solid #ffaa00;background:rgba(255,170,0,0.1);color:#ffaa00;font-size:24px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:inset 0 0 10px rgba(255,170,0,0.5);">J</button>
  <button class="rkey" data-key="3" style="flex:1;height:70px;border-radius:12px;border:3px solid #b700ff;background:rgba(183,0,255,0.1);color:#b700ff;font-size:24px;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:inset 0 0 10px rgba(183,0,255,0.5);">K</button>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=400,H=500;
canvas.width=W; canvas.height=H;

const LANES=4, LANE_W=W/LANES, HIT_Y=H-80, NOTE_SPD=6;
const COLORS=['#ff0055','#00e5ff','#ffaa00','#b700ff'];
const KEYS=['KeyD','KeyF','KeyJ','KeyK'];

// 간단한 자동생성 패턴 (10초 분량)
let PATTERNS=[];
for(let i=0;i<80;i++){
  PATTERNS.push([Math.floor(Math.random()*4), 1000 + i*400]);
  if(i%5===0) PATTERNS.push([Math.floor(Math.random()*4), 1000 + i*400]); // 동시치기
}

let notes=[],score=0,combo=0,maxCombo=0,running=false,af,startTime=0,gameTime=0;
let laneFlash=[0,0,0,0];
let particles=[], judgement={text:'',timer:0,c:'#fff',s:1};

function initGame(){
  notes=PATTERNS.map(([l,t])=>({lane:l,timeMs:t,y:-50,hit:false,missed:false}));
  score=0;combo=0;maxCombo=0; particles=[]; judgement.timer=0;
  startTime=performance.now(); gameTime=0;
}

function spawnHitParticle(lane){
  let cx=lane*LANE_W+LANE_W/2;
  for(let i=0;i<12;i++){
    let a=Math.random()*Math.PI*2, s=2+Math.random()*6;
    particles.push({x:cx,y:HIT_Y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20+Math.random()*15,maxLife:35,c:COLORS[lane],r:Math.random()*3+2});
  }
}

function hitLane(lane){
  if(!running) return;
  laneFlash[lane]=15;
  let t=performance.now()-startTime;
  let eligible=notes.filter(n=>n.lane===lane&&!n.hit&&!n.missed);
  if(!eligible.length) return;
  let n=eligible.reduce((a,b)=>Math.abs(a.timeMs-(t-1500))<Math.abs(b.timeMs-(t-1500))?a:b);
  let diff=Math.abs(n.timeMs-(t-1500));
  
  if(diff<80){ n.hit=true; combo++; score+=300+combo*10; judgement={text:'PERFECT',timer:30,c:'#ffea00',s:1.5}; spawnHitParticle(lane); }
  else if(diff<150){ n.hit=true; combo++; score+=100+combo*5; judgement={text:'GOOD',timer:30,c:'#00e5ff',s:1.2}; spawnHitParticle(lane); }
  else { combo=0; judgement={text:'MISS',timer:30,c:'#ff0055',s:1}; }
  maxCombo=Math.max(maxCombo,combo);
}

document.querySelectorAll('.rkey').forEach(btn=>{
  let l=parseInt(btn.dataset.key);
  btn.addEventListener('touchstart',e=>{e.preventDefault();hitLane(l);btn.style.background=COLORS[l];},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();btn.style.background=`rgba(${hexToRgb(COLORS[l])},0.1)`;},{passive:false});
  btn.addEventListener('mousedown',e=>{e.preventDefault();hitLane(l);btn.style.background=COLORS[l];});
  btn.addEventListener('mouseup',e=>{e.preventDefault();btn.style.background=`rgba(${hexToRgb(COLORS[l])},0.1)`;});
});
document.addEventListener('keydown',e=>{ let i=KEYS.indexOf(e.code); if(i>=0&&running){ e.preventDefault(); hitLane(i); } });

function hexToRgb(hex){ let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `${r},${g},${b}`; }

function loop(){
  if(!running) return;
  gameTime=performance.now()-startTime;
  
  // Draw BG
  ctx.fillStyle='#141020'; ctx.fillRect(0,0,W,H);
  
  // Lanes
  for(let i=0;i<LANES;i++){
    let x=i*LANE_W;
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    if(laneFlash[i]>0){
      let g=ctx.createLinearGradient(0,HIT_Y-100,0,H);
      g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,`rgba(${hexToRgb(COLORS[i])},${laneFlash[i]/15})`);
      ctx.fillStyle=g; ctx.fillRect(x,0,LANE_W,H);
      laneFlash[i]--;
    }
  }

  // Hit line
  ctx.shadowBlur=10; ctx.shadowColor='#fff'; ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,HIT_Y); ctx.lineTo(W,HIT_Y); ctx.stroke(); ctx.shadowBlur=0;
  
  for(let i=0;i<LANES;i++){
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.roundRect(i*LANE_W+10,HIT_Y-10,LANE_W-20,20,5); ctx.fill();
  }

  // Notes
  notes.forEach(n=>{
    if(n.hit||n.missed) return;
    n.y = HIT_Y - (n.timeMs - gameTime + 1500) * NOTE_SPD/16;
    if(n.y>HIT_Y+40&&!n.hit){ n.missed=true; combo=0; judgement={text:'MISS',timer:30,c:'#ff0055',s:1}; }
    if(n.y>-50 && n.y<H+50){
      let cx=n.lane*LANE_W+LANE_W/2;
      ctx.shadowBlur=15; ctx.shadowColor=COLORS[n.lane];
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(cx-LANE_W*0.4,n.y-10,LANE_W*0.8,20,10); ctx.fill();
      ctx.fillStyle=COLORS[n.lane]; ctx.beginPath(); ctx.roundRect(cx-LANE_W*0.3,n.y-6,LANE_W*0.6,12,6); ctx.fill();
      ctx.shadowBlur=0;
    }
  });

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; particles=particles.filter(p=>p.life>0);

  // Judgement text
  if(judgement.timer>0){
    judgement.timer--;
    ctx.globalAlpha=Math.min(1, judgement.timer/15);
    ctx.fillStyle=judgement.c; ctx.font=`bold ${24*judgement.s}px Arial`; ctx.textAlign='center';
    ctx.fillText(judgement.text, W/2, H/2-50);
    ctx.globalAlpha=1;
  }

  document.getElementById('s-score').textContent=score;
  document.getElementById('s-combo').textContent=combo;
  document.getElementById('score-display').textContent=score;

  let remaining=notes.filter(n=>!n.hit&&!n.missed);
  if(remaining.length===0 && gameTime>PATTERNS[PATTERNS.length-1][1]+3000){ running=false; setTimeout(()=>{submitScore(score);},1000); return; }

  af=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  initGame(); running=true; cancelAnimationFrame(af); loop();
}

// Preview
ctx.fillStyle='#141020'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#b700ff'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center'; ctx.shadowBlur=15; ctx.shadowColor='#b700ff';
ctx.fillText('NEON RHYTHM',W/2,H/2-20); ctx.shadowBlur=0;
ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
ctx.fillText('내려오는 노트를 타이밍에 맞게 누르세요',W/2,H/2+20);
</script>
{% endblock %}
