{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="display:flex;flex-direction:column;align-items:center;">
<div id="board-2048" style="display:grid;grid-template-columns:repeat(4,90px);gap:8px;background:#bbada0;padding:10px;border-radius:8px;"></div>
<small class="mt-2 text-muted">방향키로 이동</small>
</div>
{% endblock %}
{% block game_script %}
<script>
let board,score,running=false;
const COLORS={2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
function newBoard(){ return Array(4).fill(0).map(()=>Array(4).fill(0)); }
function addRandom(b){
  const empty=[];
  b.forEach((row,i)=>row.forEach((v,j)=>{ if(!v) empty.push([i,j]); }));
  if(!empty.length)return;
  const [i,j]=empty[Math.floor(Math.random()*empty.length)];
  b[i][j]=Math.random()<0.9?2:4;
}
function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  board=newBoard(); score=0; running=true;
  addRandom(board); addRandom(board); render();
}
function render(){
  const el=document.getElementById('board-2048');
  el.innerHTML='';
  board.forEach(row=>row.forEach(v=>{
    const cell=document.createElement('div');
    cell.style.cssText='width:90px;height:90px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:'+(v>=1024?'1.2rem':'1.5rem')+';background:'+(COLORS[v]||'#3c3a32')+';color:'+(v>4?'#f9f6f2':'#776e65')+';';
    cell.textContent=v||'';
    el.appendChild(cell);
  }));
  document.getElementById('score-display').textContent=score;
}
function slide(row){
  let r=row.filter(v=>v);
  for(let i=0;i<r.length-1;i++){ if(r[i]===r[i+1]){ r[i]*=2; score+=r[i]; r.splice(i+1,1); i++; } }
  while(r.length<4) r.push(0);
  return r;
}
function move(dir){
  if(!running)return;
  let moved=false;
  const copy=board.map(r=>[...r]);
  if(dir==='left') board=board.map(r=>slide(r));
  else if(dir==='right') board=board.map(r=>slide([...r].reverse()).reverse());
  else if(dir==='up'){
    for(let c=0;c<4;c++){ const col=board.map(r=>r[c]); const s=slide(col); s.forEach((v,r)=>board[r][c]=v); }
  } else {
    for(let c=0;c<4;c++){ const col=board.map(r=>r[c]).reverse(); const s=slide(col).reverse(); s.forEach((v,r)=>board[r][c]=v); }
  }
  if(JSON.stringify(board)!==JSON.stringify(copy)){ moved=true; addRandom(board); }
  render();
  if(board.some(r=>r.includes(2048))){ running=false; submitScore(score); return; }
  if(!canMove()){ running=false; submitScore(score); }
}
function canMove(){
  for(let i=0;i<4;i++) for(let j=0;j<4;j++){
    if(!board[i][j])return true;
    if(j<3&&board[i][j]===board[i][j+1])return true;
    if(i<3&&board[i][j]===board[i+1][j])return true;
  }
  return false;
}
document.addEventListener('keydown',e=>{
  const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(m[e.key]){e.preventDefault();move(m[e.key]);}
});
// Touch
let tx,ty;
document.getElementById('board-2048').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
document.getElementById('board-2048').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});
render();
</script>
{% endblock %}
