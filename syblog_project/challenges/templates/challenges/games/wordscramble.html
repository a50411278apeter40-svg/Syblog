{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div class="text-center" style="min-height:350px;">
  <div id="scramble-word" style="font-size:2.5rem;font-weight:800;letter-spacing:8px;color:#ffd200;margin:30px 0;"></div>
  <input type="text" id="word-input" class="form-control" style="max-width:300px;margin:0 auto;font-size:1.3rem;text-align:center;" placeholder="원래 단어는?" autocomplete="off">
  <div class="mt-3">
    <button class="btn btn-primary" onclick="checkWord()">확인 (Enter)</button>
    <button class="btn btn-outline-light ml-2" onclick="skipWord()">스킵</button>
  </div>
  <div class="mt-3">
    <span id="time-left" style="font-size:1.3rem;color:#48cfad;">⏱ 60</span>초
    <span id="hints-area" class="ml-4 text-muted"></span>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const WORDS2=['python','django','react','server','github','docker','linux','array','class','loop',
'function','import','return','string','module','database','request','response','template','static'];
let current,score,timeLeft,timer,running=false;
function scramble(w){ return w.split('').sort(()=>Math.random()-0.5).join(''); }
function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  score=0; timeLeft=60; running=true;
  nextWord();
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById('time-left').textContent='⏱ '+timeLeft;
    if(timeLeft<=0){ clearInterval(timer); running=false; submitScore(score); }
  },1000);
}
function nextWord(){
  current=WORDS2[Math.floor(Math.random()*WORDS2.length)];
  let sc=scramble(current);
  while(sc===current) sc=scramble(current);
  document.getElementById('scramble-word').textContent=sc.toUpperCase();
  document.getElementById('word-input').value='';
  document.getElementById('hints-area').textContent='힌트: '+current.length+'글자';
  document.getElementById('word-input').focus();
}
function checkWord(){
  if(!running)return;
  const val=document.getElementById('word-input').value.trim().toLowerCase();
  if(val===current){ score+=current.length*5; document.getElementById('score-display').textContent=score; document.getElementById('scramble-word').style.color='#48cfad'; setTimeout(()=>{ document.getElementById('scramble-word').style.color='#ffd200'; nextWord(); },300); }
  else { document.getElementById('scramble-word').style.color='#ff6b6b'; setTimeout(()=>document.getElementById('scramble-word').style.color='#ffd200',300); }
}
function skipWord(){ if(running){ score=Math.max(0,score-2); nextWord(); } }
document.getElementById('word-input').addEventListener('keydown',e=>{ if(e.key==='Enter') checkWord(); });
document.getElementById('scramble-word').textContent='시작 버튼을 눌러주세요';
</script>
{% endblock %}
