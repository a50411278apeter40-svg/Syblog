{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div class="text-center" style="min-height:350px;">
  <div style="font-size:5rem;margin:30px 0;" id="arrow-display">⬛</div>
  <div style="font-size:2rem;color:#aaa;">← → ↑ ↓</div>
  <div class="mt-3">
    <span id="combo-info" style="font-size:1.1rem;color:#ffd200;">콤보: 0</span>
    <span class="ml-4" id="time-info" style="color:#48cfad;">⏱ 30</span>
  </div>
  <div id="result-msg" style="font-size:1.5rem;min-height:2rem;margin-top:10px;"></div>
</div>
{% endblock %}
{% block game_script %}
<script>
const ARROWS=['←','→','↑','↓'];const KEYS={ArrowLeft:'←',ArrowRight:'→',ArrowUp:'↑',ArrowDown:'↓'};
let current,score,combo,timeLeft,timer,running=false;
function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  score=0; combo=0; timeLeft=30; running=true;
  nextArrow();
  clearInterval(timer);
  timer=setInterval(()=>{timeLeft--;document.getElementById('time-info').textContent='⏱ '+timeLeft;if(timeLeft<=0){clearInterval(timer);running=false;submitScore(score);}},1000);
}
function nextArrow(){
  current=ARROWS[Math.floor(Math.random()*4)];
  document.getElementById('arrow-display').textContent=current;
  document.getElementById('result-msg').textContent='';
}
document.addEventListener('keydown',e=>{
  if(!running||!KEYS[e.key])return;
  e.preventDefault();
  if(KEYS[e.key]===current){ combo++; score+=combo; document.getElementById('result-msg').innerHTML='<span style="color:#48cfad">✅ 정확!</span>'; document.getElementById('combo-info').textContent='콤보: '+combo; }
  else { combo=0; document.getElementById('result-msg').innerHTML='<span style="color:#ff6b6b">❌ 틀림!</span>'; document.getElementById('combo-info').textContent='콤보: 0'; }
  document.getElementById('score-display').textContent=score;
  setTimeout(nextArrow,200);
});
</script>
{% endblock %}
