{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:480px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:16px;width:100%;display:block;touch-action:none;box-shadow:0 10px 40px rgba(0,0,0,0.6);"></canvas>
  <div style="text-align:center;margin-top:6px;color:#aaa;font-size:13px;">클릭/탭으로 낚싯줄 투척 → 물고기가 물리면 다시 클릭!</div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=480,H=560;
canvas.width=W;canvas.height=H;

const WATER_Y=180;
let af,running=false,score=0,frame=0,timeLeft=90;
let hook,fishArr,bubbles,particles,seaweed;
let hookState='idle',reelTimer=0,timerInt;

const FISH_DATA=[
  {name:'정어리',color:'#95A5A6',w:36,h:18,pts:5,speed:2.5,rare:false},
  {name:'붕어',color:'#E67E22',w:48,h:24,pts:10,speed:2,rare:false},
  {name:'잉어',color:'#E74C3C',w:60,h:30,pts:20,speed:1.8,rare:false},
  {name:'참치',color:'#2980B9',w:80,h:36,pts:50,speed:1.5,rare:false},
  {name:'복어',color:'#F1C40F',w:50,h:46,pts:35,speed:1.2,rare:false},
  {name:'황금어',color:'#FFD700',w:56,h:28,pts:100,speed:3,rare:true},
  {name:'상어',color:'#5D6D7E',w:100,h:44,pts:200,speed:1,rare:true},
  {name:'해마',color:'#9B59B6',w:28,h:50,pts:80,speed:0.8,rare:true},
];

function spawnFish(){
  const data=FISH_DATA[Math.random()<0.15?Math.floor(5+Math.random()*3):Math.floor(Math.random()*5)];
  const fromLeft=Math.random()<0.5;
  return {...data,x:fromLeft?-120:W+120,y:WATER_Y+30+Math.random()*(H-WATER_Y-60),vx:(fromLeft?1:-1)*data.speed,hooked:false,biting:false,escaping:false,escapeTimer:0,anim:0,dir:fromLeft?1:-1};
}

function initGame(){
  score=0;frame=0;timeLeft=90;particles=[];
  hook={x:W/2,y:WATER_Y-20,vy:0,state:'idle',biting:null,lineX:W/2};
  hookState='idle';
  fishArr=Array.from({length:8},spawnFish);
  bubbles=Array.from({length:20},()=>({x:Math.random()*W,y:WATER_Y+20+Math.random()*(H-WATER_Y-20),r:Math.random()*5+2,vy:-(Math.random()*0.6+0.3),alpha:Math.random()}));
  seaweed=Array.from({length:12},()=>({x:Math.random()*W,y:H,h:40+Math.random()*80,phase:Math.random()*Math.PI*2,color:`hsl(${120+Math.random()*40},50%,30%)`}));
}

function drawFish(f){
  ctx.save();ctx.translate(f.x,f.y);if(f.dir<0)ctx.scale(-1,1);
  // Body
  const fg=ctx.createLinearGradient(-f.w/2,0,f.w/2,0);
  fg.addColorStop(0,darken(f.color,20));fg.addColorStop(0.4,lighten(f.color,25));fg.addColorStop(1,darken(f.color,10));
  ctx.fillStyle=fg;
  ctx.beginPath();ctx.ellipse(0,0,f.w/2,f.h/2,0,0,Math.PI*2);ctx.fill();
  // Tail
  ctx.fillStyle=darken(f.color,15);
  ctx.beginPath();ctx.moveTo(-f.w/2,0);ctx.lineTo(-f.w/2-f.w/3,-f.h/2-3);ctx.lineTo(-f.w/2-f.w/3,f.h/2+3);ctx.closePath();ctx.fill();
  // Fin
  ctx.fillStyle=darken(f.color,10);
  ctx.beginPath();ctx.moveTo(-f.w/6,-f.h/2);ctx.lineTo(f.w/5,-f.h/2-f.h/2);ctx.lineTo(f.w/4,-f.h/2);ctx.fill();
  // Eye
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(f.w/2-8,-(f.h/4),f.h/6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(f.w/2-7,-(f.h/4),f.h/9,0,Math.PI*2);ctx.fill();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(0,-f.h*0.15,f.w*0.2,f.h*0.12,0,0,Math.PI*2);ctx.fill();
  // Scales pattern
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.arc(i*f.w/4,-f.h/6,f.h/3,0.2,Math.PI-0.2);ctx.stroke();}
  // Rare glow
  if(f.rare){ctx.shadowBlur=20;ctx.shadowColor=f.color;ctx.strokeStyle=f.color+'99';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,f.w/2+4,f.h/2+4,0,0,Math.PI*2);ctx.stroke();}
  if(f.biting){ctx.font='14px serif';ctx.textAlign='center';ctx.fillText('❗',0,-f.h/2-16);}
  ctx.restore();
}

function loop(){
  if(!running)return;
  frame++;

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,WATER_Y);
  sky.addColorStop(0,'#1a6eb5');sky.addColorStop(1,'#64b5f6');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,WATER_Y);

  // Sun
  ctx.fillStyle='#FFD700';ctx.shadowBlur=30;ctx.shadowColor='#FFD700';
  ctx.beginPath();ctx.arc(70,55,36,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  // Sun rays
  ctx.strokeStyle='rgba(255,215,0,0.3)';ctx.lineWidth=2;
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;ctx.beginPath();ctx.moveTo(70+Math.cos(a)*44,55+Math.sin(a)*44);ctx.lineTo(70+Math.cos(a)*60,55+Math.sin(a)*60);ctx.stroke();}

  // Mountains bg
  ctx.fillStyle='rgba(30,80,120,0.45)';
  ctx.beginPath();ctx.moveTo(0,WATER_Y);[0,80,140,220,310,390,480].forEach((x,i)=>{ctx.lineTo(x,WATER_Y-(i%2===0?80:50)-(i*12)%60);});ctx.lineTo(W,WATER_Y);ctx.fill();

  // Clouds
  [[80,40],[260,28],[420,50]].forEach(([cx,cy])=>{
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.shadowBlur=10;ctx.shadowColor='#fff';
    ctx.beginPath();ctx.arc(cx+Math.sin(frame*0.01)*5,cy,24,0,Math.PI*2);ctx.arc(cx+28+Math.sin(frame*0.01)*5,cy-8,18,0,Math.PI*2);ctx.arc(cx+50+Math.sin(frame*0.01)*5,cy,18,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });

  // Water surface shimmer
  const wg=ctx.createLinearGradient(0,WATER_Y,0,H);
  wg.addColorStop(0,'#1565C0');wg.addColorStop(0.3,'#1976D2');wg.addColorStop(1,'#0D47A1');
  ctx.fillStyle=wg;ctx.fillRect(0,WATER_Y,W,H-WATER_Y);

  // Waves
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=2;
  for(let w2=0;w2<4;w2++){
    ctx.beginPath();
    for(let x=0;x<W;x+=4){ctx.lineTo(x,WATER_Y+w2*15+Math.sin(x*0.04+frame*0.04+w2)*6);}
    ctx.stroke();
  }

  // Seaweed
  seaweed.forEach(s=>{
    s.phase+=0.02;
    ctx.strokeStyle=s.color;ctx.lineWidth=6;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(s.x,H);
    for(let i=1;i<=5;i++){ctx.quadraticCurveTo(s.x+Math.sin(s.phase+i)*18,H-s.h*i/5,s.x+Math.sin(s.phase+i+0.5)*12,H-s.h*i/5+5);}
    ctx.stroke();
  });

  // Bubbles
  bubbles.forEach(b=>{
    b.y+=b.vy;if(b.y<WATER_Y){b.y=H;b.x=Math.random()*W;}
    ctx.save();ctx.globalAlpha=b.alpha*0.5;ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();ctx.restore();
  });

  // Fishing rod
  ctx.strokeStyle='#8B6914';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(W/2-60,30);ctx.quadraticCurveTo(W/2-20,50,W/2+20,70);ctx.stroke();
  ctx.fillStyle='#6B4226';ctx.beginPath();ctx.ellipse(W/2-60,30,12,8,0,0,Math.PI*2);ctx.fill();

  // Fishing line
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(W/2+20,70);
  if(hookState==='idle') ctx.lineTo(hook.lineX,WATER_Y);
  else ctx.lineTo(hook.x,hook.y);
  ctx.stroke();ctx.setLineDash([]);

  // Hook
  if(hookState!=='idle'){
    ctx.save();ctx.translate(hook.x,hook.y);
    ctx.strokeStyle='#888';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(0,0);ctx.arc(5,0,5,Math.PI,0);ctx.stroke();
    ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(0,-12,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Fish
  fishArr.forEach((f,i)=>{
    if(!f.hooked){
      f.x+=f.vx;f.anim++;
      f.y+=Math.sin(f.anim*0.05)*0.5;
      if(f.x>W+150||f.x<-150){
        fishArr[i]=spawnFish();
      }
      // Near hook → bite chance
      if(hookState==='down'&&!f.biting&&Math.abs(f.x-hook.x)<60&&Math.abs(f.y-hook.y)<40&&hook.y>WATER_Y){
        f.biting=true;
        reelTimer=setTimeout(()=>{if(f.biting){f.biting=false;f.escaping=true;}},2200);
      }
      drawFish(f);
    }
  });

  // Hook physics
  if(hookState==='casting'){
    hook.vy+=0.4;hook.y+=hook.vy;
    if(hook.y>H-30){hookState='down';hook.vy=0;}
  } else if(hookState==='reeling'){
    hook.y-=8;
    const caught=fishArr.find(f=>f.hooked);
    if(caught){caught.x=hook.x;caught.y=hook.y;}
    if(hook.y<WATER_Y-40){
      if(caught){
        score+=caught.pts*(caught.rare?3:1);
        particles.push({x:hook.x,y:WATER_Y,text:`+${caught.pts*(caught.rare?3:1)}pts ${caught.name}!`,color:caught.rare?'#FFD700':'#2ECC71',life:90,vy:-1.5});
        caught.hooked=false;caught.x=-200;
        setTimeout(()=>{fishArr[fishArr.indexOf(caught)]=spawnFish();},500);
      }
      hookState='idle';hook.y=WATER_Y-20;
    }
  }

  // Particle text
  particles.forEach(pt=>{pt.y+=pt.vy;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  particles.forEach(pt=>{
    ctx.save();ctx.globalAlpha=Math.min(1,pt.life/30);
    ctx.fillStyle=pt.color;ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=3;
    ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeText(pt.text,pt.x||W/2,pt.y);ctx.fillText(pt.text,pt.x||W/2,pt.y);
    ctx.restore();
  });

  // Angler
  ctx.font='36px serif';ctx.textAlign='center';ctx.fillText('🧑‍🌾',W/2-55,55);

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(10,10,170,52,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`점수: ${score}`,16,14);ctx.fillText(`⏱ ${timeLeft}초`,16,34);
  // Status
  const statusText=hookState==='idle'?'클릭하여 낚싯줄 투척':hookState==='down'?'물고기를 기다리는 중...':hookState==='reeling'?'낚아올리는 중!':'';
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(W/2-120,H-46,240,32,8);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(statusText,W/2,H-30);

  document.getElementById('score-display').textContent=score;
  af=requestAnimationFrame(loop);
}

function handleClick(){
  if(!running)return;
  if(hookState==='idle'){
    hookState='casting';hook.y=WATER_Y-20;hook.vy=-8;
  } else if(hookState==='down'){
    const bitingFish=fishArr.find(f=>f.biting&&Math.abs(f.x-hook.x)<60&&Math.abs(f.y-hook.y)<40);
    if(bitingFish){bitingFish.hooked=true;bitingFish.biting=false;}
    hookState='reeling';
  } else if(hookState==='casting'){
    hookState='reeling';
  }
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  initGame();running=true;cancelAnimationFrame(af);
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!running){clearInterval(timerInt);return;}
    timeLeft--;if(timeLeft<=0){clearInterval(timerInt);running=false;cancelAnimationFrame(af);setTimeout(()=>submitScore(score),800);}
  },1000);
  loop();
}

canvas.addEventListener('click',handleClick);
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleClick();},{passive:false});

function lighten(hex,pct){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const f=pct/100;return'#'+[r,g,b].map(v=>Math.min(255,Math.round(v+(255-v)*f)).toString(16).padStart(2,'0')).join('');}catch(e){return hex;}}
function darken(hex,pct){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const f=1-pct/100;return'#'+[r,g,b].map(v=>Math.max(0,Math.round(v*f)).toString(16).padStart(2,'0')).join('');}catch(e){return hex;}}

// Preview
const sky2=ctx.createLinearGradient(0,0,0,WATER_Y);sky2.addColorStop(0,'#1a6eb5');sky2.addColorStop(1,'#64b5f6');
ctx.fillStyle=sky2;ctx.fillRect(0,0,W,WATER_Y);
ctx.fillStyle='#1565C0';ctx.fillRect(0,WATER_Y,W,H-WATER_Y);
ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#64b5f6';ctx.font='bold 32px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.shadowBlur=15;ctx.shadowColor='#64b5f6';ctx.fillText('🎣 낚시 게임',W/2,H/2-24);
ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.fillText('클릭하여 낚싯줄 투척!',W/2,H/2+18);ctx.fillText('물고기가 물리면 다시 클릭하여 올리기',W/2,H/2+44);
</script>
{% endblock %}
