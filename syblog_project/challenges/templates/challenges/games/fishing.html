{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:500px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:12px;width:100%;background:#87CEEB;touch-action:none;cursor:crosshair;box-shadow:0 10px 30px rgba(0,0,0,0.5);"></canvas>
  <div id="hud" style="position:absolute;top:10px;left:15px;right:15px;display:flex;justify-content:space-between;color:white;font-family:sans-serif;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.8);pointer-events:none;">
    <div style="font-size:20px;">점수: <span id="s-score" style="color:#f1c40f;">0</span></div>
    <div style="font-size:20px;">시간: <span id="s-time">60</span></div>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=500,H=600;
canvas.width=W; canvas.height=H;
let af, running=false, score=0, time=60, frame=0;
let hook={x:W/2,y:100,vy:0,state:'idle'}, fishes=[], particles=[], bubbles=[];

function spawnFish(){
  let types=[{e:'🐟',pts:10,s:2},{e:'🐠',pts:20,s:3},{e:'🐡',pts:30,s:1.5},{e:'🦈',pts:-50,s:4}];
  let t=types[Math.floor(Math.random()*types.length)];
  let dir=Math.random()>0.5?1:-1;
  fishes.push({x:dir===1?-50:W+50, y:Math.random()*(H-250)+200, e:t.e, pts:t.pts, vx:dir*t.s, dir});
}

function loop(){
  if(!running) return;
  frame++;
  if(frame%60===0 && time>0) time--;

  // Sky and Sea
  ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,W,150);
  let sea=ctx.createLinearGradient(0,150,0,H); sea.addColorStop(0,'#006994'); sea.addColorStop(1,'#001f3f');
  
  // Wave
  ctx.fillStyle=sea;
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,150);
  for(let x=0;x<=W;x+=10) ctx.lineTo(x, 150 + Math.sin(frame*0.05 + x*0.02)*10);
  ctx.lineTo(W,H); ctx.fill();

  // Boat
  ctx.font='60px Arial'; ctx.textAlign='center'; ctx.fillText('🚤', hook.x, 140+Math.sin(frame*0.05)*5);

  // Hook Physics
  if(hook.state==='drop'){
    hook.y+=8; if(hook.y>H-20) hook.state='pull';
  } else if(hook.state==='pull'){
    hook.y-=5; if(hook.y<=100) hook.state='idle';
  }
  
  // Hook Line
  ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(hook.x+20, 120); ctx.lineTo(hook.x, hook.y); ctx.stroke();
  ctx.font='30px Arial'; ctx.fillText('🪝', hook.x, hook.y);

  // Bubbles
  if(Math.random()<0.1) bubbles.push({x:Math.random()*W,y:H,s:Math.random()*2+1});
  bubbles.forEach((b,i)=>{
    b.y-=b.s; b.x+=Math.sin(frame*0.1+b.y*0.05);
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.s*2,0,Math.PI*2); ctx.stroke();
    if(b.y<150) bubbles.splice(i,1);
  });

  // Fishes
  if(frame%40===0) spawnFish();
  ctx.font='40px Arial';
  for(let i=fishes.length-1;i>=0;i--){
    let f=fishes[i];
    f.x+=f.vx;
    ctx.save(); ctx.translate(f.x,f.y); if(f.dir===-1) ctx.scale(-1,1);
    ctx.fillText(f.e,0,0); ctx.restore();

    // Catch
    if(hook.state==='pull' && Math.hypot(hook.x-f.x, hook.y-f.y)<30){
      score+=f.pts;
      for(let j=0;j<5;j++) bubbles.push({x:f.x,y:f.y,s:Math.random()*3+2});
      fishes.splice(i,1);
    } else if(f.x<-100 || f.x>W+100) fishes.splice(i,1);
  }

  document.getElementById('s-score').textContent=score;
  document.getElementById('s-time').textContent=time;
  document.getElementById('score-display').textContent=score;

  if(time<=0 && hook.state==='idle'){ running=false; setTimeout(()=>{submitScore(score);},1000); return; }
  af=requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove',e=>{if(hook.state==='idle'){let r=canvas.getBoundingClientRect(); hook.x=e.clientX-r.left;}});
canvas.addEventListener('touchmove',e=>{e.preventDefault(); if(hook.state==='idle'){let r=canvas.getBoundingClientRect(); hook.x=e.touches[0].clientX-r.left;}},{passive:false});
canvas.addEventListener('mousedown',()=>{if(hook.state==='idle') hook.state='drop';});
canvas.addEventListener('touchstart',e=>{e.preventDefault(); if(hook.state==='idle') hook.state='drop';},{passive:false});

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  score=0; time=60; frame=0; hook={x:W/2,y:100,vy:0,state:'idle'}; fishes=[]; bubbles=[];
  running=true; cancelAnimationFrame(af); loop();
}

// Preview
ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,W,150);
ctx.fillStyle='#006994'; ctx.fillRect(0,150,W,H);
ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#00e5ff'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center'; ctx.shadowBlur=15; ctx.shadowColor='#00e5ff';
ctx.fillText('낚시왕',W/2,H/2-20); ctx.shadowBlur=0;
ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
ctx.fillText('마우스로 이동하고 클릭해서 낚시줄을 내리세요!',W/2,H/2+20);
</script>
{% endblock %}
