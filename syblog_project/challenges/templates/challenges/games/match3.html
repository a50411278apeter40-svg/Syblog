{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:400px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:12px;width:100%;background:#2c3e50;touch-action:none;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.5);"></canvas>
  <div id="hud" style="position:absolute;top:10px;left:15px;right:15px;display:flex;justify-content:space-between;color:white;font-family:sans-serif;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.8);pointer-events:none;">
    <div style="font-size:20px;">점수: <span id="s-score" style="color:#f1c40f;">0</span></div>
    <div style="font-size:20px;">남은 턴: <span id="s-turns">20</span></div>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=400,H=460;
canvas.width=W; canvas.height=H;

const ROWS=8, COLS=8, SIZE=W/COLS;
const GEMS=['🍎','🍌','🍇','🍓','🍉','🍒'];
let grid=[], score=0, turns=20, running=false, af, frame=0;
let sel={r:-1,c:-1}, anims=[], particles=[];

function initGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      let v;
      do { v=Math.floor(Math.random()*GEMS.length); } 
      while((r>=2&&grid[r-1][c].v===v&&grid[r-2][c].v===v)||(c>=2&&grid[r][c-1].v===v&&grid[r][c-2].v===v));
      grid[r][c]={v, x:c*SIZE, y:r*SIZE+60, targetX:c*SIZE, targetY:r*SIZE+60, scale:1, del:false};
    }
  }
}

function spawnParticle(x,y){
  for(let i=0;i<6;i++){
    let a=Math.random()*Math.PI*2, s=Math.random()*4+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20,maxLife:20,c:'#fff',r:Math.random()*3+1});
  }
}

function checkMatches(){
  let matched=false;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;c++){
      let v=grid[r][c].v;
      if(v>=0 && v===grid[r][c+1].v && v===grid[r][c+2].v){
        grid[r][c].del=grid[r][c+1].del=grid[r][c+2].del=true; matched=true;
      }
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;r++){
      let v=grid[r][c].v;
      if(v>=0 && v===grid[r+1][c].v && v===grid[r+2][c].v){
        grid[r][c].del=grid[r+1][c].del=grid[r+2][c].del=true; matched=true;
      }
    }
  }
  return matched;
}

function processMatches(){
  let pts=0;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c].del){
        pts+=10; spawnParticle(grid[r][c].x+SIZE/2, grid[r][c].y+SIZE/2);
        grid[r][c].v=-1; grid[r][c].del=false;
      }
    }
  }
  if(pts>0){ score+=pts; document.getElementById('s-score').textContent=score; dropGems(); return true; }
  return false;
}

function dropGems(){
  for(let c=0;c<COLS;c++){
    for(let r=ROWS-1;r>=0;r--){
      if(grid[r][c].v===-1){
        let nr=r-1;
        while(nr>=0 && grid[nr][c].v===-1) nr--;
        if(nr>=0){
          grid[r][c].v=grid[nr][c].v; grid[nr][c].v=-1;
          grid[r][c].y=grid[nr][c].y; grid[r][c].targetY=r*SIZE+60;
        } else {
          grid[r][c].v=Math.floor(Math.random()*GEMS.length);
          grid[r][c].y=-SIZE; grid[r][c].targetY=r*SIZE+60; grid[r][c].scale=0;
        }
      }
    }
  }
  setTimeout(()=>{if(checkMatches()) processMatches(); else checkEnd();}, 400);
}

function checkEnd(){
  if(turns<=0){ running=false; setTimeout(()=>{submitScore(score);},1000); }
}

function swap(r1,c1,r2,c2){
  let t=grid[r1][c1].v; grid[r1][c1].v=grid[r2][c2].v; grid[r2][c2].v=t;
  grid[r1][c1].y=r2*SIZE+60; grid[r1][c1].x=c2*SIZE; grid[r1][c1].targetY=r1*SIZE+60; grid[r1][c1].targetX=c1*SIZE;
  grid[r2][c2].y=r1*SIZE+60; grid[r2][c2].x=c1*SIZE; grid[r2][c2].targetY=r2*SIZE+60; grid[r2][c2].targetX=c2*SIZE;
  turns--; document.getElementById('s-turns').textContent=turns;
  setTimeout(()=>{
    if(checkMatches()) processMatches();
    else { // 되돌리기
      let t=grid[r1][c1].v; grid[r1][c1].v=grid[r2][c2].v; grid[r2][c2].v=t;
      grid[r1][c1].y=r2*SIZE+60; grid[r1][c1].x=c2*SIZE; grid[r1][c1].targetY=r1*SIZE+60; grid[r1][c1].targetX=c1*SIZE;
      grid[r2][c2].y=r1*SIZE+60; grid[r2][c2].x=c1*SIZE; grid[r2][c2].targetY=r2*SIZE+60; grid[r2][c2].targetX=c2*SIZE;
      turns++; document.getElementById('s-turns').textContent=turns;
    }
  },300);
}

function loop(){
  if(!running) return;
  frame++;
  let bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#2c3e50'); bg.addColorStop(1,'#34495e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Background Grid
  ctx.fillStyle='rgba(0,0,0,0.2)';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if((r+c)%2===0) ctx.fillRect(c*SIZE, r*SIZE+60, SIZE, SIZE);
    }
  }

  // Gems
  let moving=false;
  ctx.font=`${SIZE*0.7}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let g=grid[r][c];
      if(g.v>=0){
        g.x+=(g.targetX-g.x)*0.2; g.y+=(g.targetY-g.y)*0.2;
        if(g.scale<1) g.scale+=0.1;
        if(Math.abs(g.targetX-g.x)>1 || Math.abs(g.targetY-g.y)>1) moving=true;
        
        ctx.save(); ctx.translate(g.x+SIZE/2, g.y+SIZE/2); ctx.scale(g.scale, g.scale);
        // 그림자 및 글로우
        ctx.shadowBlur=10; ctx.shadowColor='rgba(0,0,0,0.5)';
        ctx.fillText(GEMS[g.v], 0, 5);
        ctx.restore();
      }
    }
  }

  // Selection
  if(sel.r>=0){
    ctx.strokeStyle='#f1c40f'; ctx.lineWidth=4; ctx.shadowBlur=15; ctx.shadowColor='#f1c40f';
    ctx.strokeRect(sel.c*SIZE+2, sel.r*SIZE+62, SIZE-4, SIZE-4); ctx.shadowBlur=0;
  }

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; particles=particles.filter(p=>p.life>0);

  document.getElementById('score-display').textContent=score;
  af=requestAnimationFrame(loop);
}

function handleInput(x,y){
  if(!running || turns<=0) return;
  let c=Math.floor(x/SIZE), r=Math.floor((y-60)/SIZE);
  if(c<0||c>=COLS||r<0||r>=ROWS) return;
  
  if(sel.r===-1){ sel={r,c}; }
  else {
    let dr=Math.abs(sel.r-r), dc=Math.abs(sel.c-c);
    if((dr===1&&dc===0)||(dr===0&&dc===1)){ swap(sel.r, sel.c, r, c); }
    sel={r:-1,c:-1};
  }
}

canvas.addEventListener('mousedown',e=>{let r=canvas.getBoundingClientRect(); handleInput(e.clientX-r.left, e.clientY-r.top);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();let r=canvas.getBoundingClientRect(); handleInput(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);},{passive:false});

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  score=0; turns=20; sel={r:-1,c:-1}; particles=[];
  document.getElementById('s-score').textContent=0; document.getElementById('s-turns').textContent=20;
  initGrid(); running=true; cancelAnimationFrame(af); loop();
}

// Preview
ctx.fillStyle='#2c3e50'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#f1c40f'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center'; ctx.shadowBlur=15; ctx.shadowColor='#f1c40f';
ctx.fillText('과일 매치3',W/2,H/2-20); ctx.shadowBlur=0;
ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
ctx.fillText('인접한 과일을 눌러 3개 이상 맞추세요',W/2,H/2+20);
</script>
{% endblock %}
