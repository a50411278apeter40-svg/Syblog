{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="text-align:center;">
  <div id="sudoku-board" style="display:inline-grid;grid-template-columns:repeat(9,42px);gap:1px;background:#333;padding:3px;border-radius:6px;"></div>
  <div class="mt-2">
    <button class="btn btn-outline-light btn-sm mr-2" onclick="checkSudoku()"><i class="fas fa-check"></i> 확인</button>
    <small class="text-muted">채워진 칸을 클릭해 숫자 입력 (1-9)</small>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const PUZZLE=[[5,3,0,0,7,0,0,0,0],[6,0,0,1,9,5,0,0,0],[0,9,8,0,0,0,0,6,0],[8,0,0,0,6,0,0,0,3],[4,0,0,8,0,3,0,0,1],[7,0,0,0,2,0,0,0,6],[0,6,0,0,0,0,2,8,0],[0,0,0,4,1,9,0,0,5],[0,0,0,0,8,0,0,7,9]];
const SOLUTION=[[5,3,4,6,7,8,9,1,2],[6,7,2,1,9,5,3,4,8],[1,9,8,3,4,2,5,6,7],[8,5,9,7,6,1,4,2,3],[4,2,6,8,5,3,7,9,1],[7,1,3,9,2,4,8,5,6],[9,6,1,5,3,7,2,8,4],[2,8,7,4,1,9,6,3,5],[3,4,5,2,8,6,1,7,9]];
let board,selected,score,running=false;
function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  board=PUZZLE.map(r=>[...r]); selected=null; score=0; running=true;
  render();
}
function render(){
  const el=document.getElementById('sudoku-board');el.innerHTML='';
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    const cell=document.createElement('div');
    const v=board[r][c];const orig=PUZZLE[r][c];
    const br=(c===2||c===5?'border-right:3px solid #666;':'')+(r===2||r===5?'border-bottom:3px solid #666;':'');
    cell.style.cssText='width:42px;height:42px;background:'+(selected&&selected[0]===r&&selected[1]===c?'#6c63ff33':(orig?'#1e1e2e':'#16213e'))+';display:flex;align-items:center;justify-content:center;cursor:'+(orig?'default':'pointer')+';color:'+(orig?'#aaa':'#48cfad')+';font-weight:bold;font-size:1.1rem;'+br;
    cell.textContent=v||'';
    if(!orig) cell.addEventListener('click',()=>{ selected=[r,c]; render(); });
    el.appendChild(cell);
  }
}
function checkSudoku(){
  if(!running)return;
  let correct=0;
  for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(board[r][c]===SOLUTION[r][c]) correct++;
  if(correct===81){ running=false; submitScore(100); }
  else{ score=correct; document.getElementById('score-display').textContent=correct+'/81'; }
}
document.addEventListener('keydown',e=>{
  if(!running||!selected)return;
  const [r,c]=selected;
  if(PUZZLE[r][c])return;
  const n=parseInt(e.key);
  if(n>=1&&n<=9){ board[r][c]=n; render(); }
  if(e.key==='Backspace'||e.key==='Delete'){ board[r][c]=0; render(); }
});
document.getElementById('sudoku-board').innerHTML='<div style="color:white;grid-column:1/-1;padding:80px 20px;text-align:center;">시작 버튼을 눌러주세요!</div>';
</script>
{% endblock %}
