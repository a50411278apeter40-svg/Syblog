{% extends 'challenges/game_base.html' %}
{% block game_area %}
<canvas id="gameCanvas" width="550" height="500" style="background:#0d1b2a;border-radius:8px;"></canvas>
<small class="d-block text-center text-muted mt-1">← → 이동 / 스페이스 발사</small>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');
let ship,asteroids,bullets,score,lives,running=false,animFrame,keys={},frame=0;
function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  ship={x:275,y:400,angle:-Math.PI/2,vx:0,vy:0};
  asteroids=[]; bullets=[]; score=0; lives=3; running=true; frame=0;
  for(let i=0;i<5;i++) spawnAsteroid();
  cancelAnimationFrame(animFrame); loop();
}
function spawnAsteroid(){
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*550;y=0;}else if(side===1){x=550;y=Math.random()*500;}else if(side===2){x=Math.random()*550;y=500;}else{x=0;y=Math.random()*500;}
  asteroids.push({x,y,r:20+Math.random()*20,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3});
}
function loop(){
  if(!running)return;
  frame++;
  ctx.fillStyle='rgba(13,27,42,0.3)';ctx.fillRect(0,0,550,500);
  if(keys['ArrowLeft']||keys['a']) ship.angle-=0.07;
  if(keys['ArrowRight']||keys['d']) ship.angle+=0.07;
  if(keys['ArrowUp']||keys['w']){ ship.vx+=Math.cos(ship.angle)*0.3; ship.vy+=Math.sin(ship.angle)*0.3; }
  ship.vx*=0.98; ship.vy*=0.98;
  ship.x=(ship.x+ship.vx+550)%550; ship.y=(ship.y+ship.vy+500)%500;
  // Ship
  ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
  ctx.strokeStyle='#48cfad';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(-10,8);ctx.lineTo(-5,0);ctx.lineTo(-10,-8);ctx.closePath();ctx.stroke();
  if(keys['ArrowUp']||keys['w']){ctx.fillStyle='#ffd200';ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-12,4);ctx.lineTo(-12,-4);ctx.fill();}
  ctx.restore();
  // Asteroids
  asteroids.forEach((a,i)=>{
    a.x=(a.x+a.vx+550)%550; a.y=(a.y+a.vy+500)%500;
    ctx.strokeStyle='#6c63ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.stroke();
    const dist=Math.hypot(ship.x-a.x,ship.y-a.y);
    if(dist<a.r+10){ lives--; if(lives<=0){running=false;submitScore(score);return;} ship.x=275;ship.y=400;ship.vx=0;ship.vy=0; }
  });
  // Bullets
  bullets.forEach((b,i)=>{
    b.x+=b.vx;b.y+=b.vy;
    ctx.fillStyle='#ffd200';ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    if(b.x<0||b.x>550||b.y<0||b.y>500){ bullets.splice(i,1); return; }
    asteroids.forEach((a,j)=>{
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){ bullets.splice(i,1); if(a.r>20){ asteroids.push({x:a.x+10,y:a.y,r:a.r/2,vx:a.vx+1,vy:a.vy}); asteroids.push({x:a.x,y:a.y+10,r:a.r/2,vx:a.vx-1,vy:a.vy}); } asteroids.splice(j,1); score+=10; document.getElementById('score-display').textContent=score; if(!asteroids.length) for(let k=0;k<6;k++) spawnAsteroid(); }
    });
  });
  ctx.fillStyle='white';ctx.font='16px sans-serif';ctx.fillText('점수: '+score,10,25);ctx.fillText('❤️'.repeat(lives),10,50);
  animFrame=requestAnimationFrame(loop);
}
document.addEventListener('keydown',e=>{ keys[e.key]=true; if(e.key===' '){e.preventDefault();if(running)bullets.push({x:ship.x+Math.cos(ship.angle)*15,y:ship.y+Math.sin(ship.angle)*15,vx:Math.cos(ship.angle)*10,vy:Math.sin(ship.angle)*10});} });
document.addEventListener('keyup',e=>keys[e.key]=false);
ctx.fillStyle='#0d1b2a';ctx.fillRect(0,0,550,500);
ctx.fillStyle='#6c63ff';ctx.font='16px sans-serif';ctx.textAlign='center';
ctx.fillText('← → 이동, ↑ 가속, 스페이스 발사! 시작 버튼을 눌러주세요.',275,250);ctx.textAlign='left';
</script>
{% endblock %}
