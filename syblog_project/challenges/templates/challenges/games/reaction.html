{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div id="reaction-area" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:350px;">
  <div id="reaction-box" style="width:300px;height:200px;border-radius:20px;background:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:white;user-select:none;" onclick="handleClick()">
    시작 버튼을 눌러주세요
  </div>
  <div class="mt-4">
    <div id="reaction-stats" class="text-center">
      <div id="attempts-info"></div>
      <div id="avg-info"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
let state='idle',startTime,results=[],running=false,attempts=0,waitTimer;
const MAX=5;
function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  results=[]; attempts=0; running=true; state='waiting';
  setBox('#555','준비하세요...');
  clearTimeout(waitTimer);
  waitTimer=setTimeout(showGreen,1000+Math.random()*2000);
}
function showGreen(){
  if(!running)return;
  state='go'; startTime=Date.now();
  setBox('linear-gradient(135deg,#11998e,#38ef7d)','지금 클릭!!! 🟢');
}
function handleClick(){
  if(!running||state==='idle')return;
  if(state==='waiting'){ setBox('#ff6b6b','너무 일찍! 다시...'); state='waiting'; clearTimeout(waitTimer); waitTimer=setTimeout(showGreen,1500+Math.random()*2000); return; }
  if(state==='go'){
    const rt=Date.now()-startTime;
    results.push(rt); attempts++;
    document.getElementById('attempts-info').innerHTML='<span class="badge badge-info">'+attempts+'/'+MAX+' 완료</span> 이번: <strong>'+rt+'ms</strong>';
    if(attempts>=MAX){
      running=false; state='idle';
      const avg=Math.floor(results.reduce((a,b)=>a+b,0)/results.length);
      document.getElementById('avg-info').textContent='평균: '+avg+'ms';
      document.getElementById('score-display').textContent=avg;
      submitScore(avg); return;
    }
    state='waiting'; setBox('#555','계속... ('+attempts+'/'+MAX+')');
    clearTimeout(waitTimer);
    waitTimer=setTimeout(showGreen,1000+Math.random()*2000);
  }
}
function setBox(bg,text){ const b=document.getElementById('reaction-box'); b.style.background=bg; b.textContent=text; }
</script>
{% endblock %}
