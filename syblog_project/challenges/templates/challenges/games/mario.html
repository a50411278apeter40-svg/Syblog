{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:500px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:12px;width:100%;background:#87CEEB;touch-action:none;box-shadow:0 10px 30px rgba(0,0,0,0.5);"></canvas>
  <div id="hud" style="position:absolute;top:10px;left:15px;right:15px;display:flex;justify-content:space-between;color:white;font-family:sans-serif;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.8);pointer-events:none;">
    <div style="font-size:20px;">코인: <span id="s-score" style="color:#f1c40f;">0</span></div>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=500,H=400;
canvas.width=W; canvas.height=H;

let af, running=false, score=0, frame=0;
let p={x:50,y:300,vx:0,vy:0,w:30,h:40,grounded:false,state:'idle'};
let keys={};
let platforms=[{x:0,y:350,w:W,h:50},{x:200,y:250,w:100,h:20},{x:350,y:150,w:100,h:20}];
let coins=[{x:240,y:210,c:false},{x:390,y:110,c:false}];
let enemies=[{x:300,y:310,w:30,h:40,vx:-1,alive:true}];
let cameraX=0;

function loop(){
  if(!running) return;
  frame++;
  ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,W,H);
  
  // Parallax clouds
  ctx.font='60px Arial'; ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText('☁️', 100 - (cameraX*0.2)%W, 100);
  ctx.fillText('☁️', 350 - (cameraX*0.2)%W, 150);
  ctx.fillText('☁️', W+100 - (cameraX*0.2)%W, 100);

  ctx.save(); ctx.translate(-cameraX, 0);

  // Input
  if(keys['ArrowLeft']){ p.vx=-4; p.state='run'; }
  else if(keys['ArrowRight']){ p.vx=4; p.state='run'; }
  else { p.vx*=0.8; p.state='idle'; }

  if((keys['ArrowUp']||keys[' ']) && p.grounded){ p.vy=-12; p.grounded=false; }

  // Physics
  p.vy+=0.6; // Gravity
  p.x+=p.vx;
  p.y+=p.vy;

  // Collision
  p.grounded=false;
  platforms.forEach(plat=>{
    if(p.x<plat.x+plat.w && p.x+p.w>plat.x && p.y<plat.y+plat.h && p.y+p.h>plat.y){
      if(p.vy>0 && p.y+p.h - p.vy <= plat.y+5){ p.y=plat.y-p.h; p.vy=0; p.grounded=true; }
      else if(p.vy<0 && p.y - p.vy >= plat.y+plat.h-5){ p.y=plat.y+plat.h; p.vy=0; }
      else if(p.vx>0){ p.x=plat.x-p.w; p.vx=0; }
      else if(p.vx<0){ p.x=plat.x+plat.w; p.vx=0; }
    }
    // Draw plat
    ctx.fillStyle='#8B4513'; ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
    ctx.fillStyle='#228B22'; ctx.fillRect(plat.x, plat.y, plat.w, 8);
  });

  // Camera
  if(p.x > cameraX + W/2) cameraX = p.x - W/2;
  if(cameraX < 0) cameraX = 0;

  // Coins
  ctx.font='24px Arial'; ctx.textAlign='center';
  coins.forEach(c=>{
    if(!c.c){
      ctx.fillText('🪙', c.x+15, c.y+15 + Math.sin(frame*0.1)*5);
      if(p.x<c.x+30 && p.x+p.w>c.x && p.y<c.y+30 && p.y+p.h>c.y){ c.c=true; score+=10; }
    }
  });

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive) return;
    e.x+=e.vx;
    if(e.x<200 || e.x>450) e.vx*=-1; // simple patrol
    ctx.fillText('🍄', e.x+15, e.y+20);
    
    // Hit
    if(p.x<e.x+e.w && p.x+p.w>e.x && p.y<e.y+e.h && p.y+p.h>e.y){
      if(p.vy>0 && p.y+p.h - p.vy <= e.y+10){ e.alive=false; p.vy=-8; score+=20; }
      else gameOver();
    }
  });

  // Draw Player
  ctx.save(); ctx.translate(p.x+p.w/2, p.y+p.h/2);
  if(p.vx<0) ctx.scale(-1,1);
  ctx.font='40px Arial'; ctx.textBaseline='middle';
  if(!p.grounded) ctx.fillText('🏃', 0, 0);
  else if(Math.abs(p.vx)>0.5 && frame%10<5) ctx.fillText('🚶', 0, 0);
  else ctx.fillText('🧍', 0, 0);
  ctx.restore();

  ctx.restore();

  // Death by falling
  if(p.y>H+100) gameOver();

  document.getElementById('s-score').textContent=score;
  document.getElementById('score-display').textContent=score;

  // Level gen (infinite)
  let lastPlat = platforms[platforms.length-1];
  if(lastPlat.x < cameraX + W){
    let nx = lastPlat.x + lastPlat.w + 50 + Math.random()*100;
    let ny = Math.max(100, Math.min(300, lastPlat.y + (Math.random()-0.5)*100));
    platforms.push({x:nx, y:ny, w:100+Math.random()*100, h:20});
    if(Math.random()<0.5) coins.push({x:nx+40, y:ny-40, c:false});
    if(Math.random()<0.3) enemies.push({x:nx+50, y:ny-40, w:30, h:40, vx:-1, alive:true});
    // Add bottom ground sometimes
    if(Math.random()<0.5) platforms.push({x:nx, y:350, w:300, h:50});
  }

  af=requestAnimationFrame(loop);
}

function gameOver(){
  running=false; cancelAnimationFrame(af);
  setTimeout(()=>{submitScore(score);},1000);
}

document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);

let touchX=0, touchY=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); let t=e.touches[0]; touchX=t.clientX; touchY=t.clientY;
  if(t.clientX < window.innerWidth/2) keys['ArrowLeft']=true; else keys['ArrowRight']=true;
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();keys['ArrowLeft']=false; keys['ArrowRight']=false;},{passive:false});

// jump area
document.getElementById('gameCanvas').addEventListener('click',()=>{if(p.grounded){p.vy=-12;p.grounded=false;}});

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  score=0; frame=0; cameraX=0; keys={};
  p={x:50,y:200,vx:0,vy:0,w:30,h:40,grounded:false,state:'idle'};
  platforms=[{x:0,y:350,w:800,h:50}]; coins=[]; enemies=[];
  running=true; cancelAnimationFrame(af); loop();
}

// Preview
ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#8B4513'; ctx.fillRect(0,350,W,50); ctx.fillStyle='#228B22'; ctx.fillRect(0,350,W,10);
ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#e74c3c'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center'; ctx.shadowBlur=15; ctx.shadowColor='#e74c3c';
ctx.fillText('마리오 어드벤처',W/2,H/2-20); ctx.shadowBlur=0;
ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
ctx.fillText('좌우 화면 터치로 이동, 클릭하여 점프',W/2,H/2+20);
</script>
{% endblock %}
