{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:500px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:12px;width:100%;background:#8bc34a;touch-action:none;cursor:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22 style=%22font-size:24px;%22><text y=%2224%22>🔨</text></svg>'), auto;box-shadow:0 10px 30px rgba(0,0,0,0.5);"></canvas>
  <div id="hud" style="position:absolute;top:10px;left:15px;right:15px;display:flex;justify-content:space-between;color:white;font-family:sans-serif;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.8);pointer-events:none;">
    <div style="font-size:20px;">점수: <span id="s-score" style="color:#f1c40f;">0</span></div>
    <div style="font-size:20px;">시간: <span id="s-time">30</span></div>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=500,H=500;
canvas.width=W; canvas.height=H;
let af, running=false, score=0, time=30, frame=0;
let holes=[], particles=[], hits=[];

function initHoles(){
  holes=[];
  for(let i=0;i<3;i++){
    for(let j=0;j<3;j++){
      holes.push({x:W/2-130+j*130, y:H/2-120+i*110, moleY:0, state:'down', wait:Math.random()*100, type:'🐹'});
    }
  }
}

function spawnParticle(x,y,color){
  for(let i=0;i<8;i++){
    let a=Math.random()*Math.PI*2, s=Math.random()*6+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20,maxLife:20,c:color,r:Math.random()*4+2});
  }
}

function drawHole(x,y){
  // 땅 구멍
  ctx.fillStyle='#3e2723'; ctx.beginPath(); ctx.ellipse(x,y,45,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#212121'; ctx.beginPath(); ctx.ellipse(x,y,40,15,0,0,Math.PI*2); ctx.fill();
  // 그림자
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(x,y+5,45,22,0,Math.PI,Math.PI*2); ctx.fill();
}

function loop(){
  if(!running) return;
  frame++;
  if(frame%60===0 && time>0) time--;

  // BG
  let bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#7cb342'); bg.addColorStop(1,'#558b2f');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  
  // 구멍 및 두더지
  holes.forEach(h=>{
    drawHole(h.x,h.y);
    if(h.state==='down'){
      if(h.wait>0) h.wait--;
      else { h.state='up'; h.wait=50+Math.random()*50; h.type=Math.random()>0.8?'💣':'🐹'; }
    } else if(h.state==='up'){
      if(h.moleY<40) h.moleY+=4;
      if(h.wait>0) h.wait--;
      else h.state='going_down';
    } else if(h.state==='going_down'){
      if(h.moleY>0) h.moleY-=4;
      else { h.state='down'; h.wait=60+Math.random()*60; }
    } else if(h.state==='hit'){
      h.moleY-=8; if(h.moleY<-30){ h.state='down'; h.moleY=0; h.wait=60; }
    }

    if(h.moleY>0){
      ctx.save();
      ctx.beginPath(); ctx.rect(h.x-40, h.y-70, 80, 70); ctx.clip(); // 마스크
      ctx.font='60px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      if(h.state==='hit') { ctx.globalAlpha=0.5; ctx.fillText('😵', h.x, h.y-h.moleY+10); }
      else ctx.fillText(h.type, h.x, h.y-h.moleY+10);
      ctx.restore();
    }
    // 잔디 덮개
    ctx.fillStyle='#33691e'; ctx.beginPath(); ctx.ellipse(x=h.x,y=h.y+15,50,15,0,Math.PI,Math.PI*2); ctx.fill();
  });

  // 파티클
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life--; p.vy+=0.3; // 중력
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; particles=particles.filter(p=>p.life>0);

  // 타격 이펙트 (망치, 점수 텍스트)
  hits.forEach(h=>{
    h.life--;
    ctx.font=`bold ${20+h.life}px Arial`; ctx.fillStyle=h.c; ctx.textAlign='center';
    ctx.fillText(h.txt, h.x, h.y-30+h.life/2);
  });
  hits=hits.filter(h=>h.life>0);

  document.getElementById('s-score').textContent=score;
  document.getElementById('s-time').textContent=time;
  document.getElementById('score-display').textContent=score;

  if(time<=0 && !holes.some(h=>h.state==='hit')){
    running=false; setTimeout(()=>{submitScore(score);},1000); return;
  }
  af=requestAnimationFrame(loop);
}

function hit(x,y){
  if(!running||time<=0) return;
  spawnParticle(x,y,'#fff');
  holes.forEach(h=>{
    if(h.state==='up' || h.state==='going_down'){
      if(Math.hypot(h.x-x, (h.y-h.moleY)-y)<40){
        h.state='hit';
        if(h.type==='💣'){
          score-=20; spawnParticle(h.x,h.y,'#f00'); hits.push({x:h.x,y:h.y,txt:'-20',c:'#f00',life:20});
        } else {
          score+=10; spawnParticle(h.x,h.y,'#ffeb3b'); hits.push({x:h.x,y:h.y,txt:'+10',c:'#ffea00',life:20});
        }
      }
    }
  });
}

canvas.addEventListener('mousedown',e=>{
  let r=canvas.getBoundingClientRect(); hit(e.clientX-r.left, e.clientY-r.top);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); let r=canvas.getBoundingClientRect(); hit(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);
},{passive:false});

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  score=0; time=30; frame=0; particles=[]; hits=[];
  initHoles(); running=true; cancelAnimationFrame(af); loop();
}

// Preview
ctx.fillStyle='#7cb342'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#ffea00'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center'; ctx.shadowBlur=15; ctx.shadowColor='#ffea00';
ctx.fillText('두더지 잡기',W/2,H/2-20); ctx.shadowBlur=0;
ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
ctx.fillText('마우스/터치로 햄스터(🐹)를 잡으세요! (💣조심)',W/2,H/2+20);
</script>
{% endblock %}
