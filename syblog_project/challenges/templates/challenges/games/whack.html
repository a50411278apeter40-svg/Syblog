{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:480px;margin:0 auto;user-select:none;">
  <canvas id="gameCanvas" style="border-radius:16px;width:100%;display:block;touch-action:none;box-shadow:0 10px 40px rgba(0,0,0,0.7);cursor:crosshair;"></canvas>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=480,H=500;
canvas.width=W;canvas.height=H;

// Images
const moleImg=new Image();moleImg.crossOrigin='anonymous';
moleImg.src='https://www.pngall.com/wp-content/uploads/13/Mole-PNG-Cutout.png';
const hammerImg=new Image();hammerImg.crossOrigin='anonymous';
hammerImg.src='https://www.pngall.com/wp-content/uploads/12/Hammer-PNG-Cutout.png';
const bonusMoleImg=new Image();bonusMoleImg.crossOrigin='anonymous';
bonusMoleImg.src='https://www.pngall.com/wp-content/uploads/12/Mole.png';

let af,running=false,score=0,lives=3,timeLeft=60,frame=0;
let holes,moles,hammer,particles,combo,comboTimer;

const HOLE_POS=[
  [80,150],[240,150],[400,150],
  [80,290],[240,290],[400,290],
  [80,430],[240,430],[400,430],
];

function mkMole(idx){
  const types=['normal','golden','bomb','speedy'];
  const weights=[60,15,15,10];
  let rnd=Math.random()*100,acc=0,type='normal';
  for(let i=0;i<types.length;i++){acc+=weights[i];if(rnd<acc){type=types[i];break;}}
  const ttl=type==='speedy'?40:type==='golden'?55:75;
  return {idx,type,phase:'up',ttl,maxTtl:ttl,hit:false,rise:0,maxRise:50};
}

function initGame(){
  score=0;lives=3;timeLeft=60;frame=0;combo=0;comboTimer=0;particles=[];
  holes=HOLE_POS.map(([x,y],i)=>({x,y,idx:i,active:false}));
  moles=[];
  hammer={x:-100,y:-100,visible:false,anim:0,hitting:false};
}

function spawnMoles(){
  const maxActive=Math.min(3+Math.floor((60-timeLeft)/15),5);
  const active=moles.filter(m=>!m.hit&&m.phase!=='down').length;
  if(active<maxActive&&Math.random()<0.04){
    const free=holes.filter(h=>!h.active).map(h=>h.idx);
    if(free.length>0){
      const idx=free[Math.floor(Math.random()*free.length)];
      holes[idx].active=true;
      moles.push(mkMole(idx));
    }
  }
}

function drawHole(h){
  const g=ctx.createRadialGradient(h.x,h.y+8,4,h.x,h.y+10,38);
  g.addColorStop(0,'#3d2100');g.addColorStop(1,'#1a0e00');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.ellipse(h.x,h.y+10,44,22,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(h.x,h.y+10,44,22,0,0,Math.PI*2);ctx.stroke();
}

function drawMole(m,h){
  const peekH=m.rise;
  if(peekH<=0)return;
  ctx.save();
  ctx.beginPath();ctx.ellipse(h.x,h.y+10,44,22,0,0,Math.PI*2);ctx.clip();
  const moleY=h.y+10-peekH;
  let color='';
  if(m.type==='golden')color='#FFD700';
  else if(m.type==='bomb')color='#E74C3C';
  else if(m.type==='speedy')color='#3498DB';

  const drawn=moleImg.complete&&moleImg.naturalWidth;
  if(drawn){
    if(color){ctx.filter=`sepia(1) hue-rotate(${m.type==='golden'?40:m.type==='bomb'?0:200}deg) saturate(3)`;}
    ctx.drawImage(moleImg,h.x-35,moleY-50,70,70);
    ctx.filter='none';
  } else {
    // Fallback mole
    ctx.fillStyle=color||'#8B6914';
    ctx.beginPath();ctx.ellipse(h.x,moleY,30,35,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffcba4';ctx.beginPath();ctx.ellipse(h.x,moleY+5,18,20,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(h.x-8,moleY-5,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(h.x+8,moleY-5,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff9999';ctx.beginPath();ctx.ellipse(h.x,moleY+8,8,4,0,0,Math.PI*2);ctx.fill();
  }

  // Type icon
  if(m.type==='golden'){ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('💰',h.x,moleY-48);}
  else if(m.type==='bomb'){ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('💣',h.x,moleY-48);}
  else if(m.type==='speedy'){ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('⚡',h.x,moleY-48);}
  ctx.restore();
}

function hitAt(mx,my){
  hammer.x=mx;hammer.y=my;hammer.hitting=true;hammer.anim=12;
  for(let i=moles.length-1;i>=0;i--){
    const m=moles[i];if(m.hit)continue;
    const h=holes[m.idx];
    if(Math.hypot(mx-h.x,my-h.y+20)<50&&m.rise>10){
      m.hit=true;holes[m.idx].active=false;
      if(m.type==='bomb'){
        lives--;combo=0;comboTimer=0;
        for(let j=0;j<15;j++) particles.push({x:h.x,y:h.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-3)*4,life:40,color:'#E74C3C',type:'circle'});
        if(lives<=0){running=false;cancelAnimationFrame(af);setTimeout(()=>submitScore(score),800);}
        return;
      }
      combo++;comboTimer=90;
      const pts=(m.type==='golden'?50:m.type==='speedy'?30:10)*(1+Math.floor(combo/3)*0.5);
      score+=Math.round(pts);
      for(let j=0;j<12;j++) particles.push({x:h.x,y:h.y-30,vx:(Math.random()-0.5)*8,vy:(Math.random()-2)*5,life:35,color:m.type==='golden'?'#FFD700':'#2ECC71',type:'circle'});
      particles.push({x:h.x,y:h.y-50,vx:0,vy:-2,life:45,text:`+${Math.round(pts)}${combo>2?` x${combo}COMBO`:''}`,type:'text',color:m.type==='golden'?'#FFD700':'#2ECC71'});
      return;
    }
  }
  // Miss
  combo=0;comboTimer=0;
  particles.push({x:mx,y:my,vx:0,vy:-2,life:25,text:'MISS!',type:'text',color:'#aaa'});
}

function loop(){
  if(!running)return;
  frame++;
  if(frame%60===0)timeLeft=Math.max(0,timeLeft-1);
  if(timeLeft===0){running=false;cancelAnimationFrame(af);setTimeout(()=>submitScore(score),800);return;}
  if(comboTimer>0)comboTimer--;else if(combo>0)combo=0;

  spawnMoles();

  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#4CAF50');bg.addColorStop(0.5,'#66BB6A');bg.addColorStop(1,'#388E3C');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grass texture
  for(let x=0;x<W;x+=8){
    const gh=20+Math.sin(x*0.2)*8;
    ctx.fillStyle=`hsl(${120+Math.sin(x)*10},50%,${30+Math.sin(x*0.3)*8}%)`;
    ctx.fillRect(x,H-gh,8,gh);
  }

  // Flowers decoration
  [50,150,300,420].forEach((x,i)=>{
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(['🌸','🌼','🌻','🌺'][i],x,H-30+Math.sin(frame*0.05+i)*3);
  });

  // Holes
  holes.forEach(h=>drawHole(h));

  // Moles
  moles.forEach(m=>{
    const h=holes[m.idx];
    if(!m.hit){
      if(m.phase==='up'){
        m.rise=Math.min(m.maxRise,m.rise+4);
        m.ttl--;
        if(m.ttl<=0){m.phase='down';}
      } else {
        m.rise=Math.max(0,m.rise-5);
        if(m.rise===0){holes[m.idx].active=false;m.hit=true;}
      }
    } else {
      m.rise=Math.max(0,m.rise-6);
    }
    drawMole(m,h);
  });
  moles=moles.filter(m=>m.rise>0||(!m.hit&&m.phase!=='down'));

  // Particles
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  particles.forEach(pt=>{
    ctx.save();ctx.globalAlpha=pt.life/(pt.type==='text'?45:35);
    if(pt.type==='text'){
      ctx.fillStyle=pt.color;ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowBlur=8;ctx.shadowColor=pt.color;ctx.fillText(pt.text,pt.x,pt.y);
    } else {
      ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,5,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });

  // Hammer cursor
  hammer.anim=Math.max(0,hammer.anim-1);
  if(hammer.visible){
    const angle=hammer.hitting?-0.4:0.1;
    ctx.save();ctx.translate(hammer.x,hammer.y);ctx.rotate(angle);
    if(hammerImg.complete&&hammerImg.naturalWidth){ctx.drawImage(hammerImg,-15,-50,50,60);}
    else{
      ctx.fillStyle='#8B4513';ctx.fillRect(-6,-50,12,40);
      ctx.fillStyle='#E74C3C';ctx.fillRect(-18,-58,36,20);
    }
    ctx.restore();
    if(hammer.anim===0)hammer.hitting=false;
  }

  // HUD
  const timeRatio=timeLeft/60;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(10,10,190,58,10);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`⏱ ${timeLeft}s`,16,14);
  ctx.fillText(`🔨 ${score}`,16,36);
  if(combo>1){ctx.fillStyle='#FFD700';ctx.font='bold 14px sans-serif';ctx.fillText(`COMBO x${combo}!!`,100,14);}
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.roundRect(W-100,10,88,14,4);ctx.fill();
  ctx.fillStyle=timeRatio>0.5?'#2ECC71':timeRatio>0.25?'#F1C40F':'#E74C3C';
  ctx.beginPath();ctx.roundRect(W-100,10,88*timeRatio,14,4);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='right';
  for(let i=0;i<lives;i++) {ctx.font='14px serif';ctx.fillText('❤️',W-10-i*22,12);}

  document.getElementById('score-display').textContent=score;
  af=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  initGame();running=true;cancelAnimationFrame(af);loop();
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  hammer.x=(e.clientX-r.left)*(W/r.width);hammer.y=(e.clientY-r.top)*(H/r.height);hammer.visible=true;
});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(running)hitAt(mx,my);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(),t=e.touches[0];
  const mx=(t.clientX-r.left)*(W/r.width),my=(t.clientY-r.top)*(H/r.height);
  hammer.x=mx;hammer.y=my;hammer.visible=true;
  if(running)hitAt(mx,my);
},{passive:false});

// Preview
ctx.fillStyle='#4CAF50';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#F1C40F';ctx.font='bold 34px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.shadowBlur=15;ctx.shadowColor='#F1C40F';ctx.fillText('🔨 두더지 잡기',W/2,H/2-24);
ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='14px sans-serif';
ctx.fillText('두더지를 빠르게 클릭/탭하세요!',W/2,H/2+16);
ctx.fillText('💰 황금 두더지 = 고점수 | 💣 폭탄 = 목숨 감소',W/2,H/2+44);
</script>
{% endblock %}
