{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:520px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:16px;width:100%;display:block;touch-action:none;box-shadow:0 10px 40px rgba(0,0,0,0.8);"></canvas>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;margin-top:4px;">
    <div style="display:flex;gap:6px;">
      <button id="btn-left" style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;touch-action:none;">◄</button>
      <button id="btn-right" style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);color:#fff;font-size:20px;touch-action:none;">►</button>
    </div>
    <button id="btn-shoot" style="width:70px;height:70px;border-radius:50%;background:rgba(231,76,60,0.7);border:3px solid #E74C3C;color:#fff;font-size:14px;font-weight:bold;touch-action:none;">🔫<br>FIRE</button>
    <button id="btn-thrust" style="width:70px;height:70px;border-radius:50%;background:rgba(52,152,219,0.7);border:3px solid #3498DB;color:#fff;font-size:14px;font-weight:bold;touch-action:none;">🚀<br>THRUST</button>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=520,H=520;
canvas.width=W;canvas.height=H;

let af,running=false,score=0,lives=3,level=1,frame=0;
let ship,bullets,enemies,asteroids,particles,stars,powerUps;
let keys={};

// Stars background
function mkStars(){
  return Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+0.3,t:Math.random()*Math.PI*2,blink:Math.random()*0.02+0.005}));
}

function mkShip(){
  return {x:W/2,y:H/2,vx:0,vy:0,angle:0,r:18,alive:true,shield:0,heat:0,gunLevel:1};
}

function mkAsteroid(x,y,r){
  const ang=Math.random()*Math.PI*2;
  const spd=0.5+Math.random()*1.5;
  return {x:x||Math.random()*W,y:y||Math.random()*H,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:r||30+Math.random()*30,angle:Math.random()*Math.PI*2,spin:(.5-Math.random())*0.04,pts:r?Math.round(100/(r/10)):50};
}

function mkEnemy(){
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*W;y=-40;}
  else if(side===1){x=W+40;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+40;}
  else{x=-40;y=Math.random()*H;}
  return {x,y,hp:2+level,maxHp:2+level,vx:0,vy:0,angle:0,r:22,alive:true,shootCooldown:Math.random()*120,type:Math.random()<0.3?'bomber':'fighter',bullets:[]};
}

function initGame(){
  score=0;lives=3;level=1;frame=0;
  ship=mkShip();bullets=[];enemies=[];particles=[];powerUps=[];
  asteroids=Array.from({length:4+level},()=>{
    let x,y;
    do{x=Math.random()*W;y=Math.random()*H;}while(Math.hypot(x-W/2,y-H/2)<120);
    return mkAsteroid(x,y);
  });
  stars=mkStars();
}

function spawnLevel(){
  level++;
  for(let i=0;i<2+level;i++){
    let x,y;
    do{x=Math.random()*W;y=Math.random()*H;}while(Math.hypot(x-W/2,y-H/2)<120);
    asteroids.push(mkAsteroid(x,y));
  }
  if(level%2===0) enemies.push(mkEnemy());
}

function explode(x,y,color,n=15){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2,spd=Math.random()*5+1;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:30+Math.random()*40,maxLife:60,color:color||`hsl(${30+Math.random()*40},100%,60%)`});
  }
}

function drawShip(){
  const s=ship;
  ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.angle);
  // Shield
  if(s.shield>0){
    ctx.strokeStyle=`rgba(100,200,255,${s.shield/200})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,s.r+8,0,Math.PI*2);ctx.stroke();
  }
  // Engine glow
  if(keys['ArrowUp']||keys['w']||keys['btn-thrust']){
    const flameG=ctx.createRadialGradient(0,14,0,0,20,18);
    flameG.addColorStop(0,'#FFD700');flameG.addColorStop(0.5,'#FF6600');flameG.addColorStop(1,'transparent');
    ctx.fillStyle=flameG;
    ctx.beginPath();ctx.moveTo(-7,10);ctx.lineTo(0,22+Math.random()*12);ctx.lineTo(7,10);ctx.fill();
  }
  // Ship body (detailed)
  const body=ctx.createLinearGradient(-16,16,16,-20);
  body.addColorStop(0,'#1a3a5c');body.addColorStop(1,'#4a8fce');
  ctx.fillStyle=body;
  ctx.beginPath();
  ctx.moveTo(0,-20);ctx.lineTo(-14,14);ctx.lineTo(-8,8);ctx.lineTo(0,12);
  ctx.lineTo(8,8);ctx.lineTo(14,14);ctx.closePath();ctx.fill();
  // Cockpit
  ctx.fillStyle='rgba(0,200,255,0.5)';
  ctx.beginPath();ctx.ellipse(0,-6,6,9,0,0,Math.PI*2);ctx.fill();
  // Wings
  ctx.fillStyle='#2980B9';
  ctx.beginPath();ctx.moveTo(-14,14);ctx.lineTo(-22,18);ctx.lineTo(-10,4);ctx.fill();
  ctx.beginPath();ctx.moveTo(14,14);ctx.lineTo(22,18);ctx.lineTo(10,4);ctx.fill();
  ctx.restore();
}

function drawAsteroid(a){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
  // Rocky shape
  ctx.beginPath();
  const pts=10;
  for(let i=0;i<pts;i++){
    const ang=(i/pts)*Math.PI*2;
    const rr=a.r*(0.75+Math.sin(i*7.3)*0.25);
    i===0?ctx.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr):ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);
  }
  ctx.closePath();
  const ag=ctx.createRadialGradient(0,0,0,0,0,a.r);
  ag.addColorStop(0,'#7f8c8d');ag.addColorStop(0.7,'#5d6d7e');ag.addColorStop(1,'#2c3e50');
  ctx.fillStyle=ag;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.5;ctx.stroke();
  // Crater
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.arc(-a.r*0.2,-a.r*0.15,a.r*0.25,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(a.r*0.25,a.r*0.2,a.r*0.15,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.angle);
  if(e.type==='bomber'){
    ctx.fillStyle='#8E44AD';
    ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#D35400';ctx.fillRect(-8,-8,16,16);
  } else {
    ctx.fillStyle='#C0392B';
    ctx.beginPath();ctx.moveTo(0,-e.r);ctx.lineTo(-e.r,e.r);ctx.lineTo(e.r,e.r);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,100,0,0.7)';
    ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
  }
  // HP bar
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-e.r,-e.r-10,e.r*2,6);
  ctx.fillStyle='#E74C3C';ctx.fillRect(-e.r,-e.r-10,e.r*2*(e.hp/e.maxHp),6);
  ctx.restore();
}

function loop(){
  if(!running)return;
  frame++;

  // BG
  ctx.fillStyle='#030610';ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    s.t+=s.blink;
    const brightness=0.5+Math.sin(s.t)*0.5;
    ctx.fillStyle=`rgba(255,255,255,${brightness})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });

  // Ship controls
  const thrusting=keys['ArrowUp']||keys['w']||keys['btn-thrust'];
  if(keys['ArrowLeft']||keys['a']) ship.angle-=0.06;
  if(keys['ArrowRight']||keys['d']) ship.angle+=0.06;
  if(thrusting){
    ship.vx+=Math.sin(ship.angle)*0.25;
    ship.vy-=Math.cos(ship.angle)*0.25;
    // Thruster particles
    if(frame%2===0) particles.push({x:ship.x-Math.sin(ship.angle)*20,y:ship.y+Math.cos(ship.angle)*20,vx:-Math.sin(ship.angle)*2+(Math.random()-0.5),vy:Math.cos(ship.angle)*2+(Math.random()-0.5),life:20,maxLife:20,color:`hsl(${30+Math.random()*30},100%,60%)`});
  }
  // Drag
  ship.vx*=0.98;ship.vy*=0.98;
  ship.x=(ship.x+ship.vx+W)%W;
  ship.y=(ship.y+ship.vy+H)%H;
  if(ship.shield>0)ship.shield--;
  if(ship.heat>0)ship.heat--;

  // Shoot
  if((keys[' ']||keys['btn-shoot'])&&ship.heat<=0){
    const speed=12;
    if(ship.gunLevel>=2){
      [-0.12,0.12].forEach(off=>{
        bullets.push({x:ship.x+Math.sin(ship.angle+off)*20,y:ship.y-Math.cos(ship.angle+off)*20,vx:Math.sin(ship.angle)*speed,vy:-Math.cos(ship.angle)*speed,life:45,color:'#00FFFF'});
      });
    } else {
      bullets.push({x:ship.x+Math.sin(ship.angle)*20,y:ship.y-Math.cos(ship.angle)*20,vx:Math.sin(ship.angle)*speed,vy:-Math.cos(ship.angle)*speed,life:45,color:'#00FFFF'});
    }
    ship.heat=ship.gunLevel>=3?4:8;
  }

  // Bullets
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{
    b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;b.life--;
    ctx.save();ctx.shadowBlur=10;ctx.shadowColor=b.color;
    ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Asteroids
  asteroids.forEach((a,ai)=>{
    a.x=(a.x+a.vx+W)%W;a.y=(a.y+a.vy+H)%H;a.angle+=a.spin;
    drawAsteroid(a);
    // Bullet collision
    bullets.forEach((b,bi)=>{
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        b.life=0;
        explode(a.x,a.y,'#aaa');
        score+=a.pts;
        if(a.r>20){
          asteroids.push(mkAsteroid(a.x+20,a.y,a.r/2));
          asteroids.push(mkAsteroid(a.x-20,a.y,a.r/2));
          if(Math.random()<0.2) powerUps.push({x:a.x,y:a.y,type:Math.random()<0.5?'shield':'gun',ttl:300,anim:0});
        }
        asteroids[ai]=null;
      }
    });
    // Ship collision
    if(a&&Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+ship.r-4&&ship.shield<=0){
      explode(ship.x,ship.y,'#FFD700',25);
      lives--;ship.shield=180;
      ship.vx=ship.vy=0;ship.x=W/2;ship.y=H/2;
      if(lives<=0){running=false;cancelAnimationFrame(af);setTimeout(()=>submitScore(score),1000);}
    }
  });
  asteroids=asteroids.filter(a=>a);

  // Enemies
  enemies.forEach((e,ei)=>{
    if(!e.alive)return;
    const dx=ship.x-e.x,dy=ship.y-e.y;
    e.angle=Math.atan2(dx,dy);
    const spd=e.type==='bomber'?0.8:1.5;
    e.vx+=Math.sin(e.angle)*0.04*spd;e.vy+=Math.cos(e.angle)*0.04*spd;
    e.vx*=0.96;e.vy*=0.96;
    e.x=(e.x+e.vx+W)%W;e.y=(e.y+e.vy+H)%H;
    e.shootCooldown--;
    if(e.shootCooldown<=0){
      const spd2=5;
      e.bullets.push({x:e.x,y:e.y,vx:Math.sin(e.angle)*spd2,vy:Math.cos(e.angle)*spd2,life:60,color:'#E74C3C'});
      e.shootCooldown=60+Math.random()*60;
    }
    e.bullets=e.bullets.filter(b=>b.life>0);
    e.bullets.forEach(b=>{
      b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;b.life--;
      ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#E74C3C';
      ctx.fillStyle='#E74C3C';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
      ctx.restore();
      if(Math.hypot(b.x-ship.x,b.y-ship.y)<ship.r+4&&ship.shield<=0){
        b.life=0;explode(ship.x,ship.y,'#FFD700',15);
        lives--;ship.shield=180;ship.vx=ship.vy=0;ship.x=W/2;ship.y=H/2;
        if(lives<=0){running=false;cancelAnimationFrame(af);setTimeout(()=>submitScore(score),1000);}
      }
    });
    // Bullet hit
    bullets.forEach(b=>{
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
        b.life=0;e.hp--;
        if(e.hp<=0){e.alive=false;explode(e.x,e.y,'#E74C3C',30);score+=200*level;enemies[ei]=null;}
      }
    });
    if(e.alive) drawEnemy(e);
  });
  enemies=enemies.filter(e=>e);

  // PowerUps
  powerUps=powerUps.filter(p=>p.ttl>0);
  powerUps.forEach(p=>{
    p.ttl--;p.anim++;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.anim*0.05);
    ctx.shadowBlur=15;ctx.shadowColor=p.type==='shield'?'#3498DB':'#F1C40F';
    ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.type==='shield'?'🛡️':'⚡',0,0);
    ctx.restore();
    if(Math.hypot(p.x-ship.x,p.y-ship.y)<ship.r+14){
      if(p.type==='shield'){ship.shield=300;explode(ship.x,ship.y,'#3498DB',10);}
      else{ship.gunLevel=Math.min(3,ship.gunLevel+1);explode(ship.x,ship.y,'#F1C40F',10);}
      p.ttl=0;
    }
  });

  // Level clear
  if(asteroids.length===0&&enemies.length===0){spawnLevel();}

  drawShip();

  // Particles
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;ctx.save();ctx.globalAlpha=pt.life/pt.maxLife;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);ctx.fill();ctx.restore();});
  particles=particles.filter(pt=>pt.life>0);

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(10,10,160,44,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='13px monospace';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`SCORE: ${score}`,18,16);
  ctx.fillText(`LEVEL: ${level} | ❤️ ${lives}`,18,34);
  ctx.fillStyle=ship.shield>0?'#3498DB':'rgba(0,255,200,0.6)';
  ctx.font='20px sans-serif';ctx.fillText(ship.shield>0?'🛡️':'🚀',W-36,12);
  if(ship.gunLevel>1){ctx.fillStyle='#F1C40F';ctx.font='16px sans-serif';ctx.fillText(`⚡${ship.gunLevel}`,W-36,38);}
  document.getElementById('score-display').textContent=score;

  af=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  initGame();running=true;cancelAnimationFrame(af);loop();
}

// Keys
document.addEventListener('keydown',e=>{keys[e.key]=true;[' ','ArrowUp'].includes(e.key)&&e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.key]=false);

['btn-left','btn-right','btn-shoot','btn-thrust'].forEach(id=>{
  const btn=document.getElementById(id);if(!btn)return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();keys[id]=true;},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();keys[id]=false;},{passive:false});
  btn.addEventListener('mousedown',()=>keys[id]=true);
  btn.addEventListener('mouseup',()=>keys[id]=false);
});

// Preview
ctx.fillStyle='#030610';ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#00F5FF';ctx.font='bold 30px sans-serif';ctx.textAlign='center';
ctx.shadowBlur=20;ctx.shadowColor='#00F5FF';ctx.fillText('🚀 스페이스 워',W/2,H/2-30);
ctx.shadowBlur=0;ctx.fillStyle='#aaa';ctx.font='13px sans-serif';
ctx.fillText('방향키 조작 | SPACE 발사',W/2,H/2+10);
ctx.fillText('소행성 및 적 격파 | 아이템 수집',W/2,H/2+34);
</script>
{% endblock %}
