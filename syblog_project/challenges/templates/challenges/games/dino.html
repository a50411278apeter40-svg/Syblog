{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:700px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:12px;width:100%;display:block;touch-action:none;box-shadow:0 8px 32px rgba(0,0,0,0.6);"></canvas>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=700,H=280;
canvas.width=W;canvas.height=H;

// Load real assets
const dinoImg=new Image();dinoImg.crossOrigin='anonymous';
dinoImg.src='https://www.pngall.com/wp-content/uploads/13/Dino-PNG-File.png';
const cactusImg=new Image();cactusImg.crossOrigin='anonymous';
cactusImg.src='https://www.pngall.com/wp-content/uploads/12/Cactus-Transparent.png';
const pteroImg=new Image();pteroImg.crossOrigin='anonymous';
pteroImg.src='https://www.pngall.com/wp-content/uploads/12/Pterodactyl-PNG-File.png';
const cloudImg=new Image();cloudImg.crossOrigin='anonymous';
cloudImg.src='https://www.pngall.com/wp-content/uploads/12/Cloud-PNG.png';

let af,running=false,score=0,hiScore=0,frame=0;
let dino,obstacles,clouds,groundX,speed,particles=[];
let nightMode=false,nightAlpha=0;

const GROUND=H-55;

function initGame(){
  score=0;frame=0;speed=7;particles=[];groundX=0;nightAlpha=0;nightMode=false;
  dino={x:80,y:GROUND,vy:0,w:56,h:56,jumping:false,ducking:false,run:0,alive:true};
  obstacles=[];clouds=[{x:200,y:40,w:100,h:36,speed:1.2},{x:500,y:65,w:80,h:28,speed:0.9}];
}

function jump(){
  if(!dino.jumping&&!dino.ducking){
    dino.vy=-16;dino.jumping=true;
    for(let i=0;i<8;i++) particles.push({x:dino.x+dino.w/2,y:GROUND+dino.h,vx:(Math.random()-0.5)*4,vy:Math.random()*-3,life:20,color:'#aaa'});
  }
}

function duck(v){dino.ducking=v;}

function drawDino(){
  const d=dino;
  const drawn=dinoImg.complete&&dinoImg.naturalWidth&&drawImage2(dinoImg,d.x,d.y,d.w,d.h);
  if(!drawn){
    // Pixel dino
    ctx.fillStyle='#555';
    if(d.ducking){
      ctx.fillRect(d.x,d.y+20,70,30);// body
      ctx.fillRect(d.x+50,d.y+10,25,25);// head
    } else {
      ctx.fillRect(d.x+10,d.y,28,46);// body
      ctx.fillRect(d.x+20,d.y-22,28,26);// head
      ctx.fillStyle='#888';ctx.fillRect(d.x+36,d.y-16,8,8);// eye
      ctx.fillStyle='#555';
      // Legs
      const lOff=d.run<10?[0,12]:[8,4];
      ctx.fillRect(d.x+12,d.y+38,10,lOff[0]+10);
      ctx.fillRect(d.x+26,d.y+38,10,lOff[1]+10);
    }
  }
}

function drawImage2(img,x,y,w,h){
  if(!img||!img.complete||!img.naturalWidth)return false;
  ctx.drawImage(img,x,y,w,h);return true;
}

function loop(){
  if(!running)return;
  frame++;score=Math.floor(frame*speed/10);
  speed=7+score/500;

  // Night mode
  if(score>0&&score%800<2){nightMode=!nightMode;}
  nightAlpha=nightMode?Math.min(nightAlpha+0.01,0.85):Math.max(nightAlpha-0.01,0);

  // BG sky
  const sky=ctx.createLinearGradient(0,0,0,H-55);
  sky.addColorStop(0,nightMode?'#001122':'#87CEEB');
  sky.addColorStop(1,nightMode?'#002244':'#C8E6FA');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Moon or Sun
  if(nightMode){
    ctx.fillStyle='rgba(255,255,200,0.9)';ctx.shadowBlur=30;ctx.shadowColor='#ffffaa';
    ctx.beginPath();ctx.arc(W-60,50,28,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // Stars
    for(let i=0;i<40;i++){ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(frame*0.05+i)*0.3})`;ctx.beginPath();ctx.arc(i*18+Math.sin(i)*10,(i*13+5)%100,1.5,0,Math.PI*2);ctx.fill();}
  } else {
    ctx.fillStyle='#FFD700';ctx.shadowBlur=30;ctx.shadowColor='#FFAA00';
    ctx.beginPath();ctx.arc(60,50,26,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }

  // Mountains BG
  ctx.fillStyle=nightMode?'#001a33':'rgba(130,180,120,0.35)';
  ctx.beginPath();ctx.moveTo(0,GROUND);
  [0,80,160,240,320,400,480,560,640,700].forEach((x,i)=>{
    ctx.lineTo(x,GROUND-(i%2===0?80:50)-(i*7)%40);
  });
  ctx.lineTo(W,GROUND);ctx.fill();

  // Clouds
  clouds.forEach(c=>{
    c.x-=c.speed;if(c.x<-150)c.x=W+100+Math.random()*200;
    const drawn=drawImage2(cloudImg,c.x,c.y,c.w,c.h);
    if(!drawn){
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.beginPath();ctx.arc(c.x+30,c.y+18,22,0,Math.PI*2);ctx.arc(c.x+55,c.y+12,28,0,Math.PI*2);ctx.arc(c.x+80,c.y+18,22,0,Math.PI*2);ctx.fill();
    }
  });

  // Ground
  groundX-=speed;if(groundX<=-64)groundX=0;
  ctx.fillStyle=nightMode?'#2d5a1b':'#8B7355';
  ctx.fillRect(0,GROUND+dino.h,W,H-GROUND-dino.h);
  ctx.fillStyle=nightMode?'#3a7a25':'#6B8E23';
  ctx.fillRect(0,GROUND+dino.h,W,8);
  // Ground detail
  ctx.strokeStyle=nightMode?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.1)';ctx.lineWidth=1.5;
  for(let x=(groundX%64)+0;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,GROUND+dino.h+4);ctx.lineTo(x+32,GROUND+dino.h+4);ctx.stroke();}
  // Dust
  for(let x=0;x<W;x+=110){ctx.fillStyle='rgba(150,120,80,0.4)';ctx.fillRect((x+frame*speed)%W,GROUND+dino.h+2,30,3);}

  // Spawn obstacles
  if(frame%Math.max(50,80-Math.floor(speed*3))===0){
    const type=Math.random()<0.3?'ptero':'cactus';
    const y=type==='ptero'?GROUND-Math.random()*70-20:GROUND;
    obstacles.push({x:W+60,y,type,w:type==='ptero'?52:40,h:type==='ptero'?40:56,frame:0});
  }

  // Obstacles
  obstacles=obstacles.filter(o=>o.x>-100);
  obstacles.forEach(o=>{
    o.x-=speed;o.frame++;
    if(o.type==='cactus'){
      const drawn=drawImage2(cactusImg,o.x,o.y,o.w,o.h);
      if(!drawn){
        ctx.fillStyle='#2ECC71';
        ctx.fillRect(o.x+12,o.y,16,56);
        ctx.fillRect(o.x,o.y+14,12,14);ctx.fillRect(o.x+28,o.y+20,12,14);
      }
    } else {
      const flapY=Math.sin(o.frame*0.15)*8;
      const drawn=drawImage2(pteroImg,o.x,o.y+flapY,o.w,o.h);
      if(!drawn){
        ctx.fillStyle='#8E44AD';
        ctx.beginPath();ctx.moveTo(o.x+26,o.y+20+flapY);
        ctx.lineTo(o.x,o.y+flapY);ctx.lineTo(o.x+10,o.y+30+flapY);
        ctx.lineTo(o.x+52,o.y+flapY);ctx.closePath();ctx.fill();
      }
    }
    // Collision (tighter hitbox)
    const dx=dino.ducking?70:56,dh=dino.ducking?30:dino.h;
    const dy=dino.ducking?20:0;
    if(dino.x+10<o.x+o.w-10&&dino.x+dx-10>o.x+10&&dino.y+dy+10<o.y+o.h-10&&dino.y+dy+dh-10>o.y+10){
      dino.alive=false;
    }
  });

  // Physics
  if(dino.jumping){
    dino.vy+=0.7;dino.y+=dino.vy;
    if(dino.y>=GROUND){dino.y=GROUND;dino.vy=0;dino.jumping=false;}
  }
  dino.run=(dino.run+1)%20;

  drawDino();

  // Particles
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.2;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  particles.forEach(pt=>{ctx.save();ctx.globalAlpha=pt.life/20;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);ctx.fill();ctx.restore();});

  // HUD
  ctx.fillStyle=nightMode?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.7)';
  ctx.font='bold 18px monospace';ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText(`${String(score).padStart(5,'0')}`,W-14,12);
  if(hiScore>0){ctx.font='12px monospace';ctx.fillText(`HI ${String(hiScore).padStart(5,'0')}`,W-14,34);}

  if(!dino.alive){
    running=false;cancelAnimationFrame(af);
    if(score>hiScore)hiScore=score;
    // Game over text
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#E74C3C';ctx.font='bold 36px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('💀 GAME OVER',W/2,H/2-20);
    ctx.fillStyle='#fff';ctx.font='16px monospace';ctx.fillText(`SCORE: ${score}`,W/2,H/2+20);
    setTimeout(()=>submitScore(score),1500);
  }
  document.getElementById('score-display').textContent=score;
  af=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  initGame();running=true;cancelAnimationFrame(af);loop();
}

canvas.addEventListener('click',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key===' '||e.key==='w'){e.preventDefault();jump();}
  if(e.key==='ArrowDown'||e.key==='s'){duck(true);}
});
document.addEventListener('keyup',e=>{if(e.key==='ArrowDown'||e.key==='s')duck(false);});

// Preview
const sky2=ctx.createLinearGradient(0,0,0,H);sky2.addColorStop(0,'#87CEEB');sky2.addColorStop(1,'#C8E6FA');
ctx.fillStyle=sky2;ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#2ECC71';ctx.font='bold 34px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.shadowBlur=15;ctx.shadowColor='#2ECC71';ctx.fillText('🦖 공룡 달리기',W/2,H/2-20);
ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='15px sans-serif';ctx.fillText('클릭/스페이스 점프 | 아래 키 숙이기',W/2,H/2+20);
</script>
{% endblock %}
