{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="position:relative;width:100%;max-width:480px;margin:0 auto;">
  <canvas id="gameCanvas" style="border-radius:16px;width:100%;display:block;touch-action:none;box-shadow:0 10px 40px rgba(0,0,0,0.7);"></canvas>
  <div style="display:flex;justify-content:space-between;padding:8px;margin-top:4px;">
    <button id="btn-left" style="width:80px;height:56px;border-radius:10px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.35);color:#fff;font-size:26px;touch-action:none;">◄</button>
    <button id="btn-right" style="width:80px;height:56px;border-radius:10px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.35);color:#fff;font-size:26px;touch-action:none;">►</button>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=480,H=600;
canvas.width=W;canvas.height=H;

const carImg=new Image();carImg.crossOrigin='anonymous';
carImg.src='https://opengameart.org/sites/default/files/styles/medium/public/car_0.png';

let af,running=false,score=0,frame=0,lives=3;
let car,obstacles,coins,particles,roadY,speed,lane;
let keys={};

const LANES=[120,200,280,360];
const CAR_COLORS=['#E74C3C','#3498DB','#2ECC71','#F1C40F','#9B59B6','#E67E22'];
const OBS_COLORS=['#7F8C8D','#BDC3C7','#2C3E50','#E74C3C'];

function rndObs(){
  const laneIdx=Math.floor(Math.random()*LANES.length);
  const type=Math.random()<0.15?'barrel':Math.random()<0.2?'cone':'car';
  return{x:LANES[laneIdx],y:-80,type,color:OBS_COLORS[Math.floor(Math.random()*OBS_COLORS.length)],speed:0,lane:laneIdx};
}

function initGame(){
  score=0;frame=0;speed=4;lives=3;particles=[];roadY=0;lane=1;
  car={x:LANES[lane],y:H-120,w:46,h:80,color:CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)],vx:0,tilt:0,skid:0};
  obstacles=[];coins=[];
}

function drawCar(x,y,w,h,color,tilt=0,isPlayer=false){
  ctx.save();ctx.translate(x,y);ctx.rotate(tilt*Math.PI/180);
  // Body
  const cg=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
  cg.addColorStop(0,lighten(color,25));cg.addColorStop(1,darken(color,15));
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,8);ctx.fill();
  // Windows
  ctx.fillStyle='rgba(135,206,250,0.7)';
  ctx.beginPath();ctx.roundRect(-w/2+5,-h/2+8,w-10,h/3,4);ctx.fill();
  ctx.fillStyle='rgba(135,206,250,0.5)';
  ctx.beginPath();ctx.roundRect(-w/2+5,h/8,w-10,h/5,4);ctx.fill();
  // Wheels
  ctx.fillStyle='#222';
  [[-w/2-4,-h/2+8],[-w/2-4,h/6],[w/2-4,-h/2+8],[w/2-4,h/6]].forEach(([wx,wy])=>{ctx.beginPath();ctx.roundRect(wx,wy,10,18,3);ctx.fill();});
  // Grill
  ctx.fillStyle='#222';ctx.beginPath();ctx.roundRect(-w/2+4,isPlayer?h/2-10:-h/2,w-8,10,2);ctx.fill();
  // Headlights
  ctx.fillStyle=isPlayer?'#FFD700':'#E74C3C';
  [[-w/2+4],[w-8-w/2+4]].forEach(([lx])=>{ctx.beginPath();ctx.roundRect(lx,isPlayer?h/2-10:-h/2,10,8,2);ctx.fill();});
  if(isPlayer){ctx.shadowBlur=16;ctx.shadowColor='rgba(255,215,0,0.6)';}
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.roundRect(-w/2+6,-h/2+4,w/2-4,h/3,4);ctx.fill();
  ctx.restore();
}

function loop(){
  if(!running)return;
  frame++;score=Math.floor(frame*speed/10);
  speed=4+score/200;

  // Road BG
  const roadGrad=ctx.createLinearGradient(0,0,0,H);
  roadGrad.addColorStop(0,'#1a1a2e');roadGrad.addColorStop(1,'#16213e');
  ctx.fillStyle=roadGrad;ctx.fillRect(0,0,W,H);

  // Scenery (grass sides)
  ctx.fillStyle='#2d5a1b';ctx.fillRect(0,0,80,H);ctx.fillRect(W-80,0,80,H);
  // Trees
  [50,150,250,350,450,550].forEach((ty,i)=>{
    const tx=(i%2===0?30:W-30);const ty2=(ty-roadY*0.3+H)%H;
    ctx.fillStyle='#1a3a0a';ctx.beginPath();ctx.arc(tx,ty2,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4a7a2a';ctx.beginPath();ctx.arc(tx,ty2-5,13,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6B4226';ctx.fillRect(tx-3,ty2+16,6,16);
  });

  // Road
  ctx.fillStyle='#333340';ctx.fillRect(80,0,W-160,H);
  // Road border
  ctx.strokeStyle='#FF8C00';ctx.lineWidth=4;
  ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(84,0);ctx.lineTo(84,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-84,0);ctx.lineTo(W-84,H);ctx.stroke();
  // Lane dividers
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=3;ctx.setLineDash([40,30]);ctx.lineDashOffset=-roadY;
  [160,240,320].forEach(lx=>{ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();});
  ctx.setLineDash([]);

  roadY=(roadY+speed)%70;

  // Spawn
  if(frame%Math.max(30,60-Math.floor(speed*4))===0) obstacles.push(rndObs());
  if(frame%90===0) coins.push({x:LANES[Math.floor(Math.random()*LANES.length)],y:-30,r:14,anim:0});

  // Obstacles
  obstacles=obstacles.filter(o=>o.y<H+100);
  obstacles.forEach(o=>{
    o.y+=speed+1;
    ctx.save();ctx.translate(o.x,o.y);
    if(o.type==='car'){
      ctx.restore();
      drawCar(o.x,o.y,46,80,o.color);
    } else if(o.type==='barrel'){
      ctx.fillStyle='#C0392B';ctx.beginPath();ctx.roundRect(-16,-22,32,44,6);ctx.fill();
      ctx.fillStyle='#E74C3C';ctx.fillRect(-16,-4,32,8);ctx.fillStyle='#FFF';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('⚠️',0,6);
      ctx.restore();
    } else {
      ctx.fillStyle='#F39C12';ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(15,14);ctx.lineTo(-15,14);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('!',0,10);
      ctx.restore();
    }
    // Collision
    if(Math.abs(o.x-car.x)<36&&Math.abs(o.y-car.y)<55){
      lives--;car.skid=20;
      for(let i=0;i<20;i++) particles.push({x:car.x,y:car.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-4)*4,life:40,color:['#E74C3C','#F1C40F','#ddd'][Math.floor(Math.random()*3)],r:Math.random()*7+2});
      o.y=H+200;
      if(lives<=0){running=false;cancelAnimationFrame(af);setTimeout(()=>submitScore(score),800);}
    }
  });

  // Coins
  coins=coins.filter(c=>c.y<H+40);
  coins.forEach(c=>{
    c.y+=speed;c.anim++;
    const pulse=1+Math.sin(c.anim*0.15)*0.2;
    ctx.save();ctx.shadowBlur=14;ctx.shadowColor='#FFD700';
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(c.x,c.y,c.r*pulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFF9';ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💰',c.x,c.y);
    ctx.restore();
    if(Math.abs(c.x-car.x)<30&&Math.abs(c.y-car.y)<30){
      score+=50;c.y=H+100;
      for(let i=0;i<10;i++) particles.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-2)*4,life:25,color:'#FFD700',r:4});
    }
  });

  // Player car controls
  const targetLane=LANES[lane];
  car.vx=(targetLane-car.x)*0.15;
  car.x+=car.vx;
  car.tilt=car.vx*0.3;

  drawCar(car.x,car.y,car.w,car.h,car.color,car.tilt,true);
  // Skid
  if(car.skid>0){car.skid--;ctx.save();ctx.globalAlpha=car.skid/20*0.5;ctx.fillStyle='#fff';ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💥',car.x,car.y);ctx.restore();}

  // Speed lines
  if(speed>7){
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=2;
    for(let i=0;i<6;i++){const lx=90+Math.random()*(W-180),ly=Math.random()*H;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx,ly-30-Math.random()*40);ctx.stroke();}
  }

  // Particles
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.25;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  particles.forEach(pt=>{ctx.save();ctx.globalAlpha=pt.life/40;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();ctx.restore();});

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(10,10,180,52,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText(`거리: ${score}m`,16,14);ctx.fillText(`속도: ${Math.round(speed*18)}km/h`,16,34);
  for(let i=0;i<lives;i++){ctx.font='16px serif';ctx.textAlign='left';ctx.fillText('❤️',16+i*22,52);}
  // Speedometer arc
  ctx.save();ctx.translate(W-55,H-55);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=8;ctx.beginPath();ctx.arc(0,0,38,Math.PI,0);ctx.stroke();
  const speedRatio=Math.min(1,(speed-4)/8);
  ctx.strokeStyle=speedRatio>0.7?'#E74C3C':speedRatio>0.4?'#F1C40F':'#2ECC71';
  ctx.beginPath();ctx.arc(0,0,38,Math.PI,Math.PI+speedRatio*Math.PI);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${Math.round(speed*18)}`,0,0);
  ctx.restore();

  document.getElementById('score-display').textContent=score;

  if(keys['ArrowLeft']||keys['btn-left']) lane=Math.max(0,lane-0.08);
  if(keys['ArrowRight']||keys['btn-right']) lane=Math.min(3,lane+0.08);

  af=requestAnimationFrame(loop);
}

function lighten(hex,pct){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const f=pct/100;return'#'+[r,g,b].map(v=>Math.min(255,Math.round(v+(255-v)*f)).toString(16).padStart(2,'0')).join('');}catch(e){return hex;}}
function darken(hex,pct){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const f=1-pct/100;return'#'+[r,g,b].map(v=>Math.max(0,Math.round(v*f)).toString(16).padStart(2,'0')).join('');}catch(e){return hex;}}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  initGame();running=true;cancelAnimationFrame(af);loop();
}

document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>keys[e.key]=false);
['btn-left','btn-right'].forEach(id=>{
  const btn=document.getElementById(id);if(!btn)return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();keys[id]=true;},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();keys[id]=false;},{passive:false});
  btn.addEventListener('mousedown',()=>keys[id]=true);
  btn.addEventListener('mouseup',()=>keys[id]=false);
});

let swipeStartX=0;
canvas.addEventListener('touchstart',e=>{swipeStartX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swipeStartX;
  if(dx<-30) lane=Math.max(0,Math.round(lane)-1);
  if(dx>30) lane=Math.min(3,Math.round(lane)+1);
},{passive:true});

// Preview
ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#F1C40F';ctx.font='bold 32px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.shadowBlur=20;ctx.shadowColor='#F1C40F';ctx.fillText('🏎️ 레이싱',W/2,H/2-24);
ctx.shadowBlur=0;ctx.fillStyle='#aaa';ctx.font='15px sans-serif';ctx.fillText('← → 차선 변경 | 장애물 피하기',W/2,H/2+18);ctx.fillText('💰 코인 수집으로 추가 점수!',W/2,H/2+46);
</script>
{% endblock %}
