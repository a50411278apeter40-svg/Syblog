{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="display:flex;justify-content:center;gap:16px;align-items:flex-start;flex-wrap:wrap;">
<canvas id="gameCanvas" style="border-radius:10px;touch-action:none;"></canvas>
<div id="side-panel" style="min-width:110px;color:#fff;">
  <div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:14px;margin-bottom:12px;">
    <div style="font-size:12px;color:#aaa;margin-bottom:4px;">NEXT</div>
    <canvas id="nextCanvas" width="80" height="80" style="border-radius:6px;background:rgba(0,0,0,0.3);"></canvas>
  </div>
  <div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:14px;margin-bottom:12px;">
    <div style="font-size:12px;color:#aaa;">LINES</div>
    <div id="lines-display" style="font-size:22px;font-weight:800;color:#48cfad;">0</div>
  </div>
  <div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:14px;">
    <div style="font-size:12px;color:#aaa;">LEVEL</div>
    <div id="level-display" style="font-size:22px;font-weight:800;color:#ffd700;">1</div>
  </div>
</div>
</div>
<div id="mobile-ctrl" style="display:flex;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap;">
  <button onclick="moveLeft()" style="padding:12px 20px;border-radius:8px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;cursor:pointer;">◀</button>
  <button onclick="rotate()" style="padding:12px 20px;border-radius:8px;background:rgba(108,99,255,0.6);border:none;color:#fff;font-size:20px;cursor:pointer;">🔄</button>
  <button onclick="moveRight()" style="padding:12px 20px;border-radius:8px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;cursor:pointer;">▶</button>
  <button onclick="hardDrop()" style="padding:12px 20px;border-radius:8px;background:rgba(255,80,80,0.6);border:none;color:#fff;font-size:14px;cursor:pointer;">⬇ DROP</button>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const nCanvas=document.getElementById('nextCanvas');
const nCtx=nCanvas.getContext('2d');
const COLS=10,ROWS=20,CS=28;
canvas.width=COLS*CS; canvas.height=ROWS*CS;

const PIECES=[
  {shape:[[1,1,1,1]],color:'#00f5ff',shadow:'#00aacc',name:'I'},
  {shape:[[1,0],[1,0],[1,1]],color:'#ff9800',shadow:'#cc7000',name:'J'},
  {shape:[[0,1],[0,1],[1,1]],color:'#3f51b5',shadow:'#1a237e',name:'L'},
  {shape:[[1,1],[1,1]],color:'#ffeb3b',shadow:'#ccbb00',name:'O'},
  {shape:[[0,1,1],[1,1,0]],color:'#4caf50',shadow:'#2e7d32',name:'S'},
  {shape:[[1,1,0],[0,1,1]],color:'#f44336',shadow:'#b71c1c',name:'Z'},
  {shape:[[1,1,1],[0,1,0]],color:'#9c27b0',shadow:'#4a148c',name:'T'}
];

let board,current,next,score,lines,level,running=false,dropInterval,af,frame=0,particles=[];
let clearAnim=null;

function newBoard(){ return Array.from({length:ROWS},()=>Array(COLS).fill(null)); }

function randPiece(){
  let p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return {shape:p.shape.map(r=>[...r]),color:p.color,shadow:p.shadow,x:Math.floor(COLS/2)-Math.floor(p.shape[0].length/2),y:0,name:p.name};
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  board=newBoard(); score=0; lines=0; level=1; particles=[]; clearAnim=null;
  current=randPiece(); next=randPiece(); running=true; frame=0;
  clearInterval(dropInterval);
  dropInterval=setInterval(drop,getSpeed());
  cancelAnimationFrame(af); drawLoop();
  document.getElementById('lines-display').textContent=0;
  document.getElementById('level-display').textContent=1;
}

function getSpeed(){ return Math.max(80,600-level*55); }

function drawBlock(c,x,y,alpha=1){
  ctx.globalAlpha=alpha;
  // 메인
  let g=ctx.createLinearGradient(x,y,x+CS,y+CS);
  g.addColorStop(0,c.color); g.addColorStop(1,c.shadow);
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(x+1,y+1,CS-2,CS-2,4); ctx.fill();
  // 하이라이트
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.roundRect(x+3,y+3,CS*0.5,CS*0.3,3); ctx.fill();
  // 그림자 엣지
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(x+CS-4,y+4,3,CS-5);
  ctx.fillRect(x+4,y+CS-4,CS-5,3);
  ctx.globalAlpha=1;
}

function drawBoard(){
  // 배경
  let bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,'#0d1b2a'); bg.addColorStop(1,'#1a2d4a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  // 그리드
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=0.5;
  for(let r=0;r<ROWS;r++){ ctx.beginPath(); ctx.moveTo(0,r*CS); ctx.lineTo(canvas.width,r*CS); ctx.stroke(); }
  for(let c=0;c<COLS;c++){ ctx.beginPath(); ctx.moveTo(c*CS,0); ctx.lineTo(c*CS,canvas.height); ctx.stroke(); }
  // 보드
  board.forEach((row,r)=>row.forEach((cell,c)=>{
    if(cell){
      let flash=clearAnim&&clearAnim.rows.includes(r)&&Math.floor(frame/3)%2===0;
      if(flash){ ctx.fillStyle='#fff'; ctx.fillRect(c*CS,r*CS,CS,CS); }
      else drawBlock(cell,c*CS,r*CS);
    }
  }));
  // 고스트 피스
  let ghost={...current,shape:current.shape.map(r=>[...r])};
  while(canMove(ghost,0,1)) ghost.y++;
  ghost.shape.forEach((row,r)=>row.forEach((cell,c)=>{
    if(cell&&ghost.y!==current.y){
      ctx.globalAlpha=0.2;
      let g=ctx.createLinearGradient(ghost.x*CS+c*CS,ghost.y*CS+r*CS,ghost.x*CS+c*CS+CS,ghost.y*CS+r*CS+CS);
      g.addColorStop(0,current.color); g.addColorStop(1,current.shadow);
      ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect((ghost.x+c)*CS+1,(ghost.y+r)*CS+1,CS-2,CS-2,4); ctx.fill();
      ctx.globalAlpha=1;
    }
  }));
  // 현재 피스
  current.shape.forEach((row,r)=>row.forEach((cell,c)=>{
    if(cell) drawBlock(current,(current.x+c)*CS,(current.y+r)*CS);
  }));
  // 파티클
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i]; p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15;
    ctx.globalAlpha=p.life/40;
    ctx.fillStyle=p.color; ctx.beginPath(); ctx.roundRect(p.x,p.y,p.size,p.size,2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawNext(){
  nCtx.fillStyle='rgba(0,0,0,0.3)'; nCtx.fillRect(0,0,80,80);
  let ns=20;
  let ox=Math.floor((80-next.shape[0].length*ns)/2);
  let oy=Math.floor((80-next.shape.length*ns)/2);
  next.shape.forEach((row,r)=>row.forEach((cell,c)=>{
    if(cell){
      let g=nCtx.createLinearGradient(ox+c*ns,oy+r*ns,ox+c*ns+ns,oy+r*ns+ns);
      g.addColorStop(0,next.color); g.addColorStop(1,next.shadow);
      nCtx.fillStyle=g; nCtx.beginPath(); nCtx.roundRect(ox+c*ns+1,oy+r*ns+1,ns-2,ns-2,3); nCtx.fill();
      nCtx.fillStyle='rgba(255,255,255,0.3)';
      nCtx.beginPath(); nCtx.roundRect(ox+c*ns+3,oy+r*ns+3,ns*0.4,ns*0.25,2); nCtx.fill();
    }
  }));
}

function drawLoop(){
  if(!running) return;
  frame++;
  if(clearAnim){
    clearAnim.timer--;
    if(clearAnim.timer<=0){
      clearAnim.rows.sort((a,b)=>b-a).forEach(r=>{
        board.splice(r,1); board.unshift(Array(COLS).fill(null));
      });
      clearAnim=null;
    }
  }
  drawBoard(); drawNext();
  af=requestAnimationFrame(drawLoop);
}

function canMove(piece,dx,dy){
  return piece.shape.every((row,r)=>row.every((cell,c)=>{
    if(!cell) return true;
    let nx=piece.x+c+dx, ny=piece.y+r+dy;
    return nx>=0&&nx<COLS&&ny<ROWS&&(ny<0||!board[ny][nx]);
  }));
}

function drop(){
  if(!running) return;
  if(canMove(current,0,1)) current.y++;
  else{ lockPiece(); }
}

function lockPiece(){
  current.shape.forEach((row,r)=>row.forEach((cell,c)=>{
    if(cell&&current.y+r>=0) board[current.y+r][current.x+c]={color:current.color,shadow:current.shadow};
  }));
  // 줄 클리어
  let cleared=[];
  board.forEach((row,r)=>{ if(row.every(c=>c)) cleared.push(r); });
  if(cleared.length){
    clearAnim={rows:cleared,timer:20};
    let pts=[0,100,300,700,1500][cleared.length]*level;
    score+=pts; lines+=cleared.length;
    let newLevel=Math.floor(lines/10)+1;
    if(newLevel>level){ level=newLevel; clearInterval(dropInterval); dropInterval=setInterval(drop,getSpeed()); }
    document.getElementById('score-display').textContent=score;
    document.getElementById('lines-display').textContent=lines;
    document.getElementById('level-display').textContent=level;
    // 파티클
    cleared.forEach(r=>{
      for(let c=0;c<COLS;c++){
        let cell=board[r][c];
        if(cell) for(let i=0;i<3;i++) particles.push({x:c*CS+CS/2,y:r*CS+CS/2,vx:(Math.random()-0.5)*8,vy:-4-Math.random()*4,life:40,color:cell.color,size:4+Math.random()*4});
      }
    });
  }
  current=next; next=randPiece();
  if(!canMove(current,0,0)){ running=false; clearInterval(dropInterval); cancelAnimationFrame(af); submitScore(score); }
}

function rotateShape(shape){
  return shape[0].map((_,c)=>shape.map(r=>r[c]).reverse());
}
function rotate(){
  if(!running) return;
  let rot={...current,shape:rotateShape(current.shape)};
  let kicks=[0,-1,1,-2,2];
  for(let k of kicks){ rot.x=current.x+k; if(canMove(rot,0,0)){current=rot;return;} }
}
function moveLeft(){ if(running&&canMove(current,-1,0)) current.x--; }
function moveRight(){ if(running&&canMove(current,1,0)) current.x++; }
function softDrop(){ if(running&&canMove(current,0,1)){current.y++;score+=1;document.getElementById('score-display').textContent=score;} }
function hardDrop(){
  if(!running) return;
  let dist=0;
  while(canMove(current,0,1)){current.y++;dist++;}
  score+=dist*2; document.getElementById('score-display').textContent=score;
  lockPiece();
}

document.addEventListener('keydown',e=>{
  if(!running) return;
  if(e.code==='ArrowLeft'){e.preventDefault();moveLeft();}
  if(e.code==='ArrowRight'){e.preventDefault();moveRight();}
  if(e.code==='ArrowDown'){e.preventDefault();softDrop();}
  if(e.code==='ArrowUp'||e.code==='KeyZ'){e.preventDefault();rotate();}
  if(e.code==='Space'){e.preventDefault();hardDrop();}
});
// 스와이프
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  let dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){dx>30?moveRight():dx<-30?moveLeft():rotate();}
  else{dy>30?hardDrop():rotate();}
},{passive:true});

// 초기 화면
let bg=ctx.createLinearGradient(0,0,0,canvas.height);
bg.addColorStop(0,'#0d1b2a'); bg.addColorStop(1,'#1a2d4a');
ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#48cfad'; ctx.font='bold 22px Arial'; ctx.textAlign='center';
ctx.fillText('🟦 테트리스',canvas.width/2,canvas.height/2-30);
ctx.fillStyle='#aaa'; ctx.font='13px Arial';
ctx.fillText('← → 이동 | ↑/Z 회전',canvas.width/2,canvas.height/2+5);
ctx.fillText('↓ 내리기 | Space 즉시',canvas.width/2,canvas.height/2+28); ctx.textAlign='left';
</script>
{% endblock %}
