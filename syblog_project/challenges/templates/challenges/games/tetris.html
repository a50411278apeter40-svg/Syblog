{% extends 'challenges/game_base.html' %}
{% block game_area %}
<div style="display:flex;gap:12px;justify-content:center;align-items:flex-start;max-width:600px;margin:0 auto;flex-wrap:wrap;">
  <canvas id="gameCanvas" style="border-radius:12px;display:block;touch-action:none;box-shadow:0 10px 40px rgba(0,0,0,0.7);"></canvas>
  <div style="display:flex;flex-direction:column;gap:12px;min-width:110px;">
    <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:12px;color:#fff;font-family:monospace;font-size:13px;">
      <div style="margin-bottom:4px;color:#aaa;">NEXT</div>
      <canvas id="nextCanvas" width="80" height="80" style="border-radius:8px;background:rgba(0,0,0,0.3);display:block;"></canvas>
    </div>
    <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:12px;color:#fff;font-family:monospace;font-size:13px;">
      <div style="color:#aaa;">HOLD</div>
      <canvas id="holdCanvas" width="80" height="80" style="border-radius:8px;background:rgba(0,0,0,0.3);display:block;margin-top:4px;"></canvas>
    </div>
    <div style="background:rgba(255,255,255,0.08);border-radius:12px;padding:12px;color:#fff;font-family:monospace;">
      <div style="color:#aaa;font-size:11px;">LINES</div>
      <div id="s-lines" style="font-size:20px;color:#F1C40F;">0</div>
      <div style="color:#aaa;font-size:11px;margin-top:6px;">LEVEL</div>
      <div id="s-level" style="font-size:20px;color:#3498DB;">1</div>
    </div>
    <!-- Mobile controls -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <button id="btn-rot" style="width:54px;height:40px;border-radius:8px;background:rgba(255,165,0,0.5);border:2px solid orange;color:#fff;font-size:18px;touch-action:none;">↻</button>
      <div style="display:flex;gap:4px;">
        <button id="btn-left" style="width:44px;height:40px;border-radius:8px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);color:#fff;font-size:16px;touch-action:none;">◄</button>
        <button id="btn-down" style="width:44px;height:40px;border-radius:8px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);color:#fff;font-size:16px;touch-action:none;">▼</button>
        <button id="btn-right" style="width:44px;height:40px;border-radius:8px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);color:#fff;font-size:16px;touch-action:none;">►</button>
      </div>
      <button id="btn-drop" style="width:140px;height:36px;border-radius:8px;background:rgba(52,152,219,0.6);border:2px solid #3498DB;color:#fff;font-size:12px;touch-action:none;">⬇ 드롭</button>
      <button id="btn-hold" style="width:140px;height:36px;border-radius:8px;background:rgba(155,89,182,0.6);border:2px solid #9B59B6;color:#fff;font-size:12px;touch-action:none;">C 홀드</button>
    </div>
  </div>
</div>
{% endblock %}
{% block game_script %}
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const nextCtx=document.getElementById('nextCanvas').getContext('2d');
const holdCtx=document.getElementById('holdCanvas').getContext('2d');
const CS=28,COLS=10,ROWS=20;
const W=COLS*CS,H=ROWS*CS;
canvas.width=W;canvas.height=H;

const PIECES={
  I:{shape:[[1,1,1,1]],color:'#00F5FF'},
  O:{shape:[[1,1],[1,1]],color:'#FFD700'},
  T:{shape:[[0,1,0],[1,1,1]],color:'#9B59B6'},
  S:{shape:[[0,1,1],[1,1,0]],color:'#2ECC71'},
  Z:{shape:[[1,1,0],[0,1,1]],color:'#E74C3C'},
  J:{shape:[[1,0,0],[1,1,1]],color:'#3498DB'},
  L:{shape:[[0,0,1],[1,1,1]],color:'#E67E22'},
};
const KEYS=Object.keys(PIECES);

let af,running=false,score=0,lines=0,level=1,frame=0,particles=[];
let board,current,next,hold,holdUsed,dropTimer,lineFlash=[];

function makeBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(null));}
function randPiece(){
  const k=KEYS[Math.floor(Math.random()*KEYS.length)];
  const p=PIECES[k];
  return {shape:p.shape.map(r=>[...r]),color:p.color,x:Math.floor(COLS/2)-Math.floor(p.shape[0].length/2),y:0};
}

function rotate(shape){
  const R=shape[0].length,C=shape.length;
  return Array.from({length:R},(_,r)=>Array.from({length:C},(_,c)=>shape[C-1-c][r]));
}

function valid(shape,ox,oy){
  for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    const nx=ox+c,ny=oy+r;
    if(nx<0||nx>=COLS||ny>=ROWS)return false;
    if(ny>=0&&board[ny][nx])return false;
  }
  return true;
}

function lock(){
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{
    if(v&&current.y+r>=0) board[current.y+r][current.x+c]=current.color;
  }));
  // Clear lines
  let cleared=[];
  board=board.filter((row,i)=>{
    if(row.every(c=>c)){cleared.push(i);return false;}
    return true;
  });
  while(board.length<ROWS) board.unshift(Array(COLS).fill(null));
  if(cleared.length){
    const pts=[0,100,300,500,800];
    score+=pts[cleared.length]*(level);
    lines+=cleared.length;
    level=Math.floor(lines/10)+1;
    // Particle burst
    cleared.forEach(y=>{
      for(let i=0;i<20;i++) particles.push({x:Math.random()*W,y:y*CS,vx:(Math.random()-0.5)*8,vy:(Math.random()-3)*5,life:60,color:`hsl(${Math.random()*360},100%,60%)`});
    });
  }
  holdUsed=false;
  current=next;
  next=randPiece();
  if(!valid(current.shape,current.x,current.y)){
    running=false;cancelAnimationFrame(af);
    setTimeout(()=>submitScore(score),800);
  }
}

function drop(){
  if(valid(current.shape,current.x,current.y+1)) current.y++;
  else lock();
  dropTimer=0;
}

function hardDrop(){
  let y=current.y;
  while(valid(current.shape,current.x,y+1)) y++;
  score+=2*(y-current.y);
  current.y=y;
  for(let i=0;i<8;i++) particles.push({x:(current.x+current.shape[0].length/2)*CS,y:current.y*CS,vx:(Math.random()-0.5)*5,vy:Math.random()*-5,life:30,color:current.color});
  lock();
}

function doHold(){
  if(holdUsed)return;
  holdUsed=true;
  if(!hold){hold=current;current=next;next=randPiece();}
  else{const t=hold;hold=current;current=t;}
  current.x=Math.floor(COLS/2)-Math.floor(current.shape[0].length/2);
  current.y=0;
}

function ghostY(){
  let y=current.y;
  while(valid(current.shape,current.x,y+1))y++;
  return y;
}

function drawBlock(ctx2,x,y,color,size=CS,border=true){
  const g=ctx2.createLinearGradient(x,y,x+size,y+size);
  g.addColorStop(0,lighten(color,40));g.addColorStop(1,color);
  ctx2.fillStyle=g;ctx2.beginPath();ctx2.roundRect(x+1,y+1,size-2,size-2,3);ctx2.fill();
  if(border){
    ctx2.strokeStyle='rgba(255,255,255,0.3)';ctx2.lineWidth=1;
    ctx2.beginPath();ctx2.roundRect(x+1,y+1,size-2,size-2,3);ctx2.stroke();
    ctx2.fillStyle='rgba(255,255,255,0.25)';
    ctx2.fillRect(x+3,y+3,size-10,4);
  }
}

function lighten(hex,pct){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const f=pct/100;
  return '#'+[r,g,b].map(v=>Math.min(255,Math.round(v+(255-v)*f)).toString(16).padStart(2,'0')).join('');
}

function drawMini(c,px,py,ctx2,size=16){
  if(!px||!c)return;
  ctx2.clearRect(0,0,80,80);
  const offX=(80-c.shape[0].length*size)/2,offY=(80-c.shape.length*size)/2;
  c.shape.forEach((row,r)=>row.forEach((v,col)=>{
    if(v) drawBlock(ctx2,offX+col*size,offY+r*size,c.color,size,true);
  }));
}

function loop(){
  if(!running)return;
  frame++;
  const speed=Math.max(10,50-level*4);

  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0a1a');bg.addColorStop(1,'#111128');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CS);ctx.lineTo(W,r*CS);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CS,0);ctx.lineTo(c*CS,H);ctx.stroke();}

  // Board
  board.forEach((row,r)=>row.forEach((col,c)=>{
    if(col) drawBlock(ctx,c*CS,r*CS,col);
  }));

  // Ghost
  const gy=ghostY();
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{
    if(v&&gy+r>=0){
      ctx.strokeStyle=current.color;ctx.globalAlpha=0.25;ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(current.x*CS+c*CS+2,gy*CS+r*CS+2,CS-4,CS-4,3);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }));

  // Current
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{
    if(v&&current.y+r>=0) drawBlock(ctx,(current.x+c)*CS,(current.y+r)*CS,current.color);
  }));

  // Auto drop
  dropTimer++;
  if(dropTimer>=speed){drop();}

  // Particles
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  particles.forEach(pt=>{ctx.save();ctx.globalAlpha=pt.life/60;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,4,0,Math.PI*2);ctx.fill();ctx.restore();});

  // Mini previews
  drawMini(next,1,1,nextCtx,18);
  drawMini(hold,1,1,holdCtx,18);

  document.getElementById('score-display').textContent=score;
  document.getElementById('s-lines').textContent=lines;
  document.getElementById('s-level').textContent=level;

  af=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('result-overlay').classList.remove('show');
  board=makeBoard();particles=[];frame=0;dropTimer=0;score=0;lines=0;level=1;holdUsed=false;hold=null;
  current=randPiece();next=randPiece();
  running=true;cancelAnimationFrame(af);loop();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!running)return;
  const actions={'ArrowLeft':()=>{if(valid(current.shape,current.x-1,current.y))current.x--;}
    ,'ArrowRight':()=>{if(valid(current.shape,current.x+1,current.y))current.x++;}
    ,'ArrowDown':()=>drop()
    ,'ArrowUp':()=>{const r=rotate(current.shape);if(valid(r,current.x,current.y))current.shape=r;}
    ,'z':()=>{const r=rotate(rotate(rotate(current.shape)));if(valid(r,current.x,current.y))current.shape=r;}
    ,' ':()=>hardDrop()
    ,'c':()=>doHold(),'C':()=>doHold()
  };
  if(actions[e.key]){actions[e.key]();e.preventDefault();}
});

// Mobile buttons
[['btn-left',()=>{if(valid(current.shape,current.x-1,current.y))current.x--;}],
 ['btn-right',()=>{if(valid(current.shape,current.x+1,current.y))current.x++;}],
 ['btn-down',()=>drop()],
 ['btn-rot',()=>{const r=rotate(current.shape);if(valid(r,current.x,current.y))current.shape=r;}],
 ['btn-drop',()=>hardDrop()],
 ['btn-hold',()=>doHold()]].forEach(([id,fn])=>{
  const btn=document.getElementById(id);if(!btn)return;
  btn.addEventListener('touchstart',e=>{e.preventDefault();if(running)fn();},{passive:false});
  btn.addEventListener('click',()=>{if(running)fn();});
});

// Preview
const bg=ctx.createLinearGradient(0,0,0,H);
bg.addColorStop(0,'#0a0a1a');bg.addColorStop(1,'#111128');
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#E74C3C';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
ctx.shadowBlur=15;ctx.shadowColor='#E74C3C';ctx.fillText('🧱 테트리스',W/2,H/2-20);
ctx.shadowBlur=0;ctx.fillStyle='#aaa';ctx.font='13px sans-serif';
ctx.fillText('방향키 이동/회전',W/2,H/2+15);
ctx.fillText('SPACE: 하드드롭 | C: 홀드',W/2,H/2+38);
</script>
{% endblock %}
