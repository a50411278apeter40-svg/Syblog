{% extends 'blog/base.html' %}
{% block head_title %}{{ mail.subject }} - SyBlog{% endblock %}
{% block main_area %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <a href="/mail/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left"></i> 돌아가기</a>
  <div>
    <a href="/mail/compose/{{ mail.sender.username }}/" class="btn btn-primary btn-sm"><i class="fas fa-reply"></i> 답장</a>
    <a href="/mail/delete/{{ mail.pk }}/" class="btn btn-danger btn-sm" onclick="return confirm('삭제?')"><i class="fas fa-trash"></i></a>
  </div>
</div>
<div class="card">
  <div class="card-header">
    <h5 class="mb-0">{{ mail.subject }}</h5>
    <small class="text-muted">발신: <strong>{{ mail.sender.username }}</strong> → 수신: <strong>{{ mail.recipient.username }}</strong> · {{ mail.sent_at|date:"Y.m.d H:i" }}</small>
  </div>
  <div class="card-body" style="white-space:pre-wrap;min-height:200px;">{{ mail.body }}</div>
</div>
{% endblock %}
