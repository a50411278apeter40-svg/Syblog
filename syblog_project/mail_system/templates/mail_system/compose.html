{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block head_title %}메일 작성 - SyBlog{% endblock %}
{% block main_area %}
<div class="card">
  <div class="card-header"><i class="fas fa-pen"></i> 메일 작성</div>
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> 보내기</button>
      <a href="/mail/" class="btn btn-secondary">취소</a>
    </form>
  </div>
</div>
{% endblock %}
