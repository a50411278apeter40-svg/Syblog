<script>
// ════════════════════════════════════════════════
// 전역 변수
// ════════════════════════════════════════════════
const PROJECT_ID = {{ project.pk }};
const CSRF = '{{ csrf_token }}';
let activeFile = null;
let toolLogCount = 0;
let isSending = false;
let bgCancelFlag = false;
let bgTaskActive = false;
let bgTaskId = null;        // 서버 task ID
let autosaveTimer = null;
let lastSavedContent = '';

// ════════════════════════════════════════════════
// 모바일 감지
// ════════════════════════════════════════════════
const isMobile = () => window.innerWidth <= 768;

// ════════════════════════════════════════════════
// 탭 전환 (오른쪽 패널)
// ════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => {
    el.style.display = 'none';
    el.style.flexDirection = '';
  });
  document.querySelectorAll('.right-tab').forEach(el => el.classList.remove('active'));
  const pane = document.getElementById(tab + '-pane');
  if (pane) {
    pane.style.display = 'flex';
    pane.style.flexDirection = 'column';
    pane.style.flex = '1';
    pane.style.minHeight = '0';
    pane.style.overflow = 'hidden';
  }
  const btn = document.querySelector(`.right-tab[onclick*="'${tab}'"]`) ||
              document.querySelector(`.right-tab[onclick*='"${tab}"']`);
  if (btn) btn.classList.add('active');
  if (tab === 'preview') refreshPreview();
}
function switchTabDirect(tab) { switchTab(tab); }

// ════════════════════════════════════════════════
// 모바일 탭 전환
// ════════════════════════════════════════════════
function setMobileTabActive(id) {
  document.querySelectorAll('#mobile-tab-bar button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');
}

function mobileTabFiles() {
  setMobileTabActive('mtab-files');
  openMobileSidebar();
}

function mobileTabEditor() {
  setMobileTabActive('mtab-editor');
  closeMobileSidebar();
  if (isMobile()) {
    document.getElementById('editor-pane').classList.add('mobile-active');
    document.getElementById('right-panel').classList.remove('mobile-active');
  }
}

function mobileTabChat() {
  setMobileTabActive('mtab-chat');
  closeMobileSidebar();
  if (isMobile()) {
    document.getElementById('editor-pane').classList.remove('mobile-active');
    document.getElementById('right-panel').classList.add('mobile-active');
    switchTab('chat');
  }
}

function mobileTabPreview() {
  setMobileTabActive('mtab-preview');
  closeMobileSidebar();
  if (isMobile()) {
    document.getElementById('editor-pane').classList.remove('mobile-active');
    document.getElementById('right-panel').classList.add('mobile-active');
    switchTab('preview');
  }
}

function mobileTabMore() {
  setMobileTabActive('mtab-more');
  closeMobileSidebar();
  if (isMobile()) {
    document.getElementById('editor-pane').classList.remove('mobile-active');
    document.getElementById('right-panel').classList.add('mobile-active');
    switchTab('tool');
  }
}

function openMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const closeBtn = document.getElementById('sidebar-close-btn');
  if (sidebar) sidebar.classList.add('open');
  if (overlay) overlay.classList.add('visible');
  if (closeBtn) closeBtn.style.display = 'inline';
}

function closeMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const closeBtn = document.getElementById('sidebar-close-btn');
  if (sidebar) sidebar.classList.remove('open');
  if (overlay) overlay.classList.remove('visible');
  if (closeBtn) closeBtn.style.display = 'none';
}

window.addEventListener('resize', () => {
  if (!isMobile()) {
    closeMobileSidebar();
    document.getElementById('editor-pane').classList.add('mobile-active');
    document.getElementById('right-panel').classList.add('mobile-active');
  }
}, { passive: true });

// ════════════════════════════════════════════════
// 진행 상태 (배너 없이 채팅창에만 표시)
// ════════════════════════════════════════════════
let _statusBubble = null;

function showBgProgress(text) {
  bgTaskActive = true;
  bgCancelFlag = false;
  _updateStatusBubble(text);
}

function updateBgProgress(text) {
  if (!bgTaskActive) return;
  _updateStatusBubble(text);
  if (bgTaskId) {
    clearTimeout(updateBgProgress._t);
    updateBgProgress._t = setTimeout(() => {
      fetch('/blog/ai-webdev/' + PROJECT_ID + '/task/upsert/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
        body: JSON.stringify({action: 'update', task_id: bgTaskId, label: text})
      }).catch(() => {});
    }, 800);
  }
}

function _updateStatusBubble(text) {
  if (_statusBubble) {
    _statusBubble.innerHTML = '<span style="color:#8b949e;font-size:.82rem;">⏳ ' + escHtml(text) + '</span>';
    document.getElementById('chat-messages').scrollTop = 9999;
  }
}

function hideBgProgress() {
  bgTaskActive = false;
}

function cancelBgTask() {
  bgCancelFlag = true;
  hideBgProgress();
  if (bgTaskId) {
    fetch('/blog/ai-webdev/' + PROJECT_ID + '/task/upsert/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
      body: JSON.stringify({action: 'cancel', task_id: bgTaskId})
    }).catch(() => {});
    bgTaskId = null;
  }
  showToast('⚠️ 작업을 중단했습니다.', 'warn');
}

// ════════════════════════════════════════════════
// 자동저장 로직
// ════════════════════════════════════════════════
function setAutosaveStatus(status) {
  const dot = document.getElementById('autosave-dot2');
  const text = document.getElementById('autosave-text2');
  if (!dot || !text) return;
  if (status === 'saved') {
    dot.style.background = '#4ade80';
    dot.style.animation = '';
    text.textContent = '저장됨';
  } else if (status === 'saving') {
    dot.style.background = '#fbbf24';
    dot.style.animation = 'blink 0.6s infinite';
    text.textContent = '저장중...';
  } else if (status === 'error') {
    dot.style.background = '#f87171';
    dot.style.animation = '';
    text.textContent = '저장오류';
  } else if (status === 'modified') {
    dot.style.background = '#fbbf24';
    dot.style.animation = '';
    text.textContent = '수정됨*';
  }
}

async function doAutosave() {
  if (!activeFile) return;
  const content = document.getElementById('code-editor').value;
  if (content === lastSavedContent) return;
  setAutosaveStatus('saving');
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/file/write/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ path: activeFile, content })
    });
    const d = await r.json();
    if (d.ok) { lastSavedContent = content; setAutosaveStatus('saved'); }
    else setAutosaveStatus('error');
  } catch (e) { setAutosaveStatus('error'); }
}

// ════════════════════════════════════════════════
// 파일 트리
// ════════════════════════════════════════════════
async function refreshFiles() {
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/files/`);
    const d = await r.json();
    renderTree(d.files || [], document.getElementById('file-tree'), 0);
  } catch(e) {}
}

function renderTree(files, container, depth) {
  container.innerHTML = '';
  if (!files || !files.length) {
    container.innerHTML = '<div style="padding:12px;color:#6c7086;font-size:.75rem;">파일 없음</div>';
    return;
  }
  files.forEach(f => {
    const div = document.createElement('div');
    div.className = 'tree-item ' + (f.type === 'dir' ? 'is-dir' : 'is-file');
    div.style.paddingLeft = (10 + depth * 14) + 'px';
    div.style.display = 'flex';
    div.style.alignItems = 'center';
    const icon = f.type === 'dir' ? '📁' : getFileIcon(f.name);
    const nameSpan = document.createElement('span');
    nameSpan.style.flex = '1';
    nameSpan.style.overflow = 'hidden';
    nameSpan.style.textOverflow = 'ellipsis';
    nameSpan.style.whiteSpace = 'nowrap';
    nameSpan.innerHTML = `${icon} ${escHtml(f.name)}`;

    if (f.type === 'file') {
      nameSpan.style.cursor = 'pointer';
      nameSpan.onclick = (e) => {
        e.stopPropagation();
        loadFile(f.path, f.name);
        if (isMobile()) closeMobileSidebar();
      };
      // 개별 다운로드 버튼
      const dlBtn = document.createElement('a');
      dlBtn.href = `/blog/ai-webdev/${PROJECT_ID}/file/download/?path=${encodeURIComponent(f.path)}`;
      dlBtn.download = f.name;
      dlBtn.title = '다운로드';
      dlBtn.style.cssText = 'color:#58a6ff;font-size:.72rem;padding:2px 5px;opacity:0;transition:opacity .15s;flex:0 0 auto;text-decoration:none;';
      dlBtn.textContent = '⬇';
      dlBtn.onclick = e => e.stopPropagation();
      div.addEventListener('mouseenter', () => dlBtn.style.opacity = '1');
      div.addEventListener('mouseleave', () => dlBtn.style.opacity = '0');
      div.appendChild(nameSpan);
      div.appendChild(dlBtn);
    } else if (f.children && f.children.length) {
      let open = false;
      const sub = document.createElement('div');
      div.style.cursor = 'pointer';
      nameSpan.onclick = () => {
        open = !open;
        sub.style.display = open ? 'block' : 'none';
        nameSpan.querySelector('span.folder-arrow') &&
          (nameSpan.querySelector('span.folder-arrow').textContent = open ? '▼ ' : '▶ ');
      };
      div.onclick = nameSpan.onclick;
      renderTree(f.children, sub, depth + 1);
      sub.style.display = 'none';
      div.appendChild(nameSpan);
      container.appendChild(div);
      container.appendChild(sub);
      return;
    } else {
      div.appendChild(nameSpan);
    }
    container.appendChild(div);
  });
}

function getFileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const map = {
    html:'🌐', htm:'🌐', css:'🎨', js:'📜', jsx:'⚛️', ts:'📘', tsx:'⚛️',
    py:'🐍', json:'📋', md:'📝', txt:'📄',
    png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', webp:'🖼️', svg:'🖼️',
    ico:'🖼️', bmp:'🖼️', avif:'🖼️', tiff:'🖼️',
    mp3:'🎵', wav:'🎵', ogg:'🎵', flac:'🎵', aac:'🎵', m4a:'🎵',
    mp4:'🎬', webm:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬',
    pdf:'📕', ttf:'🔤', otf:'🔤', woff:'🔤', woff2:'🔤',
    sh:'⚡', yml:'⚙️', yaml:'⚙️', xml:'📋', csv:'📊',
    zip:'🗜️', gz:'🗜️', tar:'🗜️', env:'🔐', sql:'🗄️',
    vue:'💚', rb:'💎', go:'🐹', rs:'🦀', php:'🐘'
  };
  return map[ext] || '📄';
}

// 파일 확장자 → 미디어 타입 분류
function getFileMediaType(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const IMAGE = ['png','jpg','jpeg','gif','bmp','webp','svg','ico','tiff','avif'];
  const AUDIO = ['mp3','wav','ogg','flac','aac','m4a','opus','weba'];
  const VIDEO = ['mp4','webm','ogv','avi','mov','mkv','m4v'];
  const PDF   = ['pdf'];
  const FONT  = ['ttf','otf','woff','woff2','eot'];
  const TEXT  = ['html','htm','css','js','jsx','ts','tsx','py','json','md',
                 'txt','sh','yml','yaml','xml','csv','env','toml','ini',
                 'gitignore','dockerignore','php','rb','go','rs','java',
                 'c','cpp','h','sql','vue','svelte','lock','cfg','conf'];
  if (IMAGE.includes(ext)) return 'image';
  if (AUDIO.includes(ext)) return 'audio';
  if (VIDEO.includes(ext)) return 'video';
  if (PDF.includes(ext))   return 'pdf';
  if (FONT.includes(ext))  return 'font';
  if (TEXT.includes(ext))  return 'text';
  return 'binary';
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(2) + ' MB';
}

function showBinaryPreview(path, name, mediaType) {
  const editor   = document.getElementById('code-editor');
  const preview  = document.getElementById('binary-preview');
  const dlUrl    = `/blog/ai-webdev/${PROJECT_ID}/file/download/?path=${encodeURIComponent(path)}`;
  const mediaUrl = dlUrl; // 다운로드 URL을 src로도 활용

  // 모두 숨기기
  editor.style.display  = 'none';
  preview.style.display = 'flex';
  ['image','audio','video','pdf','font','binary'].forEach(t =>
    document.getElementById(`preview-${t}-wrap`).style.display = 'none');

  const showWrap = (id) => {
    document.getElementById(id).style.display = 'flex';
  };

  if (mediaType === 'image') {
    showWrap('preview-image-wrap');
    const img = document.getElementById('preview-image');
    img.src = mediaUrl;
    img.onload = () => {
      document.getElementById('preview-image-info').textContent =
        `${img.naturalWidth} × ${img.naturalHeight}px  ·  ${name}`;
    };
    img.onerror = () => {
      document.getElementById('preview-image-info').textContent = '이미지를 불러올 수 없습니다.';
    };
  } else if (mediaType === 'audio') {
    showWrap('preview-audio-wrap');
    document.getElementById('preview-audio').src = mediaUrl;
    document.getElementById('preview-audio-info').textContent = name;
  } else if (mediaType === 'video') {
    showWrap('preview-video-wrap');
    document.getElementById('preview-video').src = mediaUrl;
    document.getElementById('preview-video-info').textContent = name;
  } else if (mediaType === 'pdf') {
    showWrap('preview-pdf-wrap');
    document.getElementById('preview-pdf').src = mediaUrl;
    document.getElementById('preview-pdf-info').textContent = name;
  } else if (mediaType === 'font') {
    showWrap('preview-font-wrap');
    // 동적으로 @font-face 적용
    const styleId = 'preview-font-style';
    let st = document.getElementById(styleId);
    if (!st) { st = document.createElement('style'); st.id = styleId; document.head.appendChild(st); }
    st.textContent = `@font-face { font-family: PreviewFont; src: url('${mediaUrl}'); }`;
    const sample = document.getElementById('preview-font-sample');
    sample.style.fontFamily = 'PreviewFont, sans-serif';
    document.getElementById('preview-font-info').textContent = name;
  } else {
    showWrap('preview-binary-wrap');
    document.getElementById('preview-binary-name').textContent = name;
    document.getElementById('preview-binary-info').textContent = '바이너리 파일 — 텍스트로 표시할 수 없습니다.';
    const dl = document.getElementById('preview-binary-dl');
    dl.href = dlUrl;
    dl.download = name;
  }
}

function hideBinaryPreview() {
  const editor  = document.getElementById('code-editor');
  const preview = document.getElementById('binary-preview');
  editor.style.display  = '';
  preview.style.display = 'none';
  // 미디어 정지 (메모리 해제)
  ['preview-audio','preview-video'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.pause(); el.src = ''; }
  });
}

async function loadFile(path, name) {
  document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
  event && event.target && event.target.classList.add('active');
  activeFile = path;
  document.getElementById('current-path').textContent = path;
  let tab = document.querySelector(`.editor-tab[data-path="${CSS.escape(path)}"]`);
  if (!tab) {
    tab = document.createElement('div');
    tab.className = 'editor-tab';
    tab.dataset.path = path;
    tab.innerHTML = `${getFileIcon(name)} ${escHtml(name)} <span class="tab-close" onclick="closeTab(this,'${escHtml(path)}')">×</span>`;
    tab.onclick = (e) => { if (!e.target.classList.contains('tab-close')) activateTab(path); };
    const hint = document.getElementById('editor-tabs').querySelector('span:not(.editor-tab)');
    if (hint) hint.remove();
    document.getElementById('editor-tabs').appendChild(tab);
  }
  activateTab(path);

  const mediaType = getFileMediaType(name || path.split('/').pop());

  if (mediaType !== 'text') {
    // 바이너리/미디어 → 미리보기
    hideBinaryPreview(); // 이전 미디어 정리
    showBinaryPreview(path, name || path.split('/').pop(), mediaType);
    if (isMobile()) mobileTabEditor();
    return;
  }

  // 텍스트 파일 → 에디터
  hideBinaryPreview();
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/file/read/?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    document.getElementById('code-editor').value = d.content || '';
    document.getElementById('code-editor').dataset.path = path;
    lastSavedContent = d.content || '';
    setAutosaveStatus('saved');
    updateEditorStats();
    if (isMobile()) mobileTabEditor();
  } catch(e) {
    document.getElementById('code-editor').value = '';
  }
}

function activateTab(path) {
  document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.editor-tab[data-path="${CSS.escape(path)}"]`);
  if (tab) tab.classList.add('active');
  activeFile = path;
  document.getElementById('current-path').textContent = path;
  // 탭 전환 시 미디어 정지
  ['preview-audio','preview-video'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.src) el.pause();
  });
}

function closeTab(closeBtn, path) {
  const tab = closeBtn.closest('.editor-tab');
  if (tab) tab.remove();
  if (activeFile === path) {
    const remaining = document.querySelectorAll('.editor-tab');
    if (remaining.length > 0) {
      const lastPath = remaining[remaining.length-1].dataset.path;
      loadFile(lastPath, lastPath.split('/').pop());
    } else { closeEditor(); }
  }
}

function closeEditor() {
  activeFile = null;
  document.getElementById('code-editor').value = '';
  document.getElementById('editor-tabs').innerHTML =
    '<span style="color:#5a5a7a;font-size:.75rem;padding:0 8px;">파일을 선택하거나 AI에게 요청하세요</span>';
  document.getElementById('current-path').textContent = '편집 중인 파일 없음';
  setAutosaveStatus('saved');
}

function updateEditorStats() {
  const val = document.getElementById('code-editor').value;
  const lines = val.split('\n').length;
  const lang = activeFile ? (activeFile.split('.').pop() || '텍스트').toUpperCase() : '텍스트';
  const langEl = document.getElementById('editor-lang');
  if (langEl) langEl.textContent = lang;
  const lineEl = document.getElementById('editor-lines');
  if (lineEl) lineEl.textContent = lines + '줄';
  const sizeEl = document.getElementById('editor-size');
  if (sizeEl) sizeEl.textContent = val.length > 1024 ? (val.length/1024).toFixed(1)+'KB' : val.length+'B';
}

// 에디터 입력 감지 → 3초 후 자동저장
document.getElementById('code-editor').addEventListener('input', () => {
  setAutosaveStatus('modified');
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(doAutosave, 3000);
  updateEditorStats();
});

async function saveCurrentFile() {
  if (!activeFile) { showToast('⚠️ 파일을 먼저 선택하세요', 'warn'); return; }
  clearTimeout(autosaveTimer);
  setAutosaveStatus('saving');
  const content = document.getElementById('code-editor').value;
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/file/write/`, {
      method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
      body: JSON.stringify({path: activeFile, content})
    });
    const d = await r.json();
    if (d.ok) {
      lastSavedContent = content;
      setAutosaveStatus('saved');
      showToast('💾 ' + activeFile + ' 저장됨', 'success');
      const pp = document.getElementById('preview-pane');
      if (pp && pp.style.display !== 'none') refreshPreview();
    } else { setAutosaveStatus('error'); }
  } catch(e) { setAutosaveStatus('error'); }
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrentFile(); }
});

function newFile() {
  const path = prompt('새 파일 경로 (예: src/App.jsx, index.html):');
  if (!path) return;
  activeFile = path;
  document.getElementById('code-editor').value = '';
  lastSavedContent = '';
  document.getElementById('current-path').textContent = path;
  const name = path.split('/').pop();
  let tab = document.querySelector(`.editor-tab[data-path="${CSS.escape(path)}"]`);
  if (!tab) {
    tab = document.createElement('div');
    tab.className = 'editor-tab active';
    tab.dataset.path = path;
    tab.innerHTML = `${getFileIcon(name)} ${escHtml(name)} <span class="tab-close" onclick="closeTab(this,'${escHtml(path)}')">×</span>`;
    tab.onclick = (e) => { if (!e.target.classList.contains('tab-close')) activateTab(path); };
    const hint = document.getElementById('editor-tabs').querySelector('span:not(.editor-tab)');
    if (hint) hint.remove();
    document.getElementById('editor-tabs').appendChild(tab);
  }
  setAutosaveStatus('modified');
  document.getElementById('code-editor').focus();
  if (isMobile()) mobileTabEditor();
}

function newFolder() {
  const name = prompt('폴더 이름:');
  if (!name) return;
  fetch(`/blog/ai-webdev/${PROJECT_ID}/file/write/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({path: name+'/.gitkeep', content:''})
  }).then(() => refreshFiles());
}

async function deleteActiveFile() {
  if (!activeFile) { showToast('⚠️ 파일을 먼저 선택하세요', 'warn'); return; }
  if (!confirm(activeFile + ' 삭제할까요?')) return;
  await fetch(`/blog/ai-webdev/${PROJECT_ID}/tool/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({project_id:PROJECT_ID, tool:'delete_file', args:{path:activeFile}})
  });
  closeEditor();
  refreshFiles();
  showToast('🗑️ 삭제됨', 'success');
}

// ════════════════════════════════════════════════
// 미리보기
// ════════════════════════════════════════════════
function _previewMode() {
  const sel = document.getElementById('preview-mode');
  return sel ? sel.value : 'file';
}

function onPreviewModeChange() {
  const mode = _previewMode();
  const fileCtrl = document.getElementById('preview-file-controls');
  const portCtrl = document.getElementById('preview-port-controls');

/**
 * 도구 카드 생성 (접기/펼치기 + 입출력값)
 * @returns {cardId, updateOutput} - updateOutput(result, isError) 로 출력 업데이트
 */
function addToolCard(toolName, argsObj) {
  const area = document.getElementById('tool-log-area');
  if (!area) return { cardId: null, updateOutput: ()=>{} };
  const id = 'tc-' + (++_cardCounter);
  const argsStr = JSON.stringify(argsObj || {}, null, 2);
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.id = id;
  card.innerHTML = `
    <div class="tool-card-header" onclick="toggleToolCard('${id}')">
      <span style="color:#6e7681;font-size:.75rem;">[${new Date().toLocaleTimeString()}]</span>
      <span class="tool-card-name">🔧 ${escHtml(toolName)}</span>
      <span class="tool-card-status running" id="${id}-status">⏳ 실행 중</span>
      <span class="tool-card-toggle" id="${id}-toggle">▶</span>
    </div>
    <div class="tool-card-body" id="${id}-body">
      <div class="tool-card-section">
        <div class="tool-card-section-title">📥 입력값 (args)</div>
        <div class="tool-card-code">${escHtml(argsStr)}</div>
      </div>
      <div class="tool-card-section" id="${id}-out-section" style="display:none;">
        <div class="tool-card-section-title">📤 출력값 (result)</div>
        <div class="tool-card-code output" id="${id}-out"></div>
      </div>
    </div>`;
  area.appendChild(card);
  area.scrollTop = area.scrollHeight;
  _updateToolTabBadge();

  function updateOutput(result, isError) {
    const statusEl = document.getElementById(id + '-status');
    const outSection = document.getElementById(id + '-out-section');
    const outEl = document.getElementById(id + '-out');
    if (statusEl) {
      statusEl.className = 'tool-card-status ' + (isError ? 'err' : 'ok');
      statusEl.textContent = isError ? '❌ 오류' : '✅ 완료';
    }
    if (outEl && outSection) {
      outSection.style.display = '';
      const resultStr = typeof result === 'string' ? result : JSON.stringify(result, null, 2);
      outEl.textContent = resultStr;
      if (isError) outEl.className = 'tool-card-code error-out';
    }
    area.scrollTop = area.scrollHeight;
  }
  return { cardId: id, updateOutput };
}

function toggleToolCard(id) {
  const body = document.getElementById(id + '-body');
  const toggle = document.getElementById(id + '-toggle');
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (toggle) { toggle.classList.toggle('open', !isOpen); toggle.textContent = isOpen ? '▶' : '▼'; }
}

function expandAllCards() {
  document.querySelectorAll('.tool-card-body').forEach(b => {
    b.classList.add('open');
    const t = b.closest('.tool-card')?.querySelector('.tool-card-toggle');
    if (t) { t.classList.add('open'); t.textContent = '▼'; }
  });
}

function collapseAllCards() {
  document.querySelectorAll('.tool-card-body').forEach(b => {
    b.classList.remove('open');
    const t = b.closest('.tool-card')?.querySelector('.tool-card-toggle');
    if (t) { t.classList.remove('open'); t.textContent = '▶'; }
  });
}

function clearToolLog() {
  const area = document.getElementById('tool-log-area');
  if (area) { area.innerHTML = '<div style="color:#6e7681;font-size:.78rem;padding:8px 0;">로그가 지워졌습니다.</div>'; }
  toolLogCount = 0; _cardCounter = 0;

function downloadZip() {
  const btn = document.getElementById('download-zip-btn');
  const origText = btn ? btn.innerHTML : '';
  if (btn) {
    btn.innerHTML = '⏳ 압축 중...';
    btn.style.pointerEvents = 'none';
    btn.style.opacity = '0.6';
  }
  showToast('📦 ZIP 압축 중... 잠시 후 다운로드됩니다');

  // fetch로 blob 다운로드 (진행상태 감지 가능)
  fetch(`/blog/ai-webdev/${PROJECT_ID}/download-zip/`)
    .then(r => {
      if (!r.ok) throw new Error('ZIP 생성 실패');
      const filename = (r.headers.get('Content-Disposition') || '').match(/filename="(.+?)"/)?.[1] || 'project.zip';
      return r.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('✅ ZIP 다운로드 완료!');
    })
    .catch(e => showToast('❌ ZIP 오류: ' + e.message, 'error'))
    .finally(() => {
      if (btn) {
        btn.innerHTML = origText;
        btn.style.pointerEvents = '';
        btn.style.opacity = '';
      }
    });
}

// ════════════════════════════════════════════════
// 터미널 (세션 유지: cwd 추적 + 히스토리 + pip/python 자동교정)
// ════════════════════════════════════════════════
let termCwd = '.';          // 현재 디렉토리 (세션 유지)
let termHistory = [];       // 입력 히스토리
let termHistoryIdx = -1;    // 히스토리 커서

function termPrompt() {
  const dir = termCwd === '.' ? '~' : termCwd;
  return `<span style="color:#3fb950;">➜</span> <span style="color:#89b4fa;">${escHtml(dir)}</span> <span style="color:#cdd6f4;">$</span> `;
}

function runTerminal() {
  const input = document.getElementById('terminal-cmd');
  const cmd = input.value.trim();
  if (!cmd) return;
  const output = document.getElementById('terminal-output');

  // 히스토리 저장
  if (termHistory[termHistory.length - 1] !== cmd) termHistory.push(cmd);
  if (termHistory.length > 100) termHistory.shift();
  termHistoryIdx = termHistory.length;

  output.innerHTML += termPrompt() + escHtml(cmd) + '\n';
  input.value = '';
  input.disabled = true;

  // clear 명령 처리
  if (cmd === 'clear' || cmd === 'cls') {
    output.innerHTML = '';
    input.disabled = false;
    input.focus();
    return;
  }

  fetch(`/blog/ai-webdev/${PROJECT_ID}/terminal/`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
    body: JSON.stringify({command: cmd, cwd: termCwd})
  }).then(async resp => {
    if (!resp.ok) {
      output.innerHTML += `<span style="color:#f85149;">HTTP 오류: ${resp.status}</span>\n`;
      input.disabled = false; input.focus(); return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const parts = buf.split('\n');
      buf = parts.pop();
      for (const line of parts) {
        if (!line.startsWith('data:')) continue;
        try {
          const evt = JSON.parse(line.slice(5).trim());
          if (evt.line) {
            output.innerHTML += escHtml(evt.line);
          }
          if (evt.error) {
            output.innerHTML += `<span style="color:#f85149;">${escHtml(evt.error)}</span>\n`;
          }
          if (evt.done) {
            const rc = evt.returncode ?? 0;
            const color = rc === 0 ? '#3fb950' : '#f85149';
            output.innerHTML += `<span style="color:${color};">[완료 rc=${rc}]</span>\n`;
            // cd 처리: new_cwd 수신 시 cwd 업데이트
            if (evt.new_cwd !== undefined) termCwd = evt.new_cwd;
            else if (evt.cwd !== undefined) termCwd = evt.cwd;
            refreshFiles();
          }
        } catch(e) {}
      }
    }
    input.disabled = false;
    input.focus();
    output.scrollTop = output.scrollHeight;
  }).catch(e => {
    output.innerHTML += `<span style="color:#f85149;">오류: ${escHtml(e.message)}</span>\n`;
    input.disabled = false; input.focus();
  });
}

document.getElementById('terminal-cmd').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    runTerminal();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (termHistoryIdx > 0) {
      termHistoryIdx--;
      e.target.value = termHistory[termHistoryIdx] || '';
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (termHistoryIdx < termHistory.length - 1) {
      termHistoryIdx++;
      e.target.value = termHistory[termHistoryIdx] || '';
    } else {
      termHistoryIdx = termHistory.length;
      e.target.value = '';
    }
  }
});

let _pollElapsed = 0;

async function pollRunningTask() {
  if (isSending) return;
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/task/status/`);
    const d = await r.json();
    const indicator = document.getElementById('running-task-indicator');

    if (!d.running) {
      // 완료/에러/취소
      if (indicator) indicator.remove();
      _pollElapsed = 0;
      await loadChatHistory();
      return;
    }

    // 경과 시간 업데이트
    _pollElapsed += 2;
    const elapsed = _pollElapsed < 60
      ? `${_pollElapsed}초 경과`
      : `${Math.floor(_pollElapsed/60)}분 ${_pollElapsed%60}초 경과`;

    if (indicator) {
      indicator.querySelector('.bubble').innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:1.2rem;animation:spin 1s linear infinite;display:inline-block;">⚙️</span>
          <div>
            <div style="color:#f0c000;font-weight:600;">⏳ ${escHtml(d.label || '명령 실행 중...')}</div>
            <div style="font-size:.72rem;color:#484f58;margin-top:3px;">
              ${elapsed} · 새로고침해도 백그라운드에서 계속 실행됩니다
            </div>
          </div>
        </div>`;
    }
    // 2초마다 폴링
    setTimeout(pollRunningTask, 2000);
  } catch(e) {
    setTimeout(pollRunningTask, 5000);
  }
}

// 도구 실행 (클라이언트)
// ════════════════════════════════════════════════
const executedToolHashes = new Set();

async function executeToolCall(toolData) {
  if (bgCancelFlag) return null;
  const toolName = toolData.tool || '?';
  const argsStr = JSON.stringify(toolData.args || {});
  const hash = toolName + argsStr.slice(0, 100);
  if (executedToolHashes.has(hash)) return null;
  executedToolHashes.add(hash);

  const { updateOutput } = addToolCard(toolName, toolData.args || {});
  updateBgProgress(`🔧 ${toolName} 실행 중...`);

  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/tool/`, {
      method:'POST',
      headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
      body: JSON.stringify({project_id:PROJECT_ID, tool:toolData.tool, args:toolData.args||{}})
    });
    const result = await r.json();
    const res = result.result || {};
    if (res.error) {
      updateOutput(res.error, true);
    } else {
      // 출력값: output > stdout > 간단 OK
      const outVal = res.output ?? res.stdout ?? res.content ?? res;
      updateOutput(typeof outVal === 'string' ? outVal : JSON.stringify(outVal, null, 2), false);
    }

    if (['write_file','delete_file','run_command'].includes(toolName)) {
      await refreshFiles();
      if (toolName === 'write_file' && toolData.args && toolData.args.path === activeFile) {
        document.getElementById('code-editor').value = toolData.args.content || '';
        lastSavedContent = toolData.args.content || '';
        setAutosaveStatus('saved');
        updateEditorStats();
      }
    }
    return {tool: toolData.tool, args: toolData.args, result: res};
  } catch(e) {
    updateOutput(e.message, true);
    return null;
  }
}

function extractToolCalls(text) {
  const regex = /<tool_call>([\s\S]*?)<\/tool_call>/g;
  const calls = [];
  let match;
  while((match = regex.exec(text)) !== null) {
    try { calls.push(JSON.parse(match[1].trim())); } catch(e) {}
  }
  return calls;
}

  }).join('');
}

function removePendingFile(idx) {
  if (_pendingFiles[idx] && _pendingFiles[idx].previewUrl) URL.revokeObjectURL(_pendingFiles[idx].previewUrl);
  _pendingFiles.splice(idx, 1);
  renderAttachPreview();
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = {pdf:'📄', zip:'🗜️', tar:'🗜️', gz:'🗜️', mp4:'🎬', mp3:'🎵', wav:'🎵',
                py:'🐍', js:'📜', ts:'📜', html:'🌐', css:'🎨', json:'📋',
                md:'📝', txt:'📝', csv:'📊', xlsx:'📊', xls:'📊', docx:'📝'};
  return map[ext] || '📎';
}

document.addEventListener('DOMContentLoaded', () => {
  const chatArea = document.getElementById('chat-input-area');

      e.preventDefault();
      chatArea.style.outline = '';
      for (const f of e.dataTransfer.files) {
        const isImg = f.type.startsWith('image/');
        const previewUrl = isImg ? URL.createObjectURL(f) : null;
        _pendingFiles.push({ file: f, name: f.name, isImage: isImg, previewUrl });
      }
      renderAttachPreview();

});

async function sendChat() {
  if (isSending) return;
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg && _pendingFiles.length === 0) return;

  // 첨부 파일 스냅샷 (전송 중 변경 방지)
  const filesToSend = [..._pendingFiles];
  _pendingFiles = [];
  renderAttachPreview();

  isSending = true;
  bgCancelFlag = false;
  bgTaskId = null;
  input.value = '';
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '⏳';
  const stopBtn = document.getElementById('stop-btn');
  if (stopBtn) stopBtn.style.display = 'inline-block';

  // 사용자 메시지 버블 (파일 첨부 미리보기 포함)
  appendUserMsg(msg, filesToSend);

  // 서버에 task 시작 등록 (새로고침 후 복원용)
  fetch(`/blog/ai-webdev/${PROJECT_ID}/task/upsert/`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
    body: JSON.stringify({action: 'start', label: 'AI 응답 생성 중...'})
  }).then(r => r.json()).then(d => { if (d.task_id) bgTaskId = d.task_id; }).catch(() => {});

  // 상태 버블 생성 (채팅창 내)
  const statusDiv = document.createElement('div');
  statusDiv.className = 'msg-ai';
  statusDiv.id = 'chat-status-bubble';
  statusDiv.innerHTML = '<div class="bubble" style="background:#1c2128;border:1px solid #30363d;"><span style="color:#8b949e;font-size:.82rem;">⏳ AI가 응답 준비 중...</span></div>';
  document.getElementById('chat-messages').appendChild(statusDiv);
  document.getElementById('chat-messages').scrollTop = 9999;
  _statusBubble = statusDiv.querySelector('.bubble');

  showBgProgress('AI가 응답 생성 중...');

  let toolResultsToSend = [];
  let currentMsg = msg;
  let continueLoop = true;
  let loopCount = 0;
  let firstLoop = true;
  // 무한 루프 (사용자가 정지 버튼 누를 때까지)

  while (continueLoop && !bgCancelFlag) {
    loopCount++;
    continueLoop = false;

    const bubble = createAiBubble();
    let fullText = '';
    let streaming = false;

    try {
      // 상태 버블은 유지 (단계 표시 없음)

      // ★ 첫 루프이고 파일이 있으면 multipart/form-data, 아니면 JSON
      let resp;
      if (firstLoop && filesToSend.length > 0) {
        firstLoop = false;
        const fd = new FormData();
        fd.append('project_id', PROJECT_ID);
        fd.append('message', currentMsg || '');
        fd.append('tool_results', JSON.stringify(toolResultsToSend));
        for (const f of filesToSend) fd.append('files', f.file, f.name);
        resp = await fetch(`/blog/ai-webdev/${PROJECT_ID}/chat/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': CSRF },
          body: fd,
        });
      } else {
        firstLoop = false;
        resp = await fetch(`/blog/ai-webdev/${PROJECT_ID}/chat/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
          body: JSON.stringify({
            project_id: PROJECT_ID,
            message: currentMsg,
            tool_results: toolResultsToSend,
          })
        });
      }

      // 402: 크레딧 부족
      if (resp.status === 402) {
        const d = await resp.json().catch(() => ({error: '크레딧 부족'}));
        bubble.innerHTML = `<span style="color:#ef4444;">❌ ${escHtml(d.error || '크레딧 부족')}</span><br>
          <a href="/blog/ai/credit/shop/" style="color:#6c63ff;">💳 크레딧 구매 →</a>`;
        updateCreditBadge();
        break;
      }

      // 기타 서버 오류
      if (!resp.ok) {
        let errMsg = `서버 오류 (HTTP ${resp.status})`;
        try {
          const errData = await resp.json();
          errMsg = errData.error || errMsg;
        } catch(e) {}
        bubble.innerHTML = `<span style="color:#ef4444;">❌ ${escHtml(errMsg)}</span>`;
        addToolLog(`❌ ${errMsg} → 계속 진행`, 'error');
        // 에러여도 계속 진행 (정지 버튼으로만 멈춤)
        continueLoop = false;
        break;  // 이 루프만 종료, 다음 사용자 입력 대기
      }

      // 스트리밍 읽기
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        if (bgCancelFlag) { reader.cancel(); break; }
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // 마지막 불완전한 줄은 버퍼 유지

        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          try {
            const evt = JSON.parse(line.slice(5).trim());
            if (evt.token) {
              if (!streaming) { bubble.innerHTML = ''; streaming = true; }
              fullText += evt.token;
              bubble.innerHTML = formatAiText(fullText) + '<span style="opacity:.5;">▋</span>';
              document.getElementById('chat-messages').scrollTop = 9999;
            }
            if (evt.done) {
              updateCreditBadge();
            }
            if (evt.error) {
              bubble.innerHTML = `<span style="color:#ef4444;">❌ ${escHtml(evt.error)}</span>`;
              addToolLog(`❌ AI 오류: ${evt.error}`, 'error');
            }
          } catch (e) {}
        }
      }

      // 스트리밍 완료 후 최종 텍스트 정리
      if (fullText) {
        bubble.innerHTML = formatAiText(fullText);
      }
      document.getElementById('chat-messages').scrollTop = 9999;

      // 도구 호출 감지 및 실행
      if (fullText && !bgCancelFlag) {
        const toolCalls = extractToolCalls(fullText);
        if (toolCalls.length > 0) {
          addToolLog(`🔍 도구 ${toolCalls.length}개 감지 → 실행 중...`, 'info');
          updateBgProgress(`🔧 도구 ${toolCalls.length}개 실행 중...`, 60);
          toolResultsToSend = [];
          for (const tc of toolCalls) {
            if (bgCancelFlag) break;
            const result = await executeToolCall(tc);
            if (result) toolResultsToSend.push(result);
          }
          if (toolResultsToSend.length > 0 && !bgCancelFlag) {
            currentMsg = '도구 실행이 완료됐습니다. 결과를 확인하고 다음 작업을 이어서 진행해주세요.';
            continueLoop = true;
            addToolLog(`♻️ 도구 결과 전달 중 (루프 ${loopCount})...`, 'info');
          }
        }
      }

    } catch (e) {
      bubble.innerHTML = `<span style="color:#ef4444;">연결 오류: ${escHtml(e.message)}</span>`;
      addToolLog(`❌ 오류: ${e.message} → 계속 대기`, 'error');
      if (bgTaskId) {
        fetch(`/blog/ai-webdev/${PROJECT_ID}/task/upsert/`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
          body: JSON.stringify({action: 'error', task_id: bgTaskId, error_msg: e.message})
        }).catch(() => {});
        bgTaskId = null;
      }
      // 연결 오류여도 멈추지 않고 다음 입력 대기
      continueLoop = false;
    }
  }

  // 루프 종료 (정지 버튼 또는 작업 완료)
  executedToolHashes.clear();

  // 상태 버블 제거
  const sb = document.getElementById('chat-status-bubble');
  if (sb) sb.remove();
  _statusBubble = null;

  // 서버 task 완료 처리
  if (bgTaskId) {
    fetch(`/blog/ai-webdev/${PROJECT_ID}/task/upsert/`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
      body: JSON.stringify({action: 'done', task_id: bgTaskId, label: '작업 완료'})
    }).catch(() => {});
    bgTaskId = null;
  }

  isSending = false;
  btn.disabled = false;
  btn.textContent = '▶ 전송';
  if (stopBtn) stopBtn.style.display = 'none';
  hideBgProgress();
  await refreshFiles();
}

// 텍스트 포맷
// ════════════════════════════════════════════════
function formatAiText(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) =>
    `<pre><code>${escHtml(code.trim())}</code></pre>`);
  text = text.replace(/<tool_call>([\s\S]*?)<\/tool_call>/g, (m, json) =>
    `<div class="tool-call-badge">🔧 ${escHtml(json.slice(0,70))}${json.length>70?'...':''}</div>`);
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function startDeploy() {
  const log = document.getElementById('deploy-log');
  log.textContent = '배포 준비 중...\n';
  switchTabDirect('deploy');
  showBgProgress('🚀 배포 중...', 10);

  const resp = await fetch(`/blog/ai-webdev/${PROJECT_ID}/deploy/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({project_id: PROJECT_ID})
  });

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();

  while(true) {
    const {done, value} = await reader.read();
    if(done) break;
    const lines = decoder.decode(value).split('\n');
    for(const line of lines) {
      if(!line.startsWith('data:')) continue;
      try {
        const evt = JSON.parse(line.slice(5).trim());
        if(evt.log) { log.textContent += evt.log + '\n'; log.scrollTop = log.scrollHeight; }
        if(evt.url) {
          const box = document.getElementById('deploy-url-box') || document.querySelector('.deploy-url-box');
          if(box) {
            box.style.display = 'block';
            box.innerHTML = `<p style="font-weight:700;color:#059669;margin:0;">🎉 배포 완료!</p>
              <a href="${escHtml(evt.url)}" target="_blank" style="color:#6c63ff;word-break:break-all;">${escHtml(evt.url)}</a>`;
          }
          showToast('🎉 배포 완료!', 'success');
        }
        if(evt.error) log.textContent += '❌ ' + evt.error + '\n';
        if(evt.progress) updateBgProgress('배포 중...', evt.progress);
      } catch(e){}
    }
  }
  hideBgProgress();
}

// ════════════════════════════════════════════════
// 토스트 알림 (전역 사용 가능)
// ════════════════════════════════════════════════
function showToast(msg, type) {
  // base.html의 showToast 함수가 있으면 그것 사용
  if (window.showToast && window.showToast !== showToast) {
    window.showToast(msg, type);
    return;
  }
  const container = document.getElementById('toast-container') || document.body;
  const t = document.createElement('div');
  const bg = type === 'error' ? '#ef4444' : type === 'warn' ? '#f59e0b' : type === 'success' ? '#10b981' : '#1e1e2e';
  t.style.cssText = `
    position:fixed; bottom:20px; right:20px; z-index:9999;
    background:${bg}; color:#fff; padding:10px 18px;
    border-radius:10px; font-size:.85rem;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
    max-width:300px; word-break:break-word;
  `;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(), 300); }, 2500);
}

// 리사이저 (데스크탑)
// ════════════════════════════════════════════════
function initResizer(resizerId, leftEl, rightEl) {
  const resizer = document.getElementById(resizerId);
  if (!resizer) return;
  let isResizing = false, startX, startLeftW, startRightW;
  resizer.addEventListener('mousedown', e => {
    if (isMobile()) return;
    isResizing = true; startX = e.clientX;
    startLeftW = leftEl.offsetWidth; startRightW = rightEl.offsetWidth;
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!isResizing) return;
    const dx = e.clientX - startX;
    const newLeft = startLeftW + dx;
    const newRight = startRightW - dx;
    if (newLeft > 100 && newRight > 200) {
      leftEl.style.width = newLeft + 'px'; leftEl.style.flex = 'none';
      rightEl.style.width = newRight + 'px'; rightEl.style.flex = 'none';
    }
  });
  document.addEventListener('mouseup', () => { isResizing = false; document.body.style.userSelect = ''; });
}

document.addEventListener('DOMContentLoaded', async () => {
  document.body.classList.add('webbuilder-page');
  document.documentElement.classList.add('webbuilder-html');

  // webbuilder-root 높이를 뷰포트에 꽉 차게 동적 계산
  function fitWebbuilderRoot() {
    const root = document.getElementById('webbuilder-root');
    if (!root) return;
    const vv = window.visualViewport;
    const vh = vv ? vv.height : window.innerHeight;
    // html/body가 position:fixed이므로 스크롤 없음 → getBoundingClientRect().top 정확
    const top = root.getBoundingClientRect().top;
    const tabBar = document.getElementById('mobile-tab-bar');
    const tabBarH = (tabBar && getComputedStyle(tabBar).display !== 'none')
                    ? tabBar.offsetHeight : 0;
    const h = Math.max(200, vh - Math.max(0, top) - tabBarH);
    root.style.height = h + 'px';
    root.style.maxHeight = h + 'px';
  }
  fitWebbuilderRoot();
  window.addEventListener('resize', fitWebbuilderRoot);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitWebbuilderRoot);
    window.visualViewport.addEventListener('scroll', fitWebbuilderRoot);
  }
  // 공지 dismiss 시에도 재계산
  document.addEventListener('click', e => {
    if (e.target.closest('[onclick*="dismissNotice"]')) {
      setTimeout(fitWebbuilderRoot, 350);
    }
  });

  // 리사이저 초기화
  initResizer('resizer-left', document.getElementById('sidebar'), document.getElementById('editor-pane'));
  initResizer('resizer-right', document.getElementById('editor-pane'), document.getElementById('right-panel'));

  // 대화 이력 + 파일 트리 로딩
  await loadChatHistory();
  await refreshFiles();
  updateCreditBadge();

  // 모바일 초기 상태: AI 채팅 패널 표시
  if (isMobile()) {
    document.getElementById('right-panel').classList.add('mobile-active');
    document.getElementById('editor-pane').classList.remove('mobile-active');
    setMobileTabActive('mtab-chat');
    switchTab('chat');
  }

  // ── 모바일 키보드 올라올 때 입력창 가림 방지 ──
  const chatInput = document.getElementById('chat-input');
  const chatPane  = document.getElementById('chat-pane');

  function adjustForKeyboard() {
    if (!isMobile()) return;
    // visual viewport 지원 브라우저 (iOS 13+)
    const vvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const winH = window.innerHeight;
    const kbHeight = Math.max(0, winH - vvh);
    const tabBarH = 54;
    // chat-pane 높이를 키보드 위까지 맞춤
    if (kbHeight > 50) {
      chatPane.style.maxHeight = (vvh - tabBarH - 56) + 'px';
      chatPane.style.height    = (vvh - tabBarH - 56) + 'px';
      // 입력창이 보이도록 스크롤
      setTimeout(() => {
        document.getElementById('chat-messages').scrollTop = 9999;
        chatInput.scrollIntoView({block: 'nearest', behavior: 'smooth'});
      }, 100);
    } else {
      chatPane.style.maxHeight = '';
      chatPane.style.height    = '';
    }
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adjustForKeyboard);
    window.visualViewport.addEventListener('scroll', adjustForKeyboard);
  } else {
    window.addEventListener('resize', adjustForKeyboard);
  }

  chatInput.addEventListener('focus', () => {
    if (isMobile()) {
      setTimeout(adjustForKeyboard, 300);
      setTimeout(() => {
        document.getElementById('chat-messages').scrollTop = 9999;
      }, 400);
    }
  });

  chatInput.addEventListener('blur', () => {
    if (isMobile()) {
      setTimeout(() => {
        chatPane.style.maxHeight = '';
        chatPane.style.height    = '';
      }, 200);
    }
  });
});
