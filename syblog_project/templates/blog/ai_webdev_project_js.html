<script>
const PROJECT_ID = {{ project.pk }};
const CSRF = '{{ csrf_token }}';
let activeFile = null;
let toolLogCount = 0;
let isSending = false;

// ══════════════════════════════════════════════
// 탭 전환
// ══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.right-tab').forEach(el => el.classList.remove('active'));
  const pane = document.getElementById(tab + '-pane');
  if (pane) pane.style.display = 'flex';
  const btn = document.querySelector(`.right-tab[onclick*="${tab}"]`);
  if (btn) btn.classList.add('active');
  if (tab === 'preview') refreshPreview();
}
function switchTabDirect(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.right-tab').forEach(el => el.classList.remove('active'));
  const pane = document.getElementById(tab + '-pane');
  if (pane) pane.style.display = 'flex';
  const btn = document.querySelector(`.right-tab[onclick*="${tab}"]`);
  if (btn) btn.classList.add('active');
}

// ══════════════════════════════════════════════
// 파일 트리
// ══════════════════════════════════════════════
async function refreshFiles() {
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/files/`);
    const d = await r.json();
    renderTree(d.files || [], document.getElementById('file-tree'), 0);
  } catch(e) {}
}

function renderTree(files, container, depth) {
  container.innerHTML = '';
  if (!files || !files.length) {
    container.innerHTML = '<div style="padding:12px;color:#6c7086;font-size:.75rem;">파일 없음</div>';
    return;
  }
  files.forEach(f => {
    const div = document.createElement('div');
    div.className = 'tree-item ' + (f.type === 'dir' ? 'is-dir' : 'is-file');
    div.style.paddingLeft = (10 + depth * 14) + 'px';
    const icon = f.type === 'dir' ? '📁' : getFileIcon(f.name);
    div.innerHTML = `${icon} ${escHtml(f.name)}`;
    if (f.type === 'file') {
      div.onclick = () => loadFile(f.path, f.name);
    } else if (f.children && f.children.length) {
      let open = false;
      const sub = document.createElement('div');
      div.onclick = () => {
        open = !open;
        sub.style.display = open ? 'block' : 'none';
        div.querySelector('span') && (div.querySelector('span').textContent = open ? '▼' : '▶');
      };
      renderTree(f.children, sub, depth + 1);
      sub.style.display = 'none';
      container.appendChild(div);
      container.appendChild(sub);
      return;
    }
    container.appendChild(div);
  });
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = { html:'🌐', css:'🎨', js:'📜', jsx:'⚛️', ts:'📘', tsx:'⚛️',
                py:'🐍', json:'📋', md:'📝', txt:'📄', png:'🖼', jpg:'🖼',
                gif:'🖼', svg:'🖼', sh:'⚡', yml:'⚙️', yaml:'⚙️' };
  return map[ext] || '📄';
}

async function loadFile(path, name) {
  document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
  event && event.target && event.target.classList.add('active');
  activeFile = path;
  document.getElementById('current-path').textContent = path;
  // 탭 추가
  let tab = document.querySelector(`.editor-tab[data-path="${path}"]`);
  if (!tab) {
    tab = document.createElement('div');
    tab.className = 'editor-tab';
    tab.dataset.path = path;
    tab.innerHTML = `${escHtml(name)} <span class="tab-close" onclick="closeTab(this,'${escHtml(path)}')">×</span>`;
    tab.onclick = (e) => { if (!e.target.classList.contains('tab-close')) activateTab(path); };
    document.getElementById('editor-tabs').appendChild(tab);
  }
  activateTab(path);
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/file/read/?path=${encodeURIComponent(path)}`);
    const d = await r.json();
    document.getElementById('code-editor').value = d.content || '';
    document.getElementById('code-editor').dataset.path = path;
    updateEditorStats();
  } catch(e) {
    document.getElementById('code-editor').value = '';
  }
}

function activateTab(path) {
  document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.editor-tab[data-path="${path}"]`);
  if (tab) tab.classList.add('active');
  activeFile = path;
  document.getElementById('current-path').textContent = path;
}

function closeTab(closeBtn, path) {
  const tab = closeBtn.closest('.editor-tab');
  if (tab) tab.remove();
  if (activeFile === path) {
    const remaining = document.querySelectorAll('.editor-tab');
    if (remaining.length > 0) {
      const lastPath = remaining[remaining.length-1].dataset.path;
      loadFile(lastPath, lastPath.split('/').pop());
    } else {
      activeFile = null;
      document.getElementById('code-editor').value = '';
      document.getElementById('current-path').textContent = '파일을 선택하세요';
    }
  }
}

function closeEditor() {
  activeFile = null;
  document.getElementById('code-editor').value = '';
  document.getElementById('editor-tabs').innerHTML = '';
  document.getElementById('current-path').textContent = '파일을 선택하세요';
}

function updateEditorStats() {
  const val = document.getElementById('code-editor').value;
  const lines = val.split('\n').length;
  document.getElementById('editor-lines').textContent = lines + '줄';
  document.getElementById('editor-size').textContent =
    val.length > 1024 ? (val.length/1024).toFixed(1)+'KB' : val.length+'B';
}
document.getElementById('code-editor').addEventListener('input', updateEditorStats);

async function saveCurrentFile() {
  if (!activeFile) { showToast('⚠️ 파일을 먼저 선택하세요', 'warn'); return; }
  const content = document.getElementById('code-editor').value;
  const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/file/write/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({path: activeFile, content})
  });
  const d = await r.json();
  if (d.ok) {
    showToast('💾 저장: ' + activeFile);
    const previewPane = document.getElementById('preview-pane');
    if (previewPane && previewPane.style.display !== 'none') refreshPreview();
  }
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrentFile(); }
});

function newFile() {
  const path = prompt('새 파일 경로 (예: src/App.jsx, index.html):');
  if (!path) return;
  activeFile = path;
  document.getElementById('code-editor').value = '';
  document.getElementById('current-path').textContent = path;
  const name = path.split('/').pop();
  let tab = document.querySelector(`.editor-tab[data-path="${path}"]`);
  if (!tab) {
    tab = document.createElement('div');
    tab.className = 'editor-tab active';
    tab.dataset.path = path;
    tab.innerHTML = `${escHtml(name)} <span class="tab-close" onclick="closeTab(this,'${escHtml(path)}')">×</span>`;
    tab.onclick = (e) => { if (!e.target.classList.contains('tab-close')) activateTab(path); };
    document.getElementById('editor-tabs').appendChild(tab);
  }
  document.getElementById('code-editor').focus();
}

function newFolder() {
  const name = prompt('폴더 이름:');
  if (!name) return;
  fetch(`/blog/ai-webdev/${PROJECT_ID}/file/write/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({path: name+'/.gitkeep', content:''})
  }).then(() => refreshFiles());
}

async function deleteActiveFile() {
  if (!activeFile) { showToast('⚠️ 파일을 먼저 선택하세요', 'warn'); return; }
  if (!confirm(activeFile + ' 삭제할까요?')) return;
  await fetch(`/blog/ai-webdev/${PROJECT_ID}/tool/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({project_id:PROJECT_ID, tool:'delete_file', args:{path:activeFile}})
  });
  closeEditor();
  refreshFiles();
}

// ══════════════════════════════════════════════
// 미리보기
// ══════════════════════════════════════════════
function refreshPreview() {
  const iframe = document.getElementById('preview-iframe');
  const path = activeFile && activeFile.endsWith('.html') ? activeFile : 'index.html';
  iframe.src = `/blog/ai-webdev/${PROJECT_ID}/preview/?path=${encodeURIComponent(path)}&t=${Date.now()}`;
  document.getElementById('preview-url').textContent = path;
}
function openExternal() {
  const path = activeFile && activeFile.endsWith('.html') ? activeFile : 'index.html';
  window.open(`/blog/ai-webdev/${PROJECT_ID}/preview/?path=${encodeURIComponent(path)}`, '_blank');
}

// ══════════════════════════════════════════════
// 도구 로그
// ══════════════════════════════════════════════
function addToolLog(msg, type='info') {
  const area = document.getElementById('tool-log-area');
  if (!area) return;
  const div = document.createElement('div');
  div.className = 'tool-log-entry ' + type;
  div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  toolLogCount++;
  const toolTab = document.querySelector('.right-tab[onclick*="tool"]');
  if (toolTab) toolTab.innerHTML = `🔧 도구 로그 <span style="background:#6c63ff;color:#fff;border-radius:10px;padding:1px 6px;font-size:.7rem;">${toolLogCount}</span>`;
}

// ══════════════════════════════════════════════
// 터미널
// ══════════════════════════════════════════════
function runTerminal() {
  const cmd = document.getElementById('terminal-cmd').value.trim();
  if (!cmd) return;
  const output = document.getElementById('terminal-output');
  output.innerHTML += `<span style="color:#58a6ff;">$ ${escHtml(cmd)}</span>\n`;
  document.getElementById('terminal-cmd').value = '';
  fetch(`/blog/ai-webdev/${PROJECT_ID}/terminal/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body: JSON.stringify({command: cmd})
  }).then(async resp => {
    if (!resp.ok) { output.innerHTML += `<span style="color:#f85149;">오류 발생</span>\n`; return; }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      const lines = decoder.decode(value).split('\n');
      for(const line of lines) {
        if(!line.startsWith('data:')) continue;
        try {
          const evt = JSON.parse(line.slice(5).trim());
          if(evt.line) output.innerHTML += escHtml(evt.line);
          if(evt.done) {
            output.innerHTML += `<span style="color:#3fb950;">[완료 rc=${evt.returncode}]</span>\n`;
            refreshFiles();
          }
          if(evt.error) output.innerHTML += `<span style="color:#f85149;">${escHtml(evt.error)}</span>\n`;
        } catch(e){}
      }
    }
    output.scrollTop = output.scrollHeight;
  }).catch(e => {
    output.innerHTML += `<span style="color:#f85149;">연결 오류: ${escHtml(e.message)}</span>\n`;
  });
}
document.getElementById('terminal-cmd').addEventListener('keydown', e => {
  if(e.key === 'Enter') runTerminal();
});

// ══════════════════════════════════════════════
// 대화 이력 로딩 (페이지 초기화 시 DB에서)
// ══════════════════════════════════════════════
async function loadChatHistory() {
  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/history/`);
    const d = await r.json();
    const msgs = document.getElementById('chat-messages');
    msgs.innerHTML = '';
    if (!d.history || d.history.length === 0) {
      msgs.innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:#9ca3af;">
          <div style="font-size:3rem;">🤖</div>
          <p style="margin-top:12px;">AI에게 무엇을 만들지 말씀해주세요!<br>
          <small>예: "React 투두앱 만들어줘"<br>"Flask REST API 서버"<br>"Bootstrap 포트폴리오"</small></p>
        </div>`;
      return;
    }
    d.history.forEach(s => {
      renderMsg(s.role, s.content, s.tool_calls || []);
    });
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    console.error('대화 이력 로딩 실패:', e);
  }
}

async function clearHistory() {
  if (!confirm('대화 이력을 모두 삭제할까요?')) return;
  await fetch(`/blog/ai-webdev/${PROJECT_ID}/clear-history/`, {
    method:'POST', headers:{'X-CSRFToken':CSRF}
  });
  loadChatHistory();
  showToast('🗑️ 대화 이력 삭제됨');
}

// ══════════════════════════════════════════════
// 메시지 렌더링
// ══════════════════════════════════════════════
function renderMsg(role, content, toolCalls) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = role === 'user' ? 'msg-user' : 'msg-ai';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (role === 'ai' ? ' ai-content' : '');
  if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = formatAiText(content);
    // 도구 호출 뱃지
    if (toolCalls && toolCalls.length > 0) {
      toolCalls.forEach(tc => {
        const badge = document.createElement('div');
        badge.className = 'tool-call-badge';
        badge.innerHTML = `🔧 ${escHtml(tc.tool || '')}: ${escHtml(JSON.stringify(tc.args||{}).slice(0,60))}`;
        bubble.insertBefore(badge, bubble.firstChild);
      });
    }
  }
  div.appendChild(bubble);
  msgs.appendChild(div);
  return bubble;
}

function appendUserMsg(content) {
  const msgs = document.getElementById('chat-messages');
  // 빈 상태 메시지 제거
  const empty = msgs.querySelector('div[style*="text-align:center"]');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg-user';
  div.innerHTML = `<div class="bubble">${escHtml(content)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function createAiBubble() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg-ai';
  div.innerHTML = '<div class="bubble ai-content"><span style="color:#9ca3af;">⏳ 생각 중...</span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.bubble');
}

// ══════════════════════════════════════════════
// 도구 실행 (클라이언트 측)
// ══════════════════════════════════════════════
const executedToolHashes = new Set();

async function executeToolCall(toolData) {
  const toolName = toolData.tool || '?';
  const argsStr = JSON.stringify(toolData.args || {});
  const hash = toolName + argsStr.slice(0, 100);
  if (executedToolHashes.has(hash)) return null;
  executedToolHashes.add(hash);

  addToolLog(`🔧 <strong>${toolName}</strong> ${argsStr.slice(0,80)}`, 'tool');

  try {
    const r = await fetch(`/blog/ai-webdev/${PROJECT_ID}/tool/`, {
      method:'POST',
      headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
      body: JSON.stringify({project_id:PROJECT_ID, tool:toolData.tool, args:toolData.args||{}})
    });
    const result = await r.json();
    const res = result.result || {};
    if (res.error) {
      addToolLog(`❌ ${toolName}: ${res.error}`, 'error');
    } else {
      addToolLog(`✅ ${toolName} 완료`, 'success');
    }
    if (['write_file','delete_file','run_command'].includes(toolName)) {
      await refreshFiles();
    }
    return {tool: toolData.tool, args: toolData.args, result: res};
  } catch(e) {
    addToolLog(`❌ ${toolName} 오류: ${e.message}`, 'error');
    return null;
  }
}

function extractToolCalls(text) {
  const regex = /<tool_call>([\s\S]*?)<\/tool_call>/g;
  const calls = [];
  let match;
  while((match = regex.exec(text)) !== null) {
    try {
      const data = JSON.parse(match[1].trim());
      calls.push(data);
    } catch(e) {}
  }
  return calls;
}

// ══════════════════════════════════════════════
// 핵심: 채팅 전송 (스트리밍 + 도구 실행 루프)
// ══════════════════════════════════════════════
async function sendChat() {
  if (isSending) return;
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  isSending = true;
  input.value = '';
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '⏳';

  appendUserMsg(msg);
  addToolLog(`💬 전송: ${msg.slice(0,60)}`, 'info');

  let toolResultsToSend = [];
  let continueLoop = true;
  let currentMsg = msg;
  let loopCount = 0;
  const MAX_LOOPS = 6; // 도구 자동실행 최대 반복

  while (continueLoop && loopCount < MAX_LOOPS) {
    loopCount++;
    continueLoop = false;

    const bubble = createAiBubble();
    let fullText = '';
    let streaming = false;

    try {
      const resp = await fetch(`/blog/ai-webdev/${PROJECT_ID}/chat/`, {
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
        body: JSON.stringify({
          project_id: PROJECT_ID,
          message: currentMsg,
          tool_results: toolResultsToSend,
        })
      });

      if (resp.status === 402) {
        const d = await resp.json();
        bubble.innerHTML = `<span style="color:#ef4444;">❌ ${escHtml(d.error)}</span><br>
          <a href="/blog/ai/credit/shop/" style="color:#6c63ff;">💳 크레딧 구매 →</a>`;
        break;
      }

      if (!resp.ok) {
        bubble.innerHTML = `<span style="color:#ef4444;">서버 오류 (${resp.status})</span>`;
        break;
      }

      // 스트리밍 읽기
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while(true) {
        const {done, value} = await reader.read();
        if(done) break;
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop(); // 마지막 불완전한 줄은 버퍼에

        for(const line of lines) {
          if(!line.startsWith('data:')) continue;
          try {
            const evt = JSON.parse(line.slice(5).trim());
            if(evt.token) {
              if(!streaming) { bubble.innerHTML = ''; streaming = true; }
              fullText += evt.token;
              bubble.innerHTML = formatAiText(fullText);
              document.getElementById('chat-messages').scrollTop = 9999;
            }
            if(evt.done) {
              updateCreditBadge();
            }
            if(evt.error) {
              bubble.innerHTML = `<span style="color:#ef4444;">❌ ${escHtml(evt.error)}</span>`;
            }
          } catch(e){}
        }
      }

      // 스트리밍 완료 후 도구 호출 감지 및 실행
      if (fullText) {
        const toolCalls = extractToolCalls(fullText);
        if (toolCalls.length > 0) {
          addToolLog(`🔍 도구 ${toolCalls.length}개 감지 → 실행 중...`, 'info');
          toolResultsToSend = [];
          for (const tc of toolCalls) {
            const result = await executeToolCall(tc);
            if (result) toolResultsToSend.push(result);
          }
          if (toolResultsToSend.length > 0) {
            // 도구 실행 결과를 AI에게 다시 전달
            currentMsg = '도구 실행이 완료됐습니다. 결과를 확인하고 다음 작업을 이어서 진행해주세요.';
            continueLoop = true;
            addToolLog(`♻️ 도구 결과 전달 중 (루프 ${loopCount})...`, 'info');
          }
        }
      }

      // 마지막 AI 버블 완성
      if (!streaming && fullText) {
        bubble.innerHTML = formatAiText(fullText);
      }
      document.getElementById('chat-messages').scrollTop = 9999;

    } catch(e) {
      bubble.innerHTML = `<span style="color:#ef4444;">연결 오류: ${escHtml(e.message)}</span>`;
      addToolLog(`❌ 오류: ${e.message}`, 'error');
      break;
    }
  }

  if (loopCount >= MAX_LOOPS) {
    addToolLog('⚠️ 도구 실행 루프 최대 횟수 도달', 'error');
  }

  addToolLog('✅ 완료', 'success');
  executedToolHashes.clear(); // 다음 메시지를 위해 초기화
  isSending = false;
  btn.disabled = false;
  btn.textContent = '▶ 전송';
  await refreshFiles();
}

// ══════════════════════════════════════════════
// 텍스트 포맷
// ══════════════════════════════════════════════
function formatAiText(text) {
  // 코드블록
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) =>
    `<pre><code>${escHtml(code.trim())}</code></pre>`);
  // tool_call 뱃지
  text = text.replace(/<tool_call>([\s\S]*?)<\/tool_call>/g, (m, json) =>
    `<div class="tool-call-badge">🔧 ${escHtml(json.slice(0,70))}${json.length>70?'...':''}</div>`);
  // 인라인 코드
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // **굵게**
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // 줄바꿈
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// 크레딧 배지 업데이트
// ══════════════════════════════════════════════
async function updateCreditBadge() {
  try {
    const r = await fetch('/blog/ai/credit/info/');
    const d = await r.json();
    const el = document.getElementById('credit-info');
    if (el) {
      el.textContent = d.is_unlimited ? '♾️ 무제한' : `💳 ${d.credits}크레딧`;
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════
// 배포
// ══════════════════════════════════════════════
async function startDeploy() {
  const log = document.getElementById('deploy-log');
  log.textContent = '배포 준비 중...\n';
  switchTabDirect('deploy');

  const resp = await fetch(`/blog/ai-webdev/${PROJECT_ID}/deploy/`, {
    method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},
    body:JSON.stringify({project_id:PROJECT_ID})
  });

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let deployUrl = null;

  while(true) {
    const {done, value} = await reader.read();
    if(done) break;
    const lines = decoder.decode(value).split('\n');
    for(const line of lines) {
      if(!line.startsWith('data:')) continue;
      try {
        const evt = JSON.parse(line.slice(5).trim());
        if(evt.log) log.textContent += evt.log + '\n';
        if(evt.url) {
          deployUrl = evt.url;
          const box = document.querySelector('.deploy-url-box');
          if(box) box.innerHTML = `
            <p style="font-weight:700;color:#059669;margin:0;">🎉 배포 완료!</p>
            <a href="${escHtml(deployUrl)}" target="_blank" style="color:#6c63ff;word-break:break-all;">${escHtml(deployUrl)}</a>`;
        }
        if(evt.error) log.textContent += '❌ ' + evt.error + '\n';
      } catch(e){}
    }
    log.scrollTop = log.scrollHeight;
  }
}

// ══════════════════════════════════════════════
// 토스트 알림
// ══════════════════════════════════════════════
function showToast(msg, type) {
  const t = document.createElement('div');
  t.style.cssText = `
    position:fixed;bottom:20px;right:20px;
    background:${type==='warn'?'#f59e0b':'#1e1e2e'};
    color:#fff;padding:10px 18px;border-radius:10px;
    font-size:.85rem;z-index:9999;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
    animation:fadeIn .2s ease;
  `;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
