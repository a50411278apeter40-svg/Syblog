{% if user.is_authenticated %}
<!-- ── AI 글쓰기 보조 패널 ──────────────────────────────── -->
<div class="ai-assist-panel mt-3 mb-2" id="ai-panel-{{ panel_id }}"
     style="background:linear-gradient(135deg,rgba(108,99,255,0.07),rgba(72,207,173,0.07));
            border:1px solid rgba(108,99,255,0.22);border-radius:12px;padding:14px 16px;">
  <div class="d-flex align-items-center mb-2" style="gap:8px;flex-wrap:wrap;">
    <span style="font-size:1.15rem;">🤖</span>
    <strong style="color:#6c63ff;font-size:.97rem;">AI 글쓰기 보조</strong>
    <small class="text-muted">클릭하면 AI가 도와드려요</small>
    <button type="button"
            onclick="toggleAiPanel('ai-panel-{{ panel_id }}')"
            class="btn btn-sm btn-outline-secondary ml-auto"
            style="font-size:.75rem;padding:2px 10px;">접기 ▲</button>
  </div>

  <div id="ai-panel-body-{{ panel_id }}">
    <div class="d-flex flex-wrap mb-2" style="gap:6px;">
      {% if panel_mode == 'post' %}
      <button type="button" class="btn btn-sm btn-outline-primary"
              onclick="aiAssistPanel('{{ panel_id }}','improve', document.getElementById('{{ textarea_id }}').value)">
        ✨ 내용 다듬기
      </button>
      <button type="button" class="btn btn-sm btn-outline-success"
              onclick="aiAssistPanel('{{ panel_id }}','summarize', document.getElementById('{{ textarea_id }}').value)">
        📋 요약 생성
      </button>
      <button type="button" class="btn btn-sm btn-outline-info"
              onclick="aiAssistPanel('{{ panel_id }}','title', document.getElementById('{{ textarea_id }}').value)">
        💡 제목 추천
      </button>
      <button type="button" class="btn btn-sm btn-outline-warning"
              onclick="aiAssistPanel('{{ panel_id }}','spell', document.getElementById('{{ textarea_id }}').value)">
        🔍 맞춤법 검사
      </button>
      <button type="button" class="btn btn-sm btn-outline-secondary"
              onclick="aiAssistPanel('{{ panel_id }}','continue', document.getElementById('{{ textarea_id }}').value)">
        ➡️ 이어쓰기 제안
      </button>
      {% elif panel_mode == 'comment' %}
      <button type="button" class="btn btn-sm btn-outline-primary"
              onclick="aiAssistPanel('{{ panel_id }}','comment_improve', document.getElementById('{{ textarea_id }}').value)">
        ✨ 댓글 다듬기
      </button>
      <button type="button" class="btn btn-sm btn-outline-success"
              onclick="aiAssistPanel('{{ panel_id }}','comment_polite', document.getElementById('{{ textarea_id }}').value)">
        😊 정중하게 변환
      </button>
      <button type="button" class="btn btn-sm btn-outline-warning"
              onclick="aiAssistPanel('{{ panel_id }}','spell', document.getElementById('{{ textarea_id }}').value)">
        🔍 맞춤법 검사
      </button>
      {% endif %}
    </div>

    <!-- 결과 박스 -->
    <div id="ai-result-{{ panel_id }}"
         style="display:none;background:rgba(255,255,255,0.85);border-radius:8px;
                border:1px solid rgba(108,99,255,0.18);padding:12px;font-size:.88rem;
                white-space:pre-wrap;max-height:220px;overflow-y:auto;position:relative;">
    </div>
  </div>
</div>

<script>
(function(){
  if(window._aiPanelReady) return;
  window._aiPanelReady = true;

  window.toggleAiPanel = function(panelId){
    var body = document.getElementById('ai-panel-body-'+panelId);
    var btn  = document.querySelector('#ai-panel-'+panelId+' .btn-outline-secondary');
    if(!body) return;
    if(body.style.display === 'none'){
      body.style.display = '';
      if(btn) btn.textContent = '접기 ▲';
    } else {
      body.style.display = 'none';
      if(btn) btn.textContent = '펼치기 ▼';
    }
  };

  window.aiAssistPanel = function(panelId, mode, text){
    var resultEl = document.getElementById('ai-result-'+panelId);
    if(!resultEl) return;
    if(!text || text.trim().length < 2){
      resultEl.style.display='block';
      resultEl.innerHTML='<span style="color:#e74c3c;">⚠️ 내용을 먼저 입력해 주세요.</span>';
      return;
    }
    resultEl.style.display='block';
    resultEl.innerHTML='<i class="fas fa-spinner fa-spin" style="color:#6c63ff;"></i> <span style="color:#6c63ff;">AI가 분석 중입니다...</span>';

    var csrfEl = document.querySelector('[name=csrfmiddlewaretoken]');
    var csrf = csrfEl ? csrfEl.value : '';

    fetch('/blog/ai-assist/', {
      method:'POST',
      headers:{'X-CSRFToken': csrf, 'Content-Type':'application/json'},
      body: JSON.stringify({mode: mode, text: text.substring(0, 800)})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var res = d.result || d.error || '결과를 가져올 수 없습니다.';
      resultEl.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
          '<strong style="color:#6c63ff;">🤖 AI 결과</strong>' +
          '<div style="display:flex;gap:6px;">' +
            '<button onclick="navigator.clipboard.writeText(document.getElementById(\'ai-result-'+panelId+'\').querySelector(\'pre\').textContent).then(function(){alert(\'복사됐어요!\');})" ' +
            'class="btn btn-outline-secondary btn-sm" style="font-size:.72rem;padding:2px 8px;"><i class="fas fa-copy"></i> 복사</button>' +
            '<button onclick="document.getElementById(\'ai-result-'+panelId+'\').style.display=\'none\'" ' +
            'class="btn btn-outline-danger btn-sm" style="font-size:.72rem;padding:2px 8px;">✕ 닫기</button>' +
          '</div>' +
        '</div>' +
        '<pre style="margin:0;white-space:pre-wrap;font-family:inherit;font-size:.88rem;">' + escapeHtml(res) + '</pre>';
    })
    .catch(function(){
      resultEl.innerHTML='<span style="color:#e74c3c;">오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</span>';
    });
  };

  window.escapeHtml = window.escapeHtml || function(t){
    var d=document.createElement('div');
    d.appendChild(document.createTextNode(t));
    return d.innerHTML;
  };
})();
</script>
{% endif %}
