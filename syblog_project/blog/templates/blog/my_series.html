{% extends 'blog/base.html' %}

{% block head_title %}내 시리즈 - SyBlog{% endblock %}

{% block main_area %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>내 시리즈</h3>
    <a href="/blog/series/create/" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> 새 시리즈</a>
</div>
{% for s in series_list %}
<div class="card mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0"><a href="{{ s.get_absolute_url }}">{{ s.title }}</a></h5>
            <small class="text-muted">{{ s.posts.count }}편 · {{ s.created_at|date:"Y.m.d" }}</small>
        </div>
        <div>
            <a href="/blog/series/{{ s.pk }}/edit/" class="btn btn-sm btn-outline-primary">수정</a>
        </div>
    </div>
</div>
{% empty %}
<p class="text-muted text-center py-5">아직 시리즈가 없습니다.</p>
{% endfor %}
{% endblock %}
